<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 01 — Open sea at dawn">
  <title>Scene 01 — Open Sea (apertura)</title>
  <desc>Mare calmo all'alba. Crane down camera simulato. Nave wooden in silhouette con vele cream. Zero arancione.</desc>

  <defs>
    <!-- Sky: dawn pastel gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8E8DE"/>
      <stop offset="35%" stop-color="#F5EFE6"/>
      <stop offset="70%" stop-color="#EFE8DC"/>
      <stop offset="100%" stop-color="#E2D9C7"/>
    </linearGradient>

    <!-- Ocean: muted blues -->
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A9CB0"/>
      <stop offset="50%" stop-color="#5B7A8E"/>
      <stop offset="100%" stop-color="#3F5A6E"/>
    </linearGradient>

    <linearGradient id="oceanShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Mist / horizon haze -->
    <linearGradient id="hazeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#F5EFE6" stop-opacity="0"/>
    </linearGradient>

    <!-- Ship hull dark wood -->
    <linearGradient id="hullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="100%" stop-color="#15100B"/>
    </linearGradient>

    <!-- Sail cream -->
    <linearGradient id="sailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF4E9"/>
      <stop offset="100%" stop-color="#E2D6BD"/>
    </linearGradient>

    <!-- Painterly brush noise -->
    <filter id="painterly" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>

    <!-- Wave shape (reusable) -->
    <path id="wave1" d="M 0,30 Q 150,0 300,30 T 600,30 T 900,30 T 1200,30 T 1500,30 T 1800,30 T 2100,30 L 2100,80 L 0,80 Z"/>
    <path id="wave2" d="M 0,40 Q 100,5 200,40 T 400,40 T 600,40 T 800,40 T 1000,40 T 1200,40 T 1400,40 T 1600,40 T 1800,40 T 2000,40 L 2000,90 L 0,90 Z"/>
  </defs>

  <!-- Crane-down simulato via translateY del gruppo principale -->
  <g class="craneGroup" transform="translate(0 -180)">
    <animateTransform attributeName="transform" type="translate"
      values="0 -180; 0 -90; 0 0; 0 0"
      keyTimes="0;0.4;0.8;1" dur="8s" fill="freeze"/>

    <!-- Sky -->
    <rect x="0" y="0" width="1920" height="780" fill="url(#skyGrad)"/>

    <!-- Distant clouds (soft) -->
    <g opacity="0.55">
      <ellipse cx="320" cy="220" rx="240" ry="38" fill="#F5EFE6"/>
      <ellipse cx="1500" cy="160" rx="320" ry="42" fill="#F8F2E8"/>
      <ellipse cx="980" cy="280" rx="200" ry="30" fill="#F0E8D8"/>
    </g>

    <!-- Far horizon mist line -->
    <rect x="0" y="640" width="1920" height="180" fill="url(#hazeGrad)"/>

    <!-- Ocean -->
    <rect x="0" y="780" width="1920" height="500" fill="url(#oceanGrad)"/>

    <!-- Ocean shine top band -->
    <rect x="0" y="780" width="1920" height="80" fill="url(#oceanShine)"/>

    <!-- Animated waves (translating slowly) -->
    <g class="waves-back" opacity="0.55">
      <use href="#wave1" x="-100" y="900" fill="#FFFFFF">
        <animate attributeName="x" values="-100;-300;-100" dur="14s" repeatCount="indefinite"/>
      </use>
    </g>
    <g class="waves-mid" opacity="0.45">
      <use href="#wave2" x="-200" y="980" fill="#FFFFFF">
        <animate attributeName="x" values="-200;-50;-200" dur="11s" repeatCount="indefinite"/>
      </use>
    </g>
    <g class="waves-front" opacity="0.3">
      <use href="#wave1" x="0" y="1040" fill="#FFFFFF" transform="scale(1.5 0.8)">
        <animate attributeName="x" values="0;-180;0" dur="9s" repeatCount="indefinite"/>
      </use>
    </g>

    <!-- ============ SHIP — silhouette wooden, sails cream ============ -->
    <g class="ship" transform="translate(960 720)">
      <!-- Subtle bobbing -->
      <animateTransform attributeName="transform" type="translate"
        values="960 720; 960 712; 960 720; 960 716; 960 720"
        keyTimes="0;0.25;0.5;0.75;1" dur="6s" repeatCount="indefinite" additive="replace"/>

      <!-- Hull (back-lit, dark) -->
      <path d="M -180,0 Q -160,40 -100,55 L 100,55 Q 160,40 180,0 L 150,-20 L -150,-20 Z"
            fill="url(#hullGrad)" stroke="#0A0805" stroke-width="2"/>
      <!-- Hull detail (planks) -->
      <line x1="-150" y1="-10" x2="150" y2="-10" stroke="#1F1810" stroke-width="1" opacity="0.6"/>
      <line x1="-140" y1="5" x2="140" y2="5" stroke="#1F1810" stroke-width="1" opacity="0.6"/>

      <!-- Mainmast -->
      <rect x="-3" y="-280" width="6" height="280" fill="#1F1810"/>
      <!-- Foremast -->
      <rect x="-93" y="-220" width="5" height="220" fill="#1F1810"/>
      <!-- Mizzenmast (rear) -->
      <rect x="88" y="-200" width="5" height="200" fill="#1F1810"/>

      <!-- Main sail -->
      <path d="M -3,-280 Q -90,-220 -90,-100 L -90,-30 L 0,-30 Z" fill="url(#sailGrad)" stroke="#A8957A" stroke-width="1"/>
      <path d="M 3,-280 Q 90,-220 90,-100 L 90,-30 L 0,-30 Z" fill="url(#sailGrad)" stroke="#A8957A" stroke-width="1" opacity="0.92"/>
      <!-- Fore sail -->
      <path d="M -93,-220 Q -150,-160 -150,-80 L -150,-30 L -93,-30 Z" fill="url(#sailGrad)" stroke="#A8957A" stroke-width="1"/>
      <!-- Mizzen sail -->
      <path d="M 88,-200 Q 145,-150 145,-80 L 145,-30 L 88,-30 Z" fill="url(#sailGrad)" stroke="#A8957A" stroke-width="1" opacity="0.92"/>

      <!-- Rigging lines (subtle) -->
      <line x1="0" y1="-280" x2="-90" y2="-220" stroke="#1F1810" stroke-width="0.8" opacity="0.55"/>
      <line x1="0" y1="-280" x2="88" y2="-200" stroke="#1F1810" stroke-width="0.8" opacity="0.55"/>

      <!-- Ship reflection on water -->
      <path d="M -180,55 L 180,55 L 150,90 L -150,90 Z" fill="#1A1614" opacity="0.25"/>
    </g>

    <!-- Distant gulls (silhouette, animated) -->
    <g class="gulls" fill="#1A1614" opacity="0.55">
      <path d="M 0,0 q 8,-6 16,0 q 8,-6 16,0" transform="translate(420 320)">
        <animateTransform attributeName="transform" type="translate"
          values="420 320; 460 312; 500 318; 540 314; 580 322"
          dur="12s" repeatCount="indefinite"/>
      </path>
      <path d="M 0,0 q 6,-4 12,0 q 6,-4 12,0" transform="translate(1280 260)">
        <animateTransform attributeName="transform" type="translate"
          values="1280 260; 1230 250; 1180 256; 1130 248"
          dur="14s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Painterly noise overlay -->
  <rect width="1920" height="1080" fill="url(#skyGrad)" opacity="0" filter="url(#painterly)"/>

  <!-- Vignette -->
  <radialGradient id="vig01" cx="50%" cy="50%" r="80%">
    <stop offset="65%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.25"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vig01)" pointer-events="none"/>
</svg>
