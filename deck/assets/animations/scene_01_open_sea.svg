<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 01 — Open sea at dawn (Disney polish)">
  <title>Scene 01 — Open Sea (apertura)</title>
  <desc>Disney polish: alba con luce singola top-right, cielo a gradient direzionale rosa-cream-blu, mandala decorative concentrico, mare a 3 layer parallax con curve Bezier, nave-silhouette con stroke a peso variabile (5px outline + 3px interno + 1.5px dettagli), gabbiani con line of action asimmetrica, painterly noise via feTurbulence, vignette finale. Zero arancione.</desc>

  <defs>
    <filter id="painterly01" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="haze01" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="softBlur01" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Sky gradient: single light source top-right (dawn) -->
    <linearGradient id="skyDawn" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2D9C2"/>
      <stop offset="35%" stop-color="#E9C8B0"/>
      <stop offset="70%" stop-color="#B7AFA3"/>
      <stop offset="100%" stop-color="#7B8893"/>
    </linearGradient>

    <!-- Sun glow radial (off-center, top-right) -->
    <radialGradient id="sunGlow" cx="78%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#FAEBD2" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#E9C8B0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E9C8B0" stop-opacity="0"/>
    </radialGradient>

    <!-- Sea far -->
    <linearGradient id="seaFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8FA0AC"/>
      <stop offset="100%" stop-color="#6F8390"/>
    </linearGradient>
    <linearGradient id="seaMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5F7686"/>
      <stop offset="100%" stop-color="#3F5A6E"/>
    </linearGradient>
    <linearGradient id="seaNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#37526A"/>
      <stop offset="100%" stop-color="#1E3140"/>
    </linearGradient>

    <radialGradient id="hullForm" cx="30%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#3A2C24"/>
      <stop offset="55%" stop-color="#211814"/>
      <stop offset="100%" stop-color="#0A0706"/>
    </radialGradient>
    <radialGradient id="sailForm" cx="80%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#F2E0C8"/>
      <stop offset="50%" stop-color="#C8B89A"/>
      <stop offset="100%" stop-color="#6F6256"/>
    </radialGradient>

    <radialGradient id="vignette01" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.32"/>
    </radialGradient>
  </defs>

  <!-- SKY (gradient + sun glow) -->
  <rect width="1920" height="720" fill="url(#skyDawn)"/>
  <rect width="1920" height="720" fill="url(#sunGlow)"/>
  <rect width="1920" height="720" fill="#C8B89A" opacity="0.05" filter="url(#painterly01)"/>

  <!-- DECORATIVE MANDALA (Cartoon Saloon, near sun) -->
  <g transform="translate(1500 240)" opacity="0.22" filter="url(#haze01)">
    <circle r="360" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,9"/>
    <circle r="304" fill="none" stroke="#1A1614" stroke-width="1.3" stroke-dasharray="3,7"/>
    <circle r="248" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,5"/>
    <circle r="192" fill="none" stroke="#1A1614" stroke-width="1.4" stroke-dasharray="4,10"/>
    <g stroke="#1A1614" stroke-width="1.4" stroke-linecap="round">
      <line x1="0" y1="-336" x2="0" y2="-318"/>
      <line x1="168" y1="-290" x2="158" y2="-274"/>
      <line x1="290" y1="-168" x2="274" y2="-158"/>
      <line x1="336" y1="0" x2="318" y2="0"/>
      <line x1="290" y1="168" x2="274" y2="158"/>
      <line x1="168" y1="290" x2="158" y2="274"/>
      <line x1="0" y1="336" x2="0" y2="318"/>
      <line x1="-168" y1="290" x2="-158" y2="274"/>
      <line x1="-290" y1="168" x2="-274" y2="158"/>
      <line x1="-336" y1="0" x2="-318" y2="0"/>
      <line x1="-290" y1="-168" x2="-274" y2="-158"/>
      <line x1="-168" y1="-290" x2="-158" y2="-274"/>
    </g>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="180s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- GULLS (asymmetric pose) -->
  <g opacity="0.55" filter="url(#haze01)">
    <path d="M 360 240 Q 380 218 408 236 Q 432 218 458 240" fill="none"
          stroke="#1A1614" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M 580 200 Q 612 188 644 208 Q 678 188 716 204" fill="none"
          stroke="#1A1614" stroke-width="2" stroke-linecap="round"/>
    <path d="M 1140 290 Q 1156 274 1180 286 Q 1202 274 1224 288" fill="none"
          stroke="#1A1614" stroke-width="1.8" stroke-linecap="round"
          transform="rotate(-6 1180 286)"/>
    <path d="M 1400 320 Q 1412 308 1432 320 Q 1450 308 1472 322" fill="none"
          stroke="#1A1614" stroke-width="1.5" stroke-linecap="round"
          transform="rotate(4 1432 320)"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; -60 -12; 0 0" dur="42s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </g>

  <!-- HORIZON HAZE BAND -->
  <rect x="0" y="708" width="1920" height="20" fill="#F2D9C2" opacity="0.5" filter="url(#haze01)"/>

  <!-- SEA FAR -->
  <rect x="0" y="720" width="1920" height="160" fill="url(#seaFar)"/>
  <g stroke="#F2E0C8" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.45">
    <path d="M 80 760 Q 160 754 240 760 T 400 760 T 560 758 T 720 762"/>
    <path d="M 920 790 Q 1000 784 1080 790 T 1240 790 T 1400 788 T 1560 792"/>
    <path d="M 320 820 Q 400 814 480 820 T 640 820 T 800 818 T 960 822"/>
  </g>

  <!-- SEA MID -->
  <path d="M 0 880 Q 240 866 480 878 T 960 880 T 1440 878 T 1920 882 L 1920 980 L 0 980 Z"
        fill="url(#seaMid)"/>
  <g stroke="#9FB7C8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M 100 906 Q 180 898 264 910 T 432 908"/>
    <path d="M 540 924 Q 620 916 704 928 T 872 926"/>
    <path d="M 1100 916 Q 1180 908 1264 920 T 1432 918"/>
    <path d="M 1500 940 Q 1580 932 1664 944 T 1832 942"/>
  </g>
  <g stroke="#9FB7C8" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M 220 950 Q 320 944 420 952 T 620 950"/>
    <path d="M 720 962 Q 820 956 920 964 T 1120 962"/>
    <path d="M 1240 952 Q 1340 946 1440 954 T 1640 952"/>
  </g>

  <!-- SEA NEAR -->
  <path d="M 0 980 Q 240 968 480 982 T 960 980 T 1440 982 T 1920 980 L 1920 1080 L 0 1080 Z"
        fill="url(#seaNear)"/>
  <g stroke="#6F8390" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 80 1012 Q 200 1002 320 1014 Q 440 1024 560 1014 T 800 1014"/>
    <path d="M 920 1028 Q 1040 1018 1160 1030 Q 1280 1040 1400 1030 T 1640 1030"/>
  </g>
  <g stroke="#37526A" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.65">
    <path d="M 60 1050 Q 180 1042 300 1052 T 540 1050"/>
    <path d="M 660 1062 Q 780 1054 900 1064 T 1140 1062"/>
    <path d="M 1260 1052 Q 1380 1044 1500 1054 T 1740 1052"/>
  </g>

  <!-- SHIP — silhouette with variable-weight stroke -->
  <g transform="translate(960 710)">
    <g>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 4 -3; 0 0; -4 2; 0 0" dur="9s" repeatCount="indefinite"
                        calcMode="spline" keyTimes="0;0.25;0.5;0.75;1"
                        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>

      <ellipse cx="0" cy="186" rx="220" ry="14" fill="#1A1614" opacity="0.35" filter="url(#softBlur01)"/>

      <!-- HULL (line of action gentle C, Bezier only) -->
      <path d="M -210 168 C -180 192 -130 202 -60 206 C 30 210 110 206 168 196
               C 196 192 210 184 212 174 L 200 142 C 168 150 110 156 40 158
               C -50 160 -130 154 -190 142 Z"
            fill="url(#hullForm)" stroke="#0A0706" stroke-width="5" stroke-linejoin="round"/>
      <path d="M -188 156 C -110 162 -10 164 100 162 C 160 160 192 158 200 156" fill="none"
            stroke="#0A0706" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      <path d="M -160 172 C -90 176 -20 178 60 176 C 130 174 170 172 180 170" fill="none"
            stroke="#0A0706" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <!-- rim light along top edge (warm dawn catch) -->
      <path d="M -190 142 C -100 152 0 156 100 154 C 170 152 198 148 208 142" fill="none"
            stroke="#F2D9C2" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>

      <!-- MAIN MAST -->
      <path d="M -2 144 C -1 60 0 -28 1 -120" fill="none"
            stroke="#0A0706" stroke-width="5" stroke-linecap="round"/>
      <!-- FORE MAST -->
      <path d="M -94 144 C -96 80 -98 16 -100 -56" fill="none"
            stroke="#0A0706" stroke-width="4.5" stroke-linecap="round"/>

      <!-- MAIN SAIL (Bezier only) -->
      <path d="M -10 -118 C 56 -106 110 -84 130 -34 C 134 -10 122 14 92 24
               C 60 32 22 30 -8 22 C -22 -20 -18 -68 -10 -118 Z"
            fill="url(#sailForm)" stroke="#0A0706" stroke-width="4.5" stroke-linejoin="round"/>
      <g stroke="#6F6256" stroke-linecap="round" fill="none">
        <path d="M 14 -106 C 38 -78 56 -42 60 -4" stroke-width="2.2" opacity="0.55"/>
        <path d="M 44 -94 C 68 -62 88 -22 92 18" stroke-width="1.8" opacity="0.5"/>
        <path d="M 80 -76 C 102 -48 118 -18 124 14" stroke-width="1.4" opacity="0.4"/>
      </g>
      <path d="M -10 -118 C 50 -110 102 -90 126 -50" fill="none"
            stroke="#FAEBD2" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>

      <!-- FORESAIL -->
      <path d="M -100 -54 C -64 -46 -36 -32 -22 -8 C -16 6 -28 22 -54 26
               C -82 28 -106 22 -114 6 C -114 -16 -110 -36 -100 -54 Z"
            fill="url(#sailForm)" stroke="#0A0706" stroke-width="3.5" stroke-linejoin="round"/>
      <g stroke="#6F6256" stroke-linecap="round" fill="none" opacity="0.55">
        <path d="M -86 -46 C -70 -28 -58 -8 -54 14" stroke-width="1.6"/>
        <path d="M -66 -36 C -48 -18 -38 0 -34 18" stroke-width="1.3"/>
      </g>
      <path d="M -100 -54 C -68 -48 -42 -38 -24 -18" fill="none"
            stroke="#FAEBD2" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>

      <!-- RIGGING (1.2px fine) -->
      <g stroke="#0A0706" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7">
        <path d="M -2 -120 C -60 -70 -120 -10 -190 140"/>
        <path d="M 0 -120 C 60 -70 120 -10 200 140"/>
        <path d="M -100 -56 C -130 -20 -160 30 -188 140"/>
        <path d="M -100 -56 C -70 -20 -40 30 -10 140"/>
      </g>

      <!-- FLAG -->
      <path d="M 1 -126 Q 22 -132 36 -122 Q 22 -114 1 -120 Z"
            fill="#3F5A6E" stroke="#0A0706" stroke-width="1.4" stroke-linejoin="round">
        <animateTransform attributeName="transform" type="scale"
                          values="1 1;1.05 0.95;1 1" dur="3.4s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </path>
    </g>
  </g>

  <!-- VIGNETTE -->
  <rect width="1920" height="1080" fill="url(#vignette01)" pointer-events="none"/>
</svg>
