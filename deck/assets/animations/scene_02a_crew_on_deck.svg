<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 02A — Crew on deck (Cartoon Saloon pilot)">
  <title>Scene 02A — La ciurma sul ponte</title>
  <desc>Pilot upgrade: god rays + dust particles + multi-layer parallax sea + wood grain texture + character design with body structure (lookout col cannocchiale, cartografo chinato sulla mappa, capitano con cappotto lungo e tricorno, scrivano seduto col libro mastro). Stile target: Cartoon Saloon / Studio Laika.</desc>

  <defs>
    <linearGradient id="s02_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E8D2"/>
      <stop offset="35%" stop-color="#F3DEBB"/>
      <stop offset="65%" stop-color="#EDD4A8"/>
      <stop offset="100%" stop-color="#D9B98A"/>
    </linearGradient>
    <linearGradient id="s02_seaFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9DAFBA"/><stop offset="100%" stop-color="#6F8390"/>
    </linearGradient>
    <linearGradient id="s02_seaMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B7A8E"/><stop offset="100%" stop-color="#3F5A6E"/>
    </linearGradient>
    <linearGradient id="s02_seaClose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D5564"/><stop offset="100%" stop-color="#1F2E3C"/>
    </linearGradient>
    <linearGradient id="s02_deck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A5A3A"/>
      <stop offset="60%" stop-color="#5C4226"/>
      <stop offset="100%" stop-color="#3E2C18"/>
    </linearGradient>
    <linearGradient id="s02_sail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF3E3"/>
      <stop offset="50%" stop-color="#ECE0C2"/>
      <stop offset="100%" stop-color="#C9B58E"/>
    </linearGradient>
    <linearGradient id="s02_sailShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A88D5C" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#A88D5C" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A88D5C" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="s02_rays" x1="100%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#FFE9C2" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFE9C2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFE9C2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s02_char" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2C2418"/><stop offset="100%" stop-color="#15110A"/>
    </linearGradient>
    <linearGradient id="s02_charRim" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8C896" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#E8C896" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s02_haze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F5EFE6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F5EFE6" stop-opacity="0"/>
    </linearGradient>
    <filter id="s02_woodGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.4" numOctaves="3" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.32  0 0 0 0 0.22  0 0 0 0 0.12  0 0 0 0.45 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="s02_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="13"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="s02_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="s02_rayBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <path id="s02_waveBack" d="M 0,0 Q 120,-8 240,0 T 480,0 T 720,0 T 960,0 T 1200,0 T 1440,0 T 1680,0 T 1920,0 L 1920,40 L 0,40 Z"/>
    <path id="s02_waveMid"  d="M 0,0 Q 90,-12 180,0 T 360,0 T 540,0 T 720,0 T 900,0 T 1080,0 T 1260,0 T 1440,0 T 1620,0 T 1800,0 L 1920,0 L 1920,50 L 0,50 Z"/>
    <circle id="s02_dust" r="2" fill="#FFE9C2" filter="url(#s02_softGlow)"/>
  </defs>

  <!-- SKY + clouds (painterly) -->
  <rect width="1920" height="780" fill="url(#s02_sky)"/>
  <g opacity="0.5" filter="url(#s02_painterly)">
    <ellipse cx="380" cy="180" rx="380" ry="22" fill="#FFFBEF"/>
    <ellipse cx="1280" cy="140" rx="540" ry="26" fill="#FFFBEF"/>
    <ellipse cx="900" cy="260" rx="640" ry="18" fill="#F5EFE6"/>
    <ellipse cx="1660" cy="240" rx="280" ry="14" fill="#F5EFE6"/>
  </g>

  <!-- GOD RAYS (da destra-alto, 5 bande) -->
  <g filter="url(#s02_rayBlur)" opacity="0.85">
    <polygon points="1900,-50 1820,-50 1400,1080 1100,1080" fill="url(#s02_rays)"/>
    <polygon points="1750,-50 1670,-50 1180,1080 920,1080"  fill="url(#s02_rays)" opacity="0.7"/>
    <polygon points="1580,-50 1500,-50 940,1080 700,1080"   fill="url(#s02_rays)" opacity="0.55"/>
    <polygon points="1400,-50 1320,-50 680,1080 460,1080"   fill="url(#s02_rays)" opacity="0.4"/>
    <polygon points="1220,-50 1140,-50 380,1080 200,1080"   fill="url(#s02_rays)" opacity="0.25"/>
  </g>

  <!-- HAZE orizzonte -->
  <rect x="0" y="540" width="1920" height="220" fill="url(#s02_haze)"/>

  <!-- MARE multi-layer parallax -->
  <rect x="0" y="700" width="1920" height="80" fill="url(#s02_seaFar)"/>
  <use href="#s02_waveBack" x="-100" y="700" fill="#FFFFFF" opacity="0.45">
    <animate attributeName="x" values="-100;-340;-100" dur="22s" repeatCount="indefinite"/>
  </use>
  <use href="#s02_waveBack" x="-200" y="730" fill="#FFFFFF" opacity="0.3">
    <animate attributeName="x" values="-200;-40;-200" dur="18s" repeatCount="indefinite"/>
  </use>
  <rect x="0" y="780" width="1920" height="120" fill="url(#s02_seaMid)"/>
  <use href="#s02_waveMid" x="-50" y="800" fill="#FFFFFF" opacity="0.55">
    <animate attributeName="x" values="-50;-280;-50" dur="14s" repeatCount="indefinite"/>
  </use>
  <use href="#s02_waveMid" x="-150" y="840" fill="#FFFFFF" opacity="0.4">
    <animate attributeName="x" values="-150;30;-150" dur="11s" repeatCount="indefinite"/>
  </use>
  <rect x="0" y="900" width="1920" height="60" fill="url(#s02_seaClose)"/>
  <use href="#s02_waveMid" x="0" y="910" fill="#FFFFFF" opacity="0.65" transform="scale(1.6 1)">
    <animate attributeName="x" values="0;-180;0" dur="9s" repeatCount="indefinite"/>
  </use>

  <!-- PONTE LEGNO con grain texture -->
  <g>
    <rect x="0" y="940" width="1920" height="180" fill="url(#s02_deck)"/>
    <rect x="0" y="940" width="1920" height="180" fill="url(#s02_deck)" filter="url(#s02_woodGrain)" opacity="0.6"/>
    <g stroke="#1F1408" stroke-width="2" opacity="0.5">
      <line x1="0" y1="970" x2="1920" y2="970"/>
      <line x1="0" y1="1010" x2="1920" y2="1010"/>
      <line x1="0" y1="1060" x2="1920" y2="1060"/>
    </g>
    <g stroke="#1F1408" stroke-width="1.5" opacity="0.45">
      <line x1="220" y1="940" x2="220" y2="1010"/>
      <line x1="640" y1="940" x2="640" y2="1010"/>
      <line x1="1080" y1="940" x2="1080" y2="1010"/>
      <line x1="1520" y1="940" x2="1520" y2="1010"/>
      <line x1="120" y1="1010" x2="120" y2="1060"/>
      <line x1="540" y1="1010" x2="540" y2="1060"/>
      <line x1="980" y1="1010" x2="980" y2="1060"/>
      <line x1="1420" y1="1010" x2="1420" y2="1060"/>
    </g>
    <g fill="#8B6E3C" stroke="#3A2A0F" stroke-width="0.8">
      <circle cx="220" cy="970" r="4"/><circle cx="640" cy="970" r="4"/>
      <circle cx="1080" cy="970" r="4"/><circle cx="1520" cy="970" r="4"/>
      <circle cx="120" cy="1010" r="4"/><circle cx="540" cy="1010" r="4"/>
      <circle cx="980" cy="1010" r="4"/><circle cx="1420" cy="1010" r="4"/>
    </g>
  </g>

  <!-- MASTS + RIGGING -->
  <g opacity="0.78">
    <rect x="954" y="0" width="12" height="940" fill="#2A1A0E"/>
    <rect x="368" y="80" width="10" height="860" fill="#2A1A0E"/>
    <rect x="1540" y="60" width="10" height="880" fill="#2A1A0E"/>
    <line x1="960" y1="0" x2="373" y2="940" stroke="#3A2A18" stroke-width="1.2"/>
    <line x1="960" y1="0" x2="1545" y2="940" stroke="#3A2A18" stroke-width="1.2"/>
    <line x1="373" y1="80" x2="200" y2="940" stroke="#3A2A18" stroke-width="1"/>
    <line x1="1545" y1="60" x2="1720" y2="940" stroke="#3A2A18" stroke-width="1"/>
  </g>

  <!-- VELE con pieghe e sway -->
  <g class="sails">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 6 -4; 0 0; -5 -3; 0 0"
      keyTimes="0;0.25;0.5;0.75;1" dur="9s" repeatCount="indefinite"/>
    <path d="M 960,40 C 820,140 720,300 700,500 L 700,720 L 1220,720 L 1220,500 C 1200,300 1100,140 960,40 Z"
          fill="url(#s02_sail)" stroke="#7E6940" stroke-width="2"/>
    <path d="M 750,180 Q 870,340 760,720" fill="none" stroke="#B8A06C" stroke-width="2" opacity="0.5"/>
    <path d="M 870,90 Q 920,400 880,720" fill="none" stroke="#B8A06C" stroke-width="2" opacity="0.5"/>
    <path d="M 1040,90 Q 1000,400 1040,720" fill="none" stroke="#B8A06C" stroke-width="2" opacity="0.5"/>
    <path d="M 1170,180 Q 1050,340 1160,720" fill="none" stroke="#B8A06C" stroke-width="2" opacity="0.5"/>
    <path d="M 960,40 C 820,140 720,300 700,500 L 700,720 L 1220,720 L 1220,500 C 1200,300 1100,140 960,40 Z"
          fill="url(#s02_sailShadow)"/>
    <path d="M 373,110 C 280,200 220,360 210,560 L 210,720 L 540,720 L 540,560 C 530,360 470,200 373,110 Z"
          fill="url(#s02_sail)" stroke="#7E6940" stroke-width="2" opacity="0.95"/>
    <path d="M 290,250 Q 340,460 300,720" fill="none" stroke="#B8A06C" stroke-width="1.5" opacity="0.45"/>
    <path d="M 460,250 Q 420,460 460,720" fill="none" stroke="#B8A06C" stroke-width="1.5" opacity="0.45"/>
    <path d="M 1545,90 C 1640,180 1700,340 1710,540 L 1710,720 L 1380,720 L 1380,540 C 1390,340 1450,180 1545,90 Z"
          fill="url(#s02_sail)" stroke="#7E6940" stroke-width="2" opacity="0.93"/>
    <path d="M 1620,230 Q 1580,460 1620,720" fill="none" stroke="#B8A06C" stroke-width="1.5" opacity="0.45"/>
    <path d="M 1470,230 Q 1510,460 1470,720" fill="none" stroke="#B8A06C" stroke-width="1.5" opacity="0.45"/>
  </g>

  <!-- LOOKOUT (col cannocchiale) -->
  <g transform="translate(420 780)">
    <animateTransform attributeName="transform" type="translate"
      values="420 780; 420 778; 420 780; 420 779; 420 780"
      keyTimes="0;0.3;0.5;0.7;1" dur="5s" repeatCount="indefinite"/>
    <path d="M -22,40 L -28,160 L -16,160 L -10,40 Z" fill="url(#s02_char)"/>
    <path d="M 10,40 L 16,160 L 28,160 L 22,40 Z" fill="url(#s02_char)"/>
    <path d="M -32,158 L -8,158 L -8,170 L -32,170 Z" fill="#0A0805"/>
    <path d="M 8,158 L 32,158 L 32,170 L 8,170 Z" fill="#0A0805"/>
    <path d="M -30,-50 L -32,40 L 32,40 L 30,-50 Z" fill="url(#s02_char)"/>
    <rect x="-32" y="20" width="64" height="6" fill="#5C4226"/>
    <rect x="-4" y="20" width="8" height="6" fill="#8B6E3C"/>
    <path d="M -38,-50 L -28,-30 L 28,-30 L 38,-50 L 30,-55 L -30,-55 Z" fill="url(#s02_char)"/>
    <rect x="-7" y="-60" width="14" height="10" fill="url(#s02_char)"/>
    <ellipse cx="0" cy="-72" rx="14" ry="16" fill="url(#s02_char)"/>
    <path d="M -16,-78 L 16,-78 L 18,-70 L -18,-70 Z" fill="#3A2818"/>
    <path d="M 14,-72 L 24,-58 L 18,-58 L 12,-66 Z" fill="#3A2818"/>
    <path d="M 30,-50 L 32,40 L 38,40 L 36,-50 Z" fill="url(#s02_charRim)"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-12 -8 -40; -8 -8 -40; -12 -8 -40" keyTimes="0;0.5;1" dur="6s" repeatCount="indefinite"/>
      <path d="M 22,-46 L 70,-72 L 76,-66 L 28,-38 Z" fill="url(#s02_char)"/>
      <rect x="68" y="-76" width="32" height="10" fill="#3A2818" stroke="#1A0F08" stroke-width="1.2"/>
      <rect x="96" y="-78" width="10" height="14" fill="#8B6E3C" stroke="#1A0F08" stroke-width="1.2"/>
    </g>
    <path d="M -22,-46 L -32,30 L -24,30 L -14,-44 Z" fill="url(#s02_char)"/>
  </g>

  <!-- CARTOGRAFO (chinato sulla mappa) -->
  <g transform="translate(780 800)">
    <animateTransform attributeName="transform" type="translate"
      values="780 800; 780 798; 780 800; 780 799; 780 800"
      keyTimes="0;0.3;0.5;0.7;1" dur="6s" repeatCount="indefinite"/>
    <rect x="-60" y="20" width="120" height="6" fill="#3A2818"/>
    <path d="M -70,26 L -68,42 L 68,42 L 70,26 Z" fill="#2A1A0E"/>
    <path d="M -50,12 Q -50,8 -46,8 L 46,8 Q 50,8 50,12 L 50,24 Q 48,28 44,28 L -44,28 Q -50,26 -50,22 Z"
          fill="#E8D9B5" stroke="#7E6940" stroke-width="1.5"/>
    <path d="M -32,16 Q -10,22 14,18 T 42,20" fill="none" stroke="#7E6940" stroke-width="1" opacity="0.7"/>
    <circle cx="-20" cy="18" r="1.5" fill="#7E6940"/>
    <circle cx="36" cy="20" r="1.5" fill="#7E6940"/>
    <path d="M -18,60 L -22,160 L -10,160 L -8,60 Z" fill="url(#s02_char)"/>
    <path d="M 8,60 L 10,160 L 22,160 L 18,60 Z" fill="url(#s02_char)"/>
    <path d="M -26,158 L -6,158 L -6,170 L -26,170 Z" fill="#0A0805"/>
    <path d="M 6,158 L 26,158 L 26,170 L 6,170 Z" fill="#0A0805"/>
    <path d="M -24,-20 L -30,60 L 30,60 L 24,-20 Z" fill="url(#s02_char)" transform="rotate(-12 0 20)"/>
    <path d="M -28,-22 L 28,-22 L 24,-32 L -24,-32 Z" fill="url(#s02_char)" transform="rotate(-12 0 -27)"/>
    <ellipse cx="-6" cy="-46" rx="13" ry="15" fill="url(#s02_char)"/>
    <path d="M -22,-58 L 12,-58 L 14,-62 L -20,-62 Z M -16,-62 L 8,-62 L 4,-72 L -10,-72 Z" fill="#1A0F08"/>
    <path d="M -8,-12 L -36,18 L -30,24 L -2,-6 Z" fill="url(#s02_char)"/>
    <circle cx="-38" cy="22" r="3.5" fill="#0A0805"/>
    <rect x="-44" y="14" width="2" height="14" fill="#8B6E3C" transform="rotate(-25 -43 21)"/>
  </g>

  <!-- CAPITANO (cappotto + tricorno) -->
  <g transform="translate(1080 780)">
    <animateTransform attributeName="transform" type="translate"
      values="1080 780; 1080 777; 1080 780; 1080 778; 1080 780"
      keyTimes="0;0.3;0.5;0.7;1" dur="5.5s" repeatCount="indefinite"/>
    <path d="M -34,-30 L -40,120 L -28,120 L -16,-30 Z" fill="url(#s02_char)"/>
    <path d="M 34,-30 L 40,120 L 28,120 L 16,-30 Z" fill="url(#s02_char)"/>
    <path d="M -12,120 L -16,180 L -4,180 L -2,120 Z" fill="url(#s02_char)"/>
    <path d="M 2,120 L 4,180 L 16,180 L 12,120 Z" fill="url(#s02_char)"/>
    <path d="M -18,178 L -2,178 L -2,192 L -18,192 Z" fill="#0A0805"/>
    <path d="M 2,178 L 18,178 L 18,192 L 2,192 Z" fill="#0A0805"/>
    <rect x="-32" y="22" width="64" height="8" fill="#5C4226"/>
    <rect x="-4" y="22" width="8" height="8" fill="#B89048" stroke="#3A2818" stroke-width="0.5"/>
    <path d="M -28,-30 L -34,30 L 34,30 L 28,-30 Z" fill="url(#s02_char)"/>
    <path d="M -32,-30 L -22,-12 L 22,-12 L 32,-30 L 24,-44 L -24,-44 Z" fill="url(#s02_char)"/>
    <path d="M -22,-30 L -16,-48 L -8,-48 L -10,-30 Z" fill="#0A0805"/>
    <path d="M 22,-30 L 16,-48 L 8,-48 L 10,-30 Z" fill="#0A0805"/>
    <rect x="-7" y="-54" width="14" height="10" fill="url(#s02_char)"/>
    <ellipse cx="0" cy="-66" rx="15" ry="17" fill="url(#s02_char)"/>
    <path d="M -22,-78 L 22,-78 L 24,-84 L -24,-84 Z" fill="#0A0805"/>
    <path d="M -22,-84 L 22,-84 L 12,-100 L -12,-100 Z" fill="#0A0805"/>
    <path d="M 34,30 L 40,120 L 44,120 L 36,30 Z" fill="url(#s02_charRim)" opacity="0.4"/>
    <path d="M -28,-30 L -42,80 L -34,80 L -22,-26 Z" fill="url(#s02_char)"/>
    <path d="M 28,-30 L 36,80 L 28,80 L 22,-26 Z" fill="url(#s02_char)"/>
    <rect x="32" y="60" width="2.5" height="100" fill="#8B6E3C"/>
    <circle cx="33" cy="60" r="3" fill="#8B6E3C"/>
  </g>

  <!-- SCRIVANO (seduto col libro mastro) -->
  <g transform="translate(1480 870)">
    <animateTransform attributeName="transform" type="translate"
      values="1480 870; 1480 869; 1480 870; 1480 869; 1480 870"
      keyTimes="0;0.3;0.5;0.7;1" dur="4.5s" repeatCount="indefinite"/>
    <rect x="-30" y="40" width="60" height="50" fill="#5C4226" stroke="#1A0F08" stroke-width="1.5"/>
    <rect x="-30" y="40" width="60" height="50" fill="#5C4226" filter="url(#s02_woodGrain)" opacity="0.7"/>
    <path d="M -18,38 L -22,90 L -8,90 L -6,38 Z" fill="url(#s02_char)"/>
    <path d="M 6,38 L 8,90 L 22,90 L 18,38 Z" fill="url(#s02_char)"/>
    <path d="M -26,-20 L -28,40 L 28,40 L 26,-20 Z" fill="url(#s02_char)" transform="rotate(-8 0 10)"/>
    <path d="M -28,-22 L 28,-22 L 24,-32 L -24,-32 Z" fill="url(#s02_char)" transform="rotate(-8 0 -27)"/>
    <ellipse cx="-4" cy="-46" rx="13" ry="15" fill="url(#s02_char)"/>
    <path d="M -16,-58 L 8,-58 L 10,-66 L -14,-66 Z" fill="#1A0F08"/>
    <rect x="-32" y="14" width="60" height="32" fill="#3A2818" stroke="#0A0805" stroke-width="1.5"/>
    <rect x="-28" y="18" width="52" height="24" fill="#E8D9B5"/>
    <g stroke="#5C4226" stroke-width="0.5" opacity="0.7">
      <line x1="-24" y1="22" x2="20" y2="22"/>
      <line x1="-24" y1="26" x2="22" y2="26"/>
      <line x1="-24" y1="30" x2="18" y2="30"/>
      <line x1="-24" y1="34" x2="20" y2="34"/>
      <line x1="-24" y1="38" x2="16" y2="38"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-2 0 -10; 2 0 -10; -2 0 -10" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite"/>
      <path d="M -10,-15 L -22,18 L -14,22 L -2,-10 Z" fill="url(#s02_char)"/>
      <rect x="-20" y="22" width="1.5" height="14" fill="#FAF3E3" transform="rotate(-20 -19 28)"/>
    </g>
    <path d="M 14,-15 L 22,16 L 14,18 L 8,-12 Z" fill="url(#s02_char)"/>
  </g>

  <!-- DUST PARTICLES nei god rays -->
  <g>
    <use href="#s02_dust" x="1200" y="180">
      <animate attributeName="y" values="180;560" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.6;0" dur="8s" repeatCount="indefinite"/>
    </use>
    <use href="#s02_dust" x="1350" y="100">
      <animate attributeName="y" values="100;620" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.5;0" dur="11s" repeatCount="indefinite"/>
    </use>
    <use href="#s02_dust" x="1080" y="240">
      <animate attributeName="y" values="240;700" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="13s" repeatCount="indefinite"/>
    </use>
    <use href="#s02_dust" x="1480" y="60">
      <animate attributeName="y" values="60;540" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.5;0" dur="9s" repeatCount="indefinite"/>
    </use>
    <use href="#s02_dust" x="1620" y="160">
      <animate attributeName="y" values="160;620" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.65;0.4;0" dur="12s" repeatCount="indefinite"/>
    </use>
    <use href="#s02_dust" x="900" y="320">
