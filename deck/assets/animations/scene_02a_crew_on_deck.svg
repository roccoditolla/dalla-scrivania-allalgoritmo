<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 02A — Crew on deck">
  <title>Scene 02A — Ciurma sul ponte (medium back-view)</title>
  <desc>Quattro figure silhouette di spalle sul ponte. Vele cream parzialmente in alto. Slow dolly in.</desc>

  <defs>
    <linearGradient id="sky02a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EFE6D6"/>
      <stop offset="60%" stop-color="#E2D6BD"/>
      <stop offset="100%" stop-color="#C8B998"/>
    </linearGradient>
    <linearGradient id="deck02a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6E5A40"/>
      <stop offset="100%" stop-color="#2F2418"/>
    </linearGradient>
    <linearGradient id="sail02a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF4E9"/>
      <stop offset="100%" stop-color="#D8C9AB"/>
    </linearGradient>
    <linearGradient id="haze02a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#F5EFE6" stop-opacity="0"/>
    </linearGradient>
    <filter id="painterly02a" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="9"/>
      <feDisplacementMap in="SourceGraphic" scale="2.5"/>
    </filter>
    <radialGradient id="vig02a" cx="50%" cy="50%" r="78%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Slow dolly-in simulato via scale dell'intero gruppo -->
  <g transform="translate(960 540)">
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1; 1.04; 1.08" keyTimes="0;0.5;1" dur="8s" fill="freeze"/>
      <g transform="translate(-960 -540)">

        <!-- Sky -->
        <rect x="0" y="0" width="1920" height="700" fill="url(#sky02a)"/>

        <!-- Sails high in frame (cropped, partial) -->
        <g opacity="0.92">
          <path d="M 220,-50 Q 380,80 360,420 L 80,420 Q 60,140 220,-50 Z" fill="url(#sail02a)" stroke="#A8957A" stroke-width="1.4"/>
          <path d="M 700,-80 Q 860,60 840,360 L 560,360 Q 540,100 700,-80 Z" fill="url(#sail02a)" stroke="#A8957A" stroke-width="1.4"/>
          <path d="M 1240,-60 Q 1400,80 1380,400 L 1100,400 Q 1080,120 1240,-60 Z" fill="url(#sail02a)" stroke="#A8957A" stroke-width="1.4"/>
          <path d="M 1720,-30 Q 1880,100 1860,380 L 1620,380 Q 1600,120 1720,-30 Z" fill="url(#sail02a)" stroke="#A8957A" stroke-width="1.4"/>
        </g>
        <!-- Mast lines -->
        <line x1="225" y1="-20" x2="225" y2="700" stroke="#1F1810" stroke-width="6"/>
        <line x1="705" y1="-40" x2="705" y2="700" stroke="#1F1810" stroke-width="6"/>
        <line x1="1245" y1="-30" x2="1245" y2="700" stroke="#1F1810" stroke-width="6"/>
        <line x1="1725" y1="-10" x2="1725" y2="700" stroke="#1F1810" stroke-width="6"/>

        <!-- Rigging diagonals -->
        <g stroke="#1F1810" stroke-width="1.2" opacity="0.55">
          <line x1="225" y1="60" x2="705" y2="20"/>
          <line x1="705" y1="20" x2="1245" y2="40"/>
          <line x1="1245" y1="40" x2="1725" y2="60"/>
          <line x1="225" y1="200" x2="705" y2="180"/>
          <line x1="705" y1="180" x2="1245" y2="200"/>
        </g>

        <!-- Horizon haze -->
        <rect x="0" y="540" width="1920" height="220" fill="url(#haze02a)"/>

        <!-- Deck plane (back-lit, sloping perspective) -->
        <path d="M 0,720 L 1920,720 L 1700,1080 L 220,1080 Z" fill="url(#deck02a)"/>
        <!-- Deck planks -->
        <g stroke="#1F1810" stroke-width="1" opacity="0.55">
          <line x1="120" y1="800" x2="1800" y2="800"/>
          <line x1="80" y1="880" x2="1840" y2="880"/>
          <line x1="40" y1="960" x2="1880" y2="960"/>
          <line x1="0" y1="1040" x2="1920" y2="1040"/>
        </g>
        <!-- Vertical seams -->
        <g stroke="#1F1810" stroke-width="0.8" opacity="0.4">
          <line x1="480" y1="720" x2="420" y2="1080"/>
          <line x1="960" y1="720" x2="960" y2="1080"/>
          <line x1="1440" y1="720" x2="1500" y2="1080"/>
        </g>

        <!-- Ship's wheel (foreground center, silhouette) -->
        <g transform="translate(960 880)">
          <circle r="120" fill="none" stroke="#0E0B09" stroke-width="10"/>
          <circle r="90" fill="none" stroke="#0E0B09" stroke-width="4" opacity="0.7"/>
          <circle r="18" fill="#0E0B09"/>
          <g stroke="#0E0B09" stroke-width="10" stroke-linecap="round">
            <line x1="0" y1="-140" x2="0" y2="-160"/>
            <line x1="0" y1="140" x2="0" y2="160"/>
            <line x1="-140" y1="0" x2="-160" y2="0"/>
            <line x1="140" y1="0" x2="160" y2="0"/>
            <line x1="-99" y1="-99" x2="-113" y2="-113"/>
            <line x1="99" y1="-99" x2="113" y2="-113"/>
            <line x1="-99" y1="99" x2="-113" y2="113"/>
            <line x1="99" y1="99" x2="113" y2="113"/>
          </g>
        </g>

        <!-- ============ 4 CREW SILHOUETTES — all from behind ============ -->
        <!-- Figure 1 (left): rope handler -->
        <g transform="translate(380 820)">
          <ellipse cx="0" cy="-160" rx="38" ry="44" fill="#0E0B09"/>
          <path d="M -55,-115 L 55,-115 L 68,90 L -68,90 Z" fill="#0E0B09"/>
          <path d="M -68,90 L -50,260 L -10,260 L -10,90 Z" fill="#0E0B09"/>
          <path d="M 68,90 L 50,260 L 10,260 L 10,90 Z" fill="#0E0B09"/>
          <!-- Left arm reaching rope -->
          <path d="M -55,-90 L -120,30 L -100,60 L -40,-50 Z" fill="#0E0B09"/>
          <!-- Right arm gripping -->
          <path d="M 55,-90 L 95,40 L 75,55 L 35,-60 Z" fill="#0E0B09"/>
          <!-- Rope line going up -->
          <path d="M -120,30 Q -160,-100 -200,-300" fill="none" stroke="#3A2F22" stroke-width="3" stroke-linecap="round"/>
        </g>

        <!-- Figure 2 (center-left): spyglass / lookout -->
        <g transform="translate(720 800)">
          <ellipse cx="0" cy="-170" rx="36" ry="42" fill="#0E0B09"/>
          <!-- Hat brim -->
          <path d="M -50,-185 L 50,-185 L 35,-200 L -35,-200 Z" fill="#0E0B09"/>
          <path d="M -52,-125 L 52,-125 L 64,90 L -64,90 Z" fill="#0E0B09"/>
          <path d="M -64,90 L -48,260 L -10,260 L -10,90 Z" fill="#0E0B09"/>
          <path d="M 64,90 L 48,260 L 10,260 L 10,90 Z" fill="#0E0B09"/>
          <!-- Arm holding spyglass to eye -->
          <path d="M 30,-150 L 100,-180 L 110,-160 L 40,-130 Z" fill="#0E0B09"/>
          <rect x="100" y="-185" width="48" height="14" fill="#0E0B09"/>
          <circle cx="148" cy="-178" r="9" fill="none" stroke="#0E0B09" stroke-width="3"/>
        </g>

        <!-- Figure 3 (center-right): scribe at log book -->
        <g transform="translate(1180 820)">
          <ellipse cx="0" cy="-160" rx="36" ry="42" fill="#0E0B09"/>
          <path d="M -52,-115 L 52,-115 L 66,90 L -66,90 Z" fill="#0E0B09"/>
          <path d="M -66,90 L -50,260 L -10,260 L -10,90 Z" fill="#0E0B09"/>
          <path d="M 66,90 L 50,260 L 10,260 L 10,90 Z" fill="#0E0B09"/>
          <!-- Slight forward lean = bend at neck -->
          <!-- Book in front -->
          <path d="M -40,30 L 80,30 L 80,90 L -40,90 Z" fill="#E2D6BD" stroke="#1F1810" stroke-width="2"/>
          <line x1="20" y1="30" x2="20" y2="90" stroke="#1F1810" stroke-width="1.5"/>
          <!-- Arm to book -->
          <path d="M 40,-80 L 60,40 L 30,50 L 10,-60 Z" fill="#0E0B09"/>
        </g>

        <!-- Figure 4 (right): helmsman at the wheel -->
        <g transform="translate(960 740)">
          <ellipse cx="0" cy="-170" rx="40" ry="46" fill="#0E0B09"/>
          <path d="M -58,-120 L 58,-120 L 72,100 L -72,100 Z" fill="#0E0B09"/>
          <!-- Arms gripping wheel rim -->
          <path d="M -58,-100 L -130,30 L -110,50 L -40,-70 Z" fill="#0E0B09"/>
          <path d="M 58,-100 L 130,30 L 110,50 L 40,-70 Z" fill="#0E0B09"/>
          <path d="M -72,100 L -55,260 L -15,260 L -15,100 Z" fill="#0E0B09"/>
          <path d="M 72,100 L 55,260 L 15,260 L 15,100 Z" fill="#0E0B09"/>
        </g>

        <!-- Backlight rim (faint cream halo behind crew) -->
        <g opacity="0.18">
          <ellipse cx="380" cy="700" rx="120" ry="40" fill="#FAF4E9"/>
          <ellipse cx="720" cy="680" rx="130" ry="42" fill="#FAF4E9"/>
          <ellipse cx="1180" cy="700" rx="120" ry="40" fill="#FAF4E9"/>
          <ellipse cx="960" cy="640" rx="140" ry="46" fill="#FAF4E9"/>
        </g>

      </g>
    </g>
  </g>

  <!-- Painterly noise overlay -->
  <rect width="1920" height="1080" fill="#F5EFE6" opacity="0.04" filter="url(#painterly02a)" pointer-events="none"/>
  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vig02a)" pointer-events="none"/>
</svg>
