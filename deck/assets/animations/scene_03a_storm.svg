<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 03A — Storm at sea (WOW 1, Disney polish)">
  <title>Scene 03A — Tempesta drammatica (WOW 1)</title>
  <desc>Disney WOW 1: line of action S sulla nave inclinata, lampi a 3 spessori (5px main + 3px branches + 1.5px micro-fork), shape language triangolare per energia drammatica, rim light freddo sui contorni, mare a 3 layer con curve Bezier, pioggia diagonale stratificata, anticipation pre-lampo. Zero arancione, palette blue-ink.</desc>

  <defs>
    <filter id="painterly03a" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="13"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="haze03a" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="softBlur03a" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Storm sky (single light source: lightning flash top-right) -->
    <linearGradient id="stormSky" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#6F7C8A"/>
      <stop offset="40%" stop-color="#3F4A58"/>
      <stop offset="100%" stop-color="#161D26"/>
    </linearGradient>

    <!-- Flash radial (top-right) -->
    <radialGradient id="flashGlow" cx="78%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#D9E4EE" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6F7C8A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6F7C8A" stop-opacity="0"/>
    </radialGradient>

    <!-- Cloud band gradients -->
    <linearGradient id="cloudDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2C3744"/>
      <stop offset="100%" stop-color="#0E141C"/>
    </linearGradient>
    <linearGradient id="cloudMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A5868"/>
      <stop offset="100%" stop-color="#1E2630"/>
    </linearGradient>

    <!-- Sea storm -->
    <linearGradient id="seaFarStorm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F5E70"/>
      <stop offset="100%" stop-color="#283340"/>
    </linearGradient>
    <linearGradient id="seaMidStorm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#33414F"/>
      <stop offset="100%" stop-color="#14202C"/>
    </linearGradient>
    <linearGradient id="seaNearStorm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2530"/>
      <stop offset="100%" stop-color="#06090E"/>
    </linearGradient>

    <radialGradient id="hullStorm" cx="30%" cy="25%" r="100%">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="55%" stop-color="#161108"/>
      <stop offset="100%" stop-color="#04020A"/>
    </radialGradient>
    <radialGradient id="sailStorm" cx="80%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#A8B0BA"/>
      <stop offset="50%" stop-color="#6A7484"/>
      <stop offset="100%" stop-color="#2C3440"/>
    </radialGradient>

    <linearGradient id="boltGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#D9E4EE"/>
      <stop offset="100%" stop-color="#A0B6C8"/>
    </linearGradient>

    <radialGradient id="vignette03a" cx="50%" cy="55%" r="65%">
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.42"/>
    </radialGradient>
  </defs>

  <!-- SKY -->
  <rect width="1920" height="720" fill="url(#stormSky)"/>
  <rect width="1920" height="720" fill="url(#flashGlow)">
    <animate attributeName="opacity" values="0.7;1;0.65;1;0.7" dur="6s" repeatCount="indefinite"
             keyTimes="0;0.06;0.12;0.18;1"/>
  </rect>
  <rect width="1920" height="720" fill="#3F4A58" opacity="0.05" filter="url(#painterly03a)"/>

  <!-- DECORATIVE MANDALA (dark storm overlay, very subtle) -->
  <g transform="translate(420 300)" opacity="0.16" filter="url(#haze03a)">
    <circle r="320" fill="none" stroke="#D9E4EE" stroke-width="1" stroke-dasharray="1,9"/>
    <circle r="266" fill="none" stroke="#D9E4EE" stroke-width="1.2" stroke-dasharray="3,7"/>
    <circle r="212" fill="none" stroke="#D9E4EE" stroke-width="1" stroke-dasharray="1,5"/>
    <g stroke="#D9E4EE" stroke-width="1.2" stroke-linecap="round">
      <line x1="0" y1="-296" x2="0" y2="-280"/>
      <line x1="148" y1="-256" x2="140" y2="-242"/>
      <line x1="256" y1="-148" x2="242" y2="-140"/>
      <line x1="296" y1="0" x2="280" y2="0"/>
      <line x1="256" y1="148" x2="242" y2="140"/>
      <line x1="148" y1="256" x2="140" y2="242"/>
      <line x1="0" y1="296" x2="0" y2="280"/>
      <line x1="-148" y1="256" x2="-140" y2="242"/>
      <line x1="-256" y1="148" x2="-242" y2="140"/>
      <line x1="-296" y1="0" x2="-280" y2="0"/>
      <line x1="-256" y1="-148" x2="-242" y2="-140"/>
      <line x1="-148" y1="-256" x2="-140" y2="-242"/>
    </g>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="200s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- CLOUD BANK FAR (3-layer parallax, Bezier-only triangular shapes for drama) -->
  <g filter="url(#haze03a)" opacity="0.8">
    <path d="M 0 280 Q 200 220 380 250 Q 560 200 760 240 Q 960 180 1180 230
             Q 1400 200 1620 250 Q 1820 220 1920 240 L 1920 360 L 0 360 Z"
          fill="url(#cloudMid)"/>
  </g>
  <!-- CLOUD BANK MID (darker, lower) -->
  <g opacity="0.95">
    <path d="M -40 380 Q 160 320 360 360 Q 560 300 780 360 Q 980 320 1200 380
             Q 1400 340 1620 390 Q 1820 360 1960 380 L 1960 520 L -40 520 Z"
          fill="url(#cloudDark)"/>
    <!-- Cloud Bezier puffs along bottom (shape language: triangular wedges = tension) -->
    <path d="M 120 480 Q 200 440 300 460 Q 240 510 120 500 Z" fill="#0E141C" opacity="0.85"/>
    <path d="M 540 490 Q 650 446 760 472 Q 690 524 540 514 Z" fill="#0E141C" opacity="0.8"/>
    <path d="M 1080 478 Q 1180 440 1280 466 Q 1200 522 1080 510 Z" fill="#0E141C" opacity="0.85"/>
    <path d="M 1520 488 Q 1640 446 1760 474 Q 1660 524 1520 510 Z" fill="#0E141C" opacity="0.8"/>
  </g>

  <!-- LIGHTNING BOLTS (3 spessori: 5/3/1.5) -->
  <g filter="url(#boltGlow)" opacity="0.85">
    <!-- Main bolt (5px) -->
    <path d="M 1340 80 Q 1320 200 1360 280 Q 1300 360 1340 460 Q 1280 540 1310 620"
          fill="none" stroke="url(#boltGrad)" stroke-width="5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0;1;0" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.04;0.06;0.1;0.55;0.58;0.62"/>
    </path>
    <!-- Branch (3px) -->
    <path d="M 1340 280 Q 1400 320 1430 380" fill="none"
          stroke="url(#boltGrad)" stroke-width="3" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;0.95;0;0;0.95;0" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.04;0.07;0.11;0.55;0.59;0.63"/>
    </path>
    <!-- Micro-fork (1.5px) -->
    <path d="M 1420 360 Q 1450 384 1466 412" fill="none"
          stroke="url(#boltGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0;0.9;0" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.05;0.08;0.12;0.56;0.6;0.64"/>
    </path>
    <!-- Secondary bolt (5px, second flash, distant) -->
    <path d="M 500 110 Q 480 200 520 290 Q 470 360 510 440" fill="none"
          stroke="url(#boltGrad)" stroke-width="4.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.32;0.34;0.38;1"/>
    </path>
    <path d="M 510 280 Q 460 320 440 380" fill="none"
          stroke="url(#boltGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0;0" dur="6s" repeatCount="indefinite"
               keyTimes="0;0.33;0.35;0.39;1"/>
    </path>
  </g>

  <!-- RAIN (3-layer diagonal parallax, fine 1px / 1.5px / 2px) -->
  <g opacity="0.45" stroke="#A0B6C8" stroke-linecap="round" fill="none">
    <g stroke-width="1">
      <path d="M 100 200 L 70 260"/><path d="M 240 180 L 210 240"/>
      <path d="M 380 220 L 350 280"/><path d="M 520 200 L 490 260"/>
      <path d="M 660 250 L 630 310"/><path d="M 800 220 L 770 280"/>
      <path d="M 940 240 L 910 300"/><path d="M 1080 200 L 1050 260"/>
      <path d="M 1220 230 L 1190 290"/><path d="M 1360 250 L 1330 310"/>
      <path d="M 1500 200 L 1470 260"/><path d="M 1640 240 L 1610 300"/>
      <path d="M 1780 220 L 1750 280"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -30 60; 0 0" dur="0.9s" repeatCount="indefinite"/>
    </g>
    <g stroke-width="1.5" opacity="0.7">
      <path d="M 60 420 L 24 500"/><path d="M 200 460 L 164 540"/>
      <path d="M 340 440 L 304 520"/><path d="M 480 470 L 444 550"/>
      <path d="M 620 440 L 584 520"/><path d="M 760 470 L 724 550"/>
      <path d="M 900 460 L 864 540"/><path d="M 1040 440 L 1004 520"/>
      <path d="M 1180 470 L 1144 550"/><path d="M 1320 440 L 1284 520"/>
      <path d="M 1460 460 L 1424 540"/><path d="M 1600 480 L 1564 560"/>
      <path d="M 1740 450 L 1704 530"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -40 80; 0 0" dur="0.7s" repeatCount="indefinite"/>
    </g>
    <g stroke-width="2" opacity="0.85">
      <path d="M 100 660 L 60 760"/><path d="M 260 700 L 220 800"/>
      <path d="M 420 680 L 380 780"/><path d="M 580 720 L 540 820"/>
      <path d="M 740 700 L 700 800"/><path d="M 900 740 L 860 840"/>
      <path d="M 1060 700 L 1020 800"/><path d="M 1220 740 L 1180 840"/>
      <path d="M 1380 700 L 1340 800"/><path d="M 1540 730 L 1500 830"/>
      <path d="M 1700 700 L 1660 800"/><path d="M 1860 720 L 1820 820"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -50 100; 0 0" dur="0.55s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- HORIZON HAZE -->
  <rect x="0" y="700" width="1920" height="22" fill="#3F4A58" opacity="0.5" filter="url(#haze03a)"/>

  <!-- SEA FAR -->
  <rect x="0" y="710" width="1920" height="140" fill="url(#seaFarStorm)"/>
  <g stroke="#6F7C8A" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.45">
    <path d="M 80 750 Q 160 740 240 752 T 400 750 T 560 754 T 720 750"/>
    <path d="M 920 780 Q 1000 770 1080 782 T 1240 780 T 1400 784 T 1560 782"/>
  </g>

  <!-- SEA MID (big swells, Bezier) -->
  <path d="M 0 850 Q 200 820 400 854 Q 600 822 820 864 Q 1040 826 1260 870
           Q 1480 832 1700 866 Q 1820 850 1920 854 L 1920 970 L 0 970 Z"
        fill="url(#seaMidStorm)"/>
  <g stroke="#6F7C8A" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M 80 884 Q 200 870 320 890 Q 440 906 560 888 T 800 890"/>
    <path d="M 1000 900 Q 1120 884 1240 908 Q 1360 922 1480 902 T 1720 904"/>
    <path d="M 240 942 Q 380 928 520 948 T 800 946"/>
  </g>

  <!-- SEA NEAR (dramatic foreground wave breaking) -->
  <path d="M 0 970 Q 160 940 320 990 Q 480 950 660 1000 Q 840 960 1020 1010
           Q 1200 970 1380 1010 Q 1560 980 1740 1014 Q 1860 1000 1920 1010
           L 1920 1080 L 0 1080 Z"
        fill="url(#seaNearStorm)"/>
  <g stroke="#4F5E70" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M 60 1020 Q 200 1000 340 1024 Q 480 1042 620 1022 T 880 1024"/>
    <path d="M 1040 1030 Q 1180 1010 1320 1034 Q 1460 1054 1600 1034 T 1860 1036"/>
  </g>
  <!-- White foam crests (Bezier) -->
  <g stroke="#E8EEF4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M 120 1006 Q 200 990 280 1004"/>
    <path d="M 540 1018 Q 620 1002 700 1016"/>
    <path d="M 1080 1014 Q 1160 998 1240 1012"/>
    <path d="M 1620 1022 Q 1700 1006 1780 1020"/>
  </g>

  <!-- SHIP — inclinata, line of action S, drammatica -->
  <g transform="translate(960 700) rotate(-9)">
    <g>
      <!-- breathing inclination (storm pitch) -->
      <animateTransform attributeName="transform" type="rotate"
                        values="-2;3;-2;-1;-2" dur="5s" repeatCount="indefinite"
                        calcMode="spline" keyTimes="0;0.25;0.5;0.75;1"
                        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"
                        additive="sum"/>

      <ellipse cx="0" cy="200" rx="240" ry="18" fill="#000" opacity="0.45" filter="url(#softBlur03a)"/>

      <!-- HULL (Bezier S-curve, line of action) -->
      <path d="M -240 168 C -210 198 -150 212 -60 218 C 50 224 140 218 200 204
               C 232 198 248 188 250 174 L 232 134 C 198 144 130 152 40 152
               C -60 152 -150 144 -218 130 Z"
            fill="url(#hullStorm)" stroke="#04020A" stroke-width="5" stroke-linejoin="round"/>
      <!-- internal plank -->
      <path d="M -218 154 C -120 160 0 162 120 158 C 190 156 226 152 236 148" fill="none"
            stroke="#04020A" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      <!-- caulking detail -->
      <path d="M -180 172 C -90 176 0 178 90 176 C 160 174 200 172 220 170" fill="none"
            stroke="#04020A" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
      <!-- COOL rim light (storm = blue) -->
      <path d="M -218 130 C -100 140 20 144 130 140 C 200 138 232 134 248 130" fill="none"
            stroke="#A0B6C8" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>

      <!-- MAIN MAST -->
      <path d="M -4 138 C -2 60 0 -28 4 -130" fill="none"
            stroke="#04020A" stroke-width="5" stroke-linecap="round"/>
      <!-- FORE MAST -->
      <path d="M -100 140 C -104 76 -108 12 -114 -64" fill="none"
            stroke="#04020A" stroke-width="4.5" stroke-linecap="round"/>

      <!-- TORN MAIN SAIL (Bezier, ragged bottom) -->
      <path d="M -10 -128 C 60 -116 116 -94 134 -38 C 138 -10 124 12 92 22
               C 70 28 56 16 40 22 C 20 30 10 22 -8 30 C -22 -18 -20 -78 -10 -128 Z"
            fill="url(#sailStorm)" stroke="#04020A" stroke-width="4.5" stroke-linejoin="round"/>
      <!-- tear gash -->
      <path d="M 40 -20 Q 56 6 36 22" fill="none"
            stroke="#04020A" stroke-width="2.4" stroke-linecap="round" opacity="0.7"/>
      <!-- fold lines variable weight -->
      <g stroke="#2C3440" stroke-linecap="round" fill="none">
        <path d="M 18 -116 C 40 -86 60 -50 64 -10" stroke-width="2.2" opacity="0.6"/>
        <path d="M 48 -100 C 72 -68 90 -28 94 12" stroke-width="1.6" opacity="0.5"/>
      </g>
      <!-- COOL rim light on sail (top edge) -->
      <path d="M -10 -128 C 56 -120 108 -100 132 -54" fill="none"
            stroke="#D9E4EE" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>

      <!-- FORESAIL (torn) -->
      <path d="M -114 -62 C -78 -52 -50 -38 -36 -14 C -28 6 -42 16 -56 18
               C -76 14 -94 22 -106 14 C -116 -4 -118 -38 -114 -62 Z"
            fill="url(#sailStorm)" stroke="#04020A" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M -56 -10 Q -42 6 -68 18" fill="none"
            stroke="#04020A" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <path d="M -114 -62 C -82 -54 -56 -42 -38 -22" fill="none"
            stroke="#D9E4EE" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>

      <!-- RIGGING -->
      <g stroke="#04020A" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7">
        <path d="M -4 -130 C -60 -76 -130 -10 -218 136"/>
        <path d="M 4 -130 C 70 -76 150 -10 240 134"/>
        <path d="M -114 -64 C -150 -20 -180 30 -210 138"/>
        <path d="M -114 -64 C -80 -20 -50 30 -20 142"/>
      </g>

      <!-- FLAG torn -->
      <path d="M 4 -136 Q 28 -144 44 -134 Q 28 -126 4 -132 Z"
            fill="#161D26" stroke="#04020A" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- VIGNETTE (heavy, dramatic) -->
  <rect width="1920" height="1080" fill="url(#vignette03a)" pointer-events="none"/>
</svg>
