<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 03B — Captain at the helm during storm">
  <title>Scene 03B — Capitano silhouette nel buio della tempesta</title>
  <desc>Capitano in silhouette al timone, controluce di lampi. Static medium. Pioggia.</desc>

  <defs>
    <linearGradient id="stormSky03b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0B0E12"/>
      <stop offset="50%" stop-color="#15202C"/>
      <stop offset="100%" stop-color="#0E1722"/>
    </linearGradient>
    <radialGradient id="flashHalo03b" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#D8E2EE" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#7B92AE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#15202C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="deck03b" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0A0805"/>
    </linearGradient>
    <filter id="painterly03b">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="14"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <radialGradient id="vig03b" cx="50%" cy="50%" r="75%">
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="780" fill="url(#stormSky03b)"/>

  <!-- Flash halo (pulses with lightning) -->
  <rect width="1920" height="1080" fill="url(#flashHalo03b)" opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;0;0;0.9;0;0;0.7;0;0"
      keyTimes="0;0.1;0.12;0.18;0.35;0.37;0.42;0.62;0.64;0.68;1"
      dur="8s" fill="freeze"/>
  </rect>

  <!-- Lightning bolts (flashes appear briefly) -->
  <g stroke="#E8EEF6" stroke-width="3" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Bolt 1 -->
    <path d="M 380,0 L 360,140 L 420,180 L 380,320 L 440,360 L 400,500" opacity="0">
      <animate attributeName="opacity"
        values="0;0;1;0.2;0;0"
        keyTimes="0;0.1;0.12;0.14;0.18;1" dur="8s" fill="freeze"/>
    </path>
    <!-- Bolt 2 (different side, later) -->
    <path d="M 1480,0 L 1500,120 L 1450,170 L 1500,280 L 1440,360 L 1490,460" opacity="0">
      <animate attributeName="opacity"
        values="0;0;1;0.3;0"
        keyTimes="0;0.35;0.37;0.4;0.43" dur="8s" fill="freeze"/>
    </path>
    <!-- Bolt 3 (brief, late) -->
    <path d="M 980,0 L 1010,90 L 960,150 L 1000,240 L 940,320" opacity="0">
      <animate attributeName="opacity"
        values="0;0;1;0.2;0"
        keyTimes="0;0.62;0.64;0.66;0.7" dur="8s" fill="freeze"/>
    </path>
  </g>

  <!-- Layered storm clouds -->
  <g opacity="0.85">
    <path d="M 0,260 Q 240,180 480,240 Q 720,300 960,220 Q 1200,160 1440,240 Q 1680,300 1920,220 L 1920,0 L 0,0 Z" fill="#0B131D"/>
    <path d="M 0,420 Q 300,360 600,400 Q 900,460 1200,380 Q 1500,320 1920,400 L 1920,200 L 0,200 Z" fill="#16222E" opacity="0.7"/>
  </g>

  <!-- Wet deck -->
  <rect x="0" y="780" width="1920" height="300" fill="url(#deck03b)"/>
  <!-- Reflective glints on wet deck -->
  <g stroke="#9CAFC4" stroke-width="1.2" opacity="0.45">
    <line x1="80" y1="900" x2="240" y2="900"/>
    <line x1="380" y1="940" x2="540" y2="940"/>
    <line x1="700" y1="900" x2="900" y2="900"/>
    <line x1="1080" y1="930" x2="1280" y2="930"/>
    <line x1="1440" y1="900" x2="1640" y2="900"/>
  </g>

  <!-- ============ CAPTAIN at helm — center, silhouette, backlit ============ -->
  <g transform="translate(960 800)">
    <!-- Wheel behind captain -->
    <g transform="translate(0 60)">
      <circle r="180" fill="none" stroke="#0E0B09" stroke-width="10"/>
      <circle r="130" fill="none" stroke="#0E0B09" stroke-width="4" opacity="0.7"/>
      <g stroke="#0E0B09" stroke-width="9" stroke-linecap="round">
        <line x1="0" y1="-200" x2="0" y2="-230"/>
        <line x1="0" y1="200" x2="0" y2="230"/>
        <line x1="-200" y1="0" x2="-230" y2="0"/>
        <line x1="200" y1="0" x2="230" y2="0"/>
        <line x1="-142" y1="-142" x2="-162" y2="-162"/>
        <line x1="142" y1="-142" x2="162" y2="-162"/>
        <line x1="-142" y1="142" x2="-162" y2="162"/>
        <line x1="142" y1="142" x2="162" y2="162"/>
      </g>
      <circle r="14" fill="#0E0B09"/>
    </g>

    <!-- Captain figure (back view, slight 3/4 left lean) -->
    <g>
      <!-- Coat tails flapping (animated subtle sway) -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="0 0 -100; 2 0 -100; -2 0 -100; 1 0 -100; 0 0 -100"
          keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
        <path d="M -90,-60 L -130,260 L -50,260 L -40,-40 Z" fill="#0A0805"/>
        <path d="M 90,-60 L 130,260 L 50,260 L 40,-40 Z" fill="#0A0805"/>
        <!-- Wind-blown coat hem flick -->
        <path d="M -130,260 Q -180,240 -220,260" fill="none" stroke="#0A0805" stroke-width="40" stroke-linecap="round" opacity="0.9"/>
      </g>
      <!-- Body torso -->
      <path d="M -70,-180 L 70,-180 L 88,-40 L -88,-40 Z" fill="#0A0805"/>
      <!-- Head -->
      <ellipse cx="0" cy="-220" rx="40" ry="48" fill="#0A0805"/>
      <!-- Tricorn hat -->
      <path d="M -75,-260 L 75,-260 L 50,-280 L -50,-280 Z" fill="#0A0805"/>
      <path d="M -75,-260 L 75,-260 L 0,-310 Z" fill="#0A0805"/>
      <!-- Arms gripping wheel -->
      <path d="M -68,-140 L -190,0 L -160,40 L -40,-80 Z" fill="#0A0805"/>
      <path d="M 68,-140 L 190,0 L 160,40 L 40,-80 Z" fill="#0A0805"/>

      <!-- Backlight rim -->
      <path d="M -42,-260 Q -42,-220 -40,-180" stroke="#9CAFC4" stroke-width="2" fill="none" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0;0.9;0;0;0.7;0" keyTimes="0;0.1;0.12;0.18;0.35;0.37;0.42;0.62;0.64;0.7" dur="8s" fill="freeze"/>
      </path>
      <path d="M 42,-260 Q 42,-220 40,-180" stroke="#9CAFC4" stroke-width="2" fill="none" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0;0.9;0;0;0.7;0" keyTimes="0;0.1;0.12;0.18;0.35;0.37;0.42;0.62;0.64;0.7" dur="8s" fill="freeze"/>
      </path>
      <path d="M -88,-40 L 88,-40" stroke="#9CAFC4" stroke-width="2" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0;0.9;0;0;0.7;0" keyTimes="0;0.1;0.12;0.18;0.35;0.37;0.42;0.62;0.64;0.7" dur="8s" fill="freeze"/>
      </path>
    </g>
  </g>

  <!-- Diagonal rain -->
  <g stroke="#9CAFC4" stroke-width="1.2" opacity="0.55">
    <line x1="100" y1="0" x2="40" y2="220">
      <animate attributeName="y1" values="-220;0;-220" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;220;0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="0" x2="240" y2="220">
      <animate attributeName="y1" values="-100;0;-300" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="120;220;-80" dur="0.7s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="0" x2="440" y2="220">
      <animate attributeName="y1" values="-220;0;-220" dur="0.85s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;220;0" dur="0.85s" repeatCount="indefinite"/>
    </line>
    <line x1="720" y1="0" x2="660" y2="220">
      <animate attributeName="y1" values="-180;0;-260" dur="0.75s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="40;220;-40" dur="0.75s" repeatCount="indefinite"/>
    </line>
    <line x1="940" y1="0" x2="880" y2="220">
      <animate attributeName="y1" values="-220;0;-220" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;220;0" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="1160" y1="0" x2="1100" y2="220">
      <animate attributeName="y1" values="-160;0;-280" dur="0.78s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="60;220;-60" dur="0.78s" repeatCount="indefinite"/>
    </line>
    <line x1="1380" y1="0" x2="1320" y2="220">
      <animate attributeName="y1" values="-220;0;-220" dur="0.82s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;220;0" dur="0.82s" repeatCount="indefinite"/>
    </line>
    <line x1="1600" y1="0" x2="1540" y2="220">
      <animate attributeName="y1" values="-140;0;-300" dur="0.74s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="80;220;-80" dur="0.74s" repeatCount="indefinite"/>
    </line>
    <line x1="1820" y1="0" x2="1760" y2="220">
      <animate attributeName="y1" values="-220;0;-220" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;220;0" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Second rain layer (faster, lighter) -->
  <g stroke="#C8D4E2" stroke-width="0.8" opacity="0.35">
    <line x1="200" y1="0" x2="160" y2="160">
      <animate attributeName="y1" values="-160;0;-160" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;160;0" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="0" x2="560" y2="160">
      <animate attributeName="y1" values="-160;0;-160" dur="0.55s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;160;0" dur="0.55s" repeatCount="indefinite"/>
    </line>
    <line x1="1000" y1="0" x2="960" y2="160">
      <animate attributeName="y1" values="-160;0;-160" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;160;0" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="1400" y1="0" x2="1360" y2="160">
      <animate attributeName="y1" values="-160;0;-160" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;160;0" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="1700" y1="0" x2="1660" y2="160">
      <animate attributeName="y1" values="-160;0;-160" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;160;0" dur="0.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vig03b)" pointer-events="none"/>
</svg>
