<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 04 — Calma dopo la tempesta (Cartoon Saloon)">
  <title>Scene 04 — Mare calmo, atmosfera contemplativa</title>
  <desc>Cartoon Saloon: cielo che si schiarisce gradualmente (gradient grigio cream soft golden), nuvole painterly che si dissolvono via parallax, mare quasi piatto in 3-layer parallax slow, nave silhouette piccolissima in distanza, gabbiano singolo che vira in cerchio largo. Atmosfera contemplativa. Vignette finale. Zero arancione, zero volti, zero testo.</desc>

  <defs>
    <linearGradient id="s04_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6F8390"/>
      <stop offset="22%" stop-color="#9DAFBA"/>
      <stop offset="48%" stop-color="#E0D6C0"/>
      <stop offset="72%" stop-color="#F2E8D6"/>
      <stop offset="100%" stop-color="#E8DDC8"/>
    </linearGradient>
    <linearGradient id="s04_cloudHigh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E8DDC8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s04_cloudLow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9DAFBA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E8DDC8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s04_haze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2E8D6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F2E8D6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F2E8D6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s04_seaFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9DAFBA"/>
      <stop offset="100%" stop-color="#6F8390"/>
    </linearGradient>
    <linearGradient id="s04_seaMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6F8390"/>
      <stop offset="100%" stop-color="#3F5A6E"/>
    </linearGradient>
    <linearGradient id="s04_seaClose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3F5A6E"/>
      <stop offset="100%" stop-color="#1F2E3C"/>
    </linearGradient>
    <radialGradient id="s04_sunGlow" cx="62%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#F5EFE6" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#E8DDC8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s04_rays" x1="60%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F2E8D6" stop-opacity="0.4"/>
      <stop offset="65%" stop-color="#F2E8D6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F2E8D6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s04_ship" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3F5A6E"/>
      <stop offset="100%" stop-color="#1F2E3C"/>
    </linearGradient>
    <filter id="s04_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="41"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="s04_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="s04_rayBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <radialGradient id="s04_vig" cx="50%" cy="50%" r="80%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.42"/>
    </radialGradient>
    <path id="s04_waveFar"   d="M 0,0 Q 160,-3 320,0 T 640,0 T 960,0 T 1280,0 T 1600,0 T 1920,0 L 1920,30 L 0,30 Z"/>
    <path id="s04_waveMid"   d="M 0,0 Q 130,-5 260,0 T 520,0 T 780,0 T 1040,0 T 1300,0 T 1560,0 T 1820,0 L 1920,0 L 1920,40 L 0,40 Z"/>
    <path id="s04_waveClose" d="M 0,0 Q 100,-8 200,0 T 400,0 T 600,0 T 800,0 T 1000,0 T 1200,0 T 1400,0 T 1600,0 T 1800,0 L 1920,0 L 1920,50 L 0,50 Z"/>
    <symbol id="s04_gull" viewBox="-14 -8 28 16">
      <path d="M -14,2 Q -7,-7 0,-1 Q 7,-7 14,2" fill="none" stroke="#1A1614" stroke-width="1.6" stroke-linecap="round">
        <animate attributeName="d"
          values="M -14,2 Q -7,-7 0,-1 Q 7,-7 14,2;
                  M -14,-1 Q -7,2 0,-1 Q 7,2 14,-1;
                  M -14,2 Q -7,-7 0,-1 Q 7,-7 14,2"
          dur="2.4s" repeatCount="indefinite"/>
      </path>
    </symbol>
  </defs>

  <!-- BASE SKY -->
  <rect width="1920" height="1080" fill="url(#s04_sky)"/>

  <!-- SUN soft glow -->
  <ellipse cx="1190" cy="420" rx="320" ry="220" fill="url(#s04_sunGlow)"/>

  <!-- Sun rays soft -->
  <g filter="url(#s04_rayBlur)" opacity="0.55">
    <polygon points="1320,200 1240,200 1080,1080 880,1080" fill="url(#s04_rays)"/>
    <polygon points="1180,180 1110,180 940,1080 760,1080" fill="url(#s04_rays)" opacity="0.7"/>
    <polygon points="1060,160 990,160 800,1080 640,1080" fill="url(#s04_rays)" opacity="0.5"/>
  </g>

  <!-- HIGH altitude wispy clouds -->
  <g opacity="0.85">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -80 -4; -160 -8; -80 -4; 0 0"
      keyTimes="0;0.25;0.5;0.75;1" dur="22s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    <ellipse cx="280" cy="150" rx="380" ry="22" fill="url(#s04_cloudHigh)" filter="url(#s04_painterly)"/>
    <ellipse cx="780" cy="120" rx="460" ry="18" fill="url(#s04_cloudHigh)" filter="url(#s04_painterly)"/>
    <ellipse cx="1380" cy="180" rx="420" ry="24" fill="url(#s04_cloudHigh)" filter="url(#s04_painterly)"/>
    <ellipse cx="1740" cy="240" rx="280" ry="16" fill="url(#s04_cloudHigh)" filter="url(#s04_painterly)" opacity="0.75"/>
  </g>

  <!-- MID altitude residue clouds -->
  <g opacity="0.55">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -120 0; -240 0; -120 0; 0 0"
      keyTimes="0;0.25;0.5;0.75;1" dur="18s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    <path d="M -120,360 Q 220,280 540,340 Q 820,400 1110,330 Q 1380,275 1700,335 Q 1900,370 2040,310 L 2040,440 L -120,440 Z"
          fill="url(#s04_cloudLow)" filter="url(#s04_painterly)"/>
    <ellipse cx="420" cy="380" rx="280" ry="32" fill="#9DAFBA" opacity="0.35" filter="url(#s04_painterly)"/>
    <ellipse cx="1380" cy="400" rx="340" ry="28" fill="#9DAFBA" opacity="0.32" filter="url(#s04_painterly)"/>
  </g>

  <!-- LOW mist sopra orizzonte -->
  <rect x="0" y="600" width="1920" height="160" fill="url(#s04_haze)"/>
  <g opacity="0.5">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -50 0; -100 0; -50 0; 0 0"
      keyTimes="0;0.25;0.5;0.75;1" dur="26s" repeatCount="indefinite"/>
    <ellipse cx="380" cy="660" rx="340" ry="18" fill="#F2E8D6" opacity="0.7"/>
    <ellipse cx="1240" cy="650" rx="420" ry="22" fill="#F2E8D6" opacity="0.65"/>
    <ellipse cx="1700" cy="680" rx="240" ry="14" fill="#F2E8D6" opacity="0.55"/>
  </g>

  <!-- NAVE silhouette piccolissima -->
  <g transform="translate(1280 700)" opacity="0.78">
    <animateTransform attributeName="transform" type="translate"
      values="1280 700; 1280 698; 1280 700; 1280 699; 1280 700"
      keyTimes="0;0.3;0.5;0.7;1" dur="14s" repeatCount="indefinite"/>
    <path d="M -32,0 Q -28,8 -20,10 L 20,10 Q 28,8 32,0 L 26,-3 L -26,-3 Z" fill="url(#s04_ship)" stroke="#0A1320" stroke-width="0.8"/>
    <line x1="-32" y1="2" x2="32" y2="2" stroke="#FFFFFF" stroke-width="0.6" opacity="0.5"/>
    <rect x="-0.8" y="-46" width="1.6" height="44" fill="#1F2E3C"/>
    <path d="M 0,-46 Q -10,-30 -14,-3 L 0,-3 Z" fill="#E0D6C0" opacity="0.85" stroke="#3F5A6E" stroke-width="0.5"/>
    <path d="M 0,-46 Q 10,-30 14,-3 L 0,-3 Z" fill="#F2E8D6" opacity="0.9" stroke="#3F5A6E" stroke-width="0.5"/>
    <path d="M -32,12 Q -28,18 -20,20 L 20,20 Q 28,18 32,12 L 26,15 L -26,15 Z" fill="#3F5A6E" opacity="0.35"/>
    <line x1="-2" y1="12" x2="-2" y2="38" stroke="#3F5A6E" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- MARE 3-LAYER parallax slow -->
  <g>
    <rect x="0" y="720" width="1920" height="70" fill="url(#s04_seaFar)"/>
    <use href="#s04_waveFar" x="-100" y="735" fill="#FFFFFF" opacity="0.5">
      <animate attributeName="x" values="-100;-280;-100" dur="32s" repeatCount="indefinite"/>
    </use>
    <use href="#s04_waveFar" x="-200" y="760" fill="#FFFFFF" opacity="0.35">
      <animate attributeName="x" values="-200;-40;-200" dur="28s" repeatCount="indefinite"/>
    </use>
    <use href="#s04_waveFar" x="-50" y="775" fill="#F2E8D6" opacity="0.32">
      <animate attributeName="x" values="-50;-220;-50" dur="36s" repeatCount="indefinite"/>
    </use>

    <rect x="0" y="790" width="1920" height="110" fill="url(#s04_seaMid)"/>
    <use href="#s04_waveMid" x="-50" y="810" fill="#FFFFFF" opacity="0.5">
      <animate attributeName="x" values="-50;-260;-50" dur="22s" repeatCount="indefinite"/>
    </use>
    <use href="#s04_waveMid" x="-150" y="850" fill="#FFFFFF" opacity="0.4">
      <animate attributeName="x" values="-150;30;-150" dur="18s" repeatCount="indefinite"/>
    </use>

    <rect x="0" y="900" width="1920" height="180" fill="url(#s04_seaClose)"/>
    <use href="#s04_waveClose" x="0" y="920" fill="#9DAFBA" opacity="0.55">
      <animate attributeName="x" values="0;-180;0" dur="14s" repeatCount="indefinite"/>
    </use>
    <use href="#s04_waveClose" x="-100" y="960" fill="#F2E8D6" opacity="0.35">
      <animate attributeName="x" values="-100;-280;-100" dur="16s" repeatCount="indefinite"/>
    </use>

    <!-- Riflesso del sole -->
    <g opacity="0.55" filter="url(#s04_softGlow)">
      <ellipse cx="1180" cy="820" rx="180" ry="6" fill="#F5EFE6"/>
      <ellipse cx="1180" cy="850" rx="220" ry="5" fill="#F5EFE6" opacity="0.7"/>
      <ellipse cx="1180" cy="880" rx="160" ry="4" fill="#F5EFE6" opacity="0.55"/>
      <ellipse cx="1180" cy="920" rx="240" ry="6" fill="#F5EFE6" opacity="0.5"/>
      <ellipse cx="1180" cy="970" rx="200" ry="5" fill="#F5EFE6" opacity="0.4"/>
    </g>
  </g>

  <!-- GABBIANO SINGOLO che vira in cerchio largo -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 80 -20; 160 -10; 220 30; 180 80; 60 90; -40 60; -60 10; 0 0"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;0.875;1"
      dur="18s" repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    <use href="#s04_gull" x="640" y="380" width="44" height="26"/>
  </g>

  <!-- Painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.03" filter="url(#s04_painterly)" pointer-events="none"/>

  <!-- VIGNETTE -->
  <rect width="1920" height="1080" fill="url(#s04_vig)" pointer-events="none"/>
</svg>
