<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 05 — Mysterious island appears (WOW 2, Disney polish)">
  <title>Scene 05 — Isola appare (WOW 2)</title>
  <desc>Disney WOW 2: isola con shape language semantica (curve = invitante, triangoli = misteriosa, geometrico = altra-natura), lookout con line of action C posteriore (peso su una gamba, dignità), mandala cyanato pre-rivelazione, mare con curve Bezier vere, dust cyan, vignette. Zero arancione.</desc>

  <defs>
    <filter id="painterly05" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="21"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="haze05" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
    <filter id="islandFog" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softBlur05" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Sky pre-rivelazione: blue-violet otherworldly -->
    <linearGradient id="skyMystic" x1="60%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#A8B8C8"/>
      <stop offset="40%" stop-color="#7A8AA0"/>
      <stop offset="80%" stop-color="#4F6080"/>
      <stop offset="100%" stop-color="#2E3A50"/>
    </linearGradient>

    <!-- Cyan glow halo behind island (anticipation) -->
    <radialGradient id="islandHalo" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#8FE4F4" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#6FB8D4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6FB8D4" stop-opacity="0"/>
    </radialGradient>

    <!-- Island ridges (3-layer atmospheric perspective) -->
    <linearGradient id="islandFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8FAEC4"/>
      <stop offset="100%" stop-color="#5F7894"/>
    </linearGradient>
    <linearGradient id="islandMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5C7088"/>
      <stop offset="100%" stop-color="#36465C"/>
    </linearGradient>
    <linearGradient id="islandNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#324258"/>
      <stop offset="100%" stop-color="#1A2438"/>
    </linearGradient>
    <linearGradient id="crystalTower" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D4E8F2"/>
      <stop offset="60%" stop-color="#8FB4CC"/>
      <stop offset="100%" stop-color="#4F6080"/>
    </linearGradient>

    <linearGradient id="seaFar05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A8AA0"/>
      <stop offset="100%" stop-color="#5F7080"/>
    </linearGradient>
    <linearGradient id="seaMid05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3F5A6E"/>
      <stop offset="100%" stop-color="#22344A"/>
    </linearGradient>
    <linearGradient id="seaNear05" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3140"/>
      <stop offset="100%" stop-color="#0A1320"/>
    </linearGradient>

    <radialGradient id="lookoutForm" cx="35%" cy="25%" r="100%">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="55%" stop-color="#161108"/>
      <stop offset="100%" stop-color="#04020A"/>
    </radialGradient>

    <radialGradient id="vignette05" cx="50%" cy="55%" r="68%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.36"/>
    </radialGradient>
  </defs>

  <!-- SKY -->
  <rect width="1920" height="720" fill="url(#skyMystic)"/>
  <rect width="1920" height="720" fill="#5F7894" opacity="0.06" filter="url(#painterly05)"/>

  <!-- DECORATIVE MANDALA CYAN (Cartoon Saloon pre-rivelazione, behind island) -->
  <g transform="translate(960 440)" opacity="0.28" filter="url(#haze05)">
    <circle r="400" fill="none" stroke="#8FE4F4" stroke-width="1.1" stroke-dasharray="1,9"/>
    <circle r="344" fill="none" stroke="#8FE4F4" stroke-width="1.3" stroke-dasharray="3,7"/>
    <circle r="288" fill="none" stroke="#8FE4F4" stroke-width="1" stroke-dasharray="1,5"/>
    <circle r="232" fill="none" stroke="#8FE4F4" stroke-width="1.5" stroke-dasharray="4,10"/>
    <g stroke="#8FE4F4" stroke-width="1.4" stroke-linecap="round">
      <line x1="0" y1="-376" x2="0" y2="-358"/>
      <line x1="188" y1="-326" x2="178" y2="-310"/>
      <line x1="326" y1="-188" x2="310" y2="-178"/>
      <line x1="376" y1="0" x2="358" y2="0"/>
      <line x1="326" y1="188" x2="310" y2="178"/>
      <line x1="188" y1="326" x2="178" y2="310"/>
      <line x1="0" y1="376" x2="0" y2="358"/>
      <line x1="-188" y1="326" x2="-178" y2="310"/>
      <line x1="-326" y1="188" x2="-310" y2="178"/>
      <line x1="-376" y1="0" x2="-358" y2="0"/>
      <line x1="-326" y1="-188" x2="-310" y2="-178"/>
      <line x1="-188" y1="-326" x2="-178" y2="-310"/>
    </g>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="160s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- ISLAND HALO -->
  <ellipse cx="960" cy="500" rx="540" ry="280" fill="url(#islandHalo)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5.4s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </ellipse>

  <!-- GULLS turning (asymmetric line of action) -->
  <g opacity="0.5" filter="url(#haze05)">
    <path d="M 320 200 Q 348 178 384 200 Q 414 178 446 198" fill="none"
          stroke="#1A2438" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 520 160 Q 548 140 588 162 Q 620 140 656 158" fill="none"
          stroke="#1A2438" stroke-width="1.8" stroke-linecap="round"
          transform="rotate(-4 588 160)"/>
    <path d="M 1380 220 Q 1408 200 1448 222 Q 1480 200 1516 218" fill="none"
          stroke="#1A2438" stroke-width="1.6" stroke-linecap="round"
          transform="rotate(6 1448 220)"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; -80 -20; 0 0" dur="48s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </g>

  <!-- ISLAND FAR (Bezier ridge, soft curves = invitante) -->
  <g filter="url(#islandFog)" opacity="0.7">
    <path d="M 540 540 Q 700 460 860 480 Q 1020 420 1180 470 Q 1340 440 1440 510
             L 1440 700 L 540 700 Z"
          fill="url(#islandFar)"/>
  </g>

  <!-- ISLAND MID (mixed shape language: curves + sharp triangular peaks) -->
  <g filter="url(#haze05)">
    <path d="M 480 600 Q 620 520 760 550 Q 820 460 880 540
             Q 940 460 1000 540 Q 1080 470 1160 550 Q 1260 500 1380 600
             L 1380 740 L 480 740 Z"
          fill="url(#islandMid)"/>
    <!-- Triangular crystal-peak silhouettes (shape language: misteriosa) -->
    <path d="M 850 540 L 880 440 L 910 540 Z" fill="url(#islandMid)" opacity="0.85"/>
    <path d="M 990 540 L 1020 460 L 1050 540 Z" fill="url(#islandMid)" opacity="0.85"/>
  </g>

  <!-- CRYSTAL TOWER (shape language: geometric = altra-natura) -->
  <g>
    <path d="M 940 580 L 968 320 Q 980 290 992 320 L 1020 580 Z"
          fill="url(#crystalTower)" stroke="#36465C" stroke-width="3" stroke-linejoin="round"/>
    <!-- inner crystal facet (variable weight) -->
    <path d="M 968 320 L 980 580" fill="none"
          stroke="#36465C" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <path d="M 980 290 L 992 320" fill="none"
          stroke="#D4E8F2" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    <!-- rim light (cool cyan) -->
    <path d="M 968 320 L 980 290" fill="none"
          stroke="#D4E8F2" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <!-- breathing pulse -->
    <animateTransform attributeName="transform" type="scale"
                      values="1 1;1 1.012;1 1" dur="5s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
                      additive="sum"/>
  </g>

  <!-- ISLAND NEAR (darkest, foreground edge) -->
  <path d="M 440 720 Q 580 660 720 700 Q 860 640 1000 700 Q 1140 650 1280 700
           Q 1380 670 1460 710 L 1460 750 L 440 750 Z"
        fill="url(#islandNear)"/>

  <!-- HORIZON HAZE -->
  <rect x="0" y="730" width="1920" height="22" fill="#5F7080" opacity="0.5" filter="url(#haze05)"/>

  <!-- SEA FAR -->
  <rect x="0" y="740" width="1920" height="140" fill="url(#seaFar05)"/>
  <g stroke="#A8B8C8" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.45">
    <path d="M 80 776 Q 160 770 240 776 T 400 776 T 560 774 T 720 778"/>
    <path d="M 920 806 Q 1000 800 1080 806 T 1240 806 T 1400 804 T 1560 808"/>
  </g>

  <!-- SEA MID -->
  <path d="M 0 880 Q 240 866 480 878 T 960 880 T 1440 878 T 1920 882 L 1920 980 L 0 980 Z"
        fill="url(#seaMid05)"/>
  <g stroke="#7A92A8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M 100 906 Q 180 898 264 910 T 432 908"/>
    <path d="M 540 924 Q 620 916 704 928 T 872 926"/>
    <path d="M 1100 916 Q 1180 908 1264 920 T 1432 918"/>
    <path d="M 1500 940 Q 1580 932 1664 944 T 1832 942"/>
  </g>

  <!-- SEA NEAR -->
  <path d="M 0 980 Q 240 968 480 982 T 960 980 T 1440 982 T 1920 980 L 1920 1080 L 0 1080 Z"
        fill="url(#seaNear05)"/>
  <g stroke="#4F6080" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M 80 1012 Q 200 1002 320 1014 Q 440 1024 560 1014 T 800 1014"/>
    <path d="M 920 1028 Q 1040 1018 1160 1030 Q 1280 1040 1400 1030 T 1640 1030"/>
  </g>

  <!-- DUST PARTICLES (cyanati, anticipation) -->
  <g fill="#8FE4F4" opacity="0.7">
    <circle cx="660" cy="320" r="2">
      <animate attributeName="cy" values="320;180;320" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="380" r="1.5">
      <animate attributeName="cy" values="380;220;380" dur="9s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="9s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="360" r="2">
      <animate attributeName="cy" values="360;200;360" dur="7.5s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="7.5s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1220" cy="340" r="1.4">
      <animate attributeName="cy" values="340;200;340" dur="8.5s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="8.5s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- LOOKOUT silhouette (foreground, crow's nest, line of action C, weight on one leg) -->
  <g transform="translate(280 760)">
    <ellipse cx="0" cy="280" rx="80" ry="10" fill="#000" opacity="0.45" filter="url(#softBlur05)"/>

    <!-- Crow's nest mast vertical (slight 2° lean for asymmetry) -->
    <path d="M -4 280 C -2 200 0 120 4 -100" fill="none"
          stroke="#04020A" stroke-width="5" stroke-linecap="round"/>
    <!-- crossbeam -->
    <path d="M -56 -20 C -28 -22 28 -22 56 -20" fill="none"
          stroke="#04020A" stroke-width="3" stroke-linecap="round"/>

    <!-- Lookout figure (back-view, line of action C posteriore: weight on right leg) -->
    <g>
      <!-- right leg (load-bearing, straighter) -->
      <path d="M 10 130 C 12 170 14 210 18 250" fill="none"
            stroke="#04020A" stroke-width="9" stroke-linecap="round"/>
      <!-- left leg (relaxed, slightly bent) -->
      <path d="M -14 130 C -20 168 -28 200 -32 250" fill="none"
            stroke="#04020A" stroke-width="8" stroke-linecap="round"/>
      <!-- torso (line of action C: pelvis right, shoulders left = contrapposto) -->
      <path d="M -18 130 C -8 80 -4 40 -2 -10 C 0 -36 -4 -50 -10 -60
               C -22 -50 -28 -28 -30 0 C -32 50 -30 100 -18 130 Z
               M -2 -10 C 6 -36 14 -50 22 -60 C 28 -52 32 -32 30 -4
               C 28 38 22 84 18 130 C 14 130 -8 130 -18 130 Z"
            fill="url(#lookoutForm)" stroke="#04020A" stroke-width="4" stroke-linejoin="round"/>
      <!-- head (slight right turn, asymmetric squash) -->
      <ellipse cx="6" cy="-86" rx="22" ry="26" fill="url(#lookoutForm)"
               stroke="#04020A" stroke-width="3.5"/>
      <!-- bandana (asymmetric, wraps around) -->
      <path d="M -16 -94 C -6 -100 18 -100 26 -92 C 26 -86 -16 -86 -16 -94 Z"
            fill="#3F5A6E" stroke="#04020A" stroke-width="2"/>
      <!-- right arm holding spyglass extended to island -->
      <path d="M 26 -40 C 60 -50 100 -64 140 -76" fill="none"
            stroke="#04020A" stroke-width="7" stroke-linecap="round"/>
      <!-- left arm relaxed on rail -->
      <path d="M -28 -30 C -50 -10 -56 16 -52 40" fill="none"
            stroke="#04020A" stroke-width="6.5" stroke-linecap="round"/>
      <!-- spyglass (variable weight detail) -->
      <path d="M 138 -76 L 168 -80 L 172 -76 L 168 -72 L 138 -68 Z"
            fill="#8B6E3C" stroke="#04020A" stroke-width="2.2" stroke-linejoin="round"/>
      <circle cx="168" cy="-76" r="2.4" fill="#D4E8F2" opacity="0.85"/>
      <!-- rim light (cool cyan from island halo) -->
      <path d="M 26 -60 C 14 -30 8 0 14 60" fill="none"
            stroke="#8FE4F4" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
      <path d="M 24 -92 C 30 -82 30 -70 26 -60" fill="none"
            stroke="#8FE4F4" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
      <!-- breathing -->
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 0 -3; 0 0" dur="4.6s" repeatCount="indefinite"
                        calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </g>
  </g>

  <!-- VIGNETTE -->
  <rect width="1920" height="1080" fill="url(#vignette05)" pointer-events="none"/>
</svg>
