<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 05 — Mysterious island appears (WOW 2) — Cartoon Saloon">
  <title>Scene 05 — Isola appare (WOW 2)</title>
  <desc>Cartoon Saloon WOW 2: 3-phase fog dissipation con shimmer anticipatorio, isola con torre cristallina e ridge multi-layer (palette blu-violetta otherworldly), lookout dettagliato sulla crow's nest con bandana + cannocchiale, mare 3-layer parallax con onde lente, gabbiani in silhouette che virano, dust particles cyanati pre-rivelazione. No arancione.</desc>

  <defs>
    <linearGradient id="s05_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCD2D8"/>
      <stop offset="55%" stop-color="#B6BFC6"/>
      <stop offset="100%" stop-color="#98A2A9"/>
    </linearGradient>
    <linearGradient id="s05_cloudWhisp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0E5EA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C2C9D0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s05_seaFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7D919E"/><stop offset="100%" stop-color="#5A6F7E"/>
    </linearGradient>
    <linearGradient id="s05_seaMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A6F7E"/><stop offset="100%" stop-color="#3A4F60"/>
    </linearGradient>
    <linearGradient id="s05_seaClose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A4F60"/><stop offset="100%" stop-color="#1F2E3C"/>
    </linearGradient>
    <linearGradient id="s05_fog" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAEC" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#E0E3E7" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#D2D6DB" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="s05_islandFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B7EB4"/>
      <stop offset="55%" stop-color="#65588E"/>
      <stop offset="100%" stop-color="#4A4070"/>
    </linearGradient>
    <linearGradient id="s05_islandNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B6FA8"/>
      <stop offset="55%" stop-color="#574E84"/>
      <stop offset="100%" stop-color="#3D365E"/>
    </linearGradient>
    <linearGradient id="s05_tower" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C0B5DF"/>
      <stop offset="50%" stop-color="#9486C0"/>
      <stop offset="100%" stop-color="#574E84"/>
    </linearGradient>
    <radialGradient id="s05_aura" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#B8AAD8" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7B6FA8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#574E84" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s05_shimmer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8E0FA" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#B0A0E0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#574E84" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s05_char" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#15100B"/>
      <stop offset="100%" stop-color="#020306"/>
    </linearGradient>
    <linearGradient id="s05_charRim" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#B8AAD8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#B8AAD8" stop-opacity="0"/>
    </linearGradient>
    <filter id="s05_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.60  0 0 0 0.05 0"/>
    </filter>
    <filter id="s05_bloomSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="s05_dustGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <path id="s05_waveBack" d="M 0,0 Q 120,-8 240,0 T 480,0 T 720,0 T 960,0 T 1200,0 T 1440,0 T 1680,0 T 1920,0 L 1920,40 L 0,40 Z"/>
    <path id="s05_waveMid"  d="M 0,0 Q 90,-12 180,0 T 360,0 T 540,0 T 720,0 T 900,0 T 1080,0 T 1260,0 T 1440,0 T 1620,0 T 1800,0 L 1920,0 L 1920,50 L 0,50 Z"/>
    <symbol id="s05_gull" viewBox="-12 -8 24 16">
      <path d="M -12,2 Q -6,-7 0,-1 Q 6,-7 12,2" fill="none" stroke="#3D365E" stroke-width="1.4" stroke-linecap="round">
        <animate attributeName="d"
          values="M -12,2 Q -6,-7 0,-1 Q 6,-7 12,2;
                  M -12,-1 Q -6,2 0,-1 Q 6,2 12,-1;
                  M -12,2 Q -6,-7 0,-1 Q 6,-7 12,2"
          dur="1.6s" repeatCount="indefinite"/>
      </path>
    </symbol>
    <circle id="s05_dustCyan" r="2.5" fill="#D0C5F0" filter="url(#s05_dustGlow)"/>
  </defs>

  <!-- SLOW ZOOM-IN -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -38 -18; -76 -36; -115 -55; -150 -72"
      keyTimes="0;0.25;0.5;0.75;1" dur="8s" fill="freeze"
      calcMode="spline" keySplines="0 0 0.2 1;0 0 0.2 1;0 0 0.2 1;0 0 0.2 1"/>
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1; 1.03; 1.06; 1.10; 1.14"
        keyTimes="0;0.25;0.5;0.75;1" dur="8s" fill="freeze"
        calcMode="spline" keySplines="0 0 0.2 1;0 0 0.2 1;0 0 0.2 1;0 0 0.2 1"/>

      <!-- SKY layer -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -8 0; -16 0"
          keyTimes="0;0.5;1" dur="8s" fill="freeze"/>
        <rect x="0" y="0" width="1920" height="720" fill="url(#s05_sky)"/>
        <ellipse cx="320" cy="180" rx="380" ry="42" fill="url(#s05_cloudWhisp)"/>
        <ellipse cx="1080" cy="140" rx="460" ry="38" fill="url(#s05_cloudWhisp)"/>
        <ellipse cx="1640" cy="200" rx="320" ry="38" fill="url(#s05_cloudWhisp)"/>
        <ellipse cx="780" cy="280" rx="540" ry="32" fill="url(#s05_cloudWhisp)" opacity="0.7"/>
        <ellipse cx="1480" cy="320" rx="380" ry="28" fill="url(#s05_cloudWhisp)" opacity="0.65"/>
      </g>

      <!-- AURA before island -->
      <ellipse cx="980" cy="555" rx="760" ry="300" fill="url(#s05_aura)" opacity="0">
        <animate attributeName="opacity"
          values="0;0;0.25;0.6;0.9;1"
          keyTimes="0;0.18;0.42;0.65;0.85;1"
          dur="8s" fill="freeze"
          calcMode="spline"
          keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
      </ellipse>

      <!-- SHIMMER pre-rivelazione -->
      <g filter="url(#s05_bloomSoft)">
        <ellipse cx="970" cy="540" rx="320" ry="80" fill="url(#s05_shimmer)" opacity="0">
          <animate attributeName="opacity"
            values="0;0;0.4;0.7;0.55;0.2;0"
            keyTimes="0;0.1;0.22;0.32;0.42;0.52;0.62"
            dur="8s" fill="freeze"
            calcMode="spline"
            keySplines="0.42 0 0.58 1;0.25 0.46 0.45 0.94;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
          <animate attributeName="rx"
            values="240;280;320;360;380"
            keyTimes="0;0.25;0.45;0.65;1"
            dur="8s" fill="freeze"/>
        </ellipse>
      </g>

      <!-- DUST cyanati pre-rivelazione (galleggiano nell'aria) -->
      <g>
        <use href="#s05_dustCyan" x="780" y="500">
          <animate attributeName="y" values="500;420;360" dur="6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.65;0.4;0" dur="6s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_dustCyan" x="900" y="480">
          <animate attributeName="y" values="480;390;320" dur="7s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.7;0.45;0" dur="7s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_dustCyan" x="1040" y="520">
          <animate attributeName="y" values="520;430;360" dur="6.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.6;0.4;0" dur="6.5s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_dustCyan" x="1180" y="500">
          <animate attributeName="y" values="500;410;340" dur="7.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.55;0.35;0" dur="7.5s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_dustCyan" x="1320" y="490">
          <animate attributeName="y" values="490;400;330" dur="6.8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.6;0.4;0" dur="6.8s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_dustCyan" x="640" y="510">
          <animate attributeName="y" values="510;410;340" dur="8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.55;0.35;0" dur="8s" repeatCount="indefinite"/>
        </use>
      </g>

      <!-- ISLAND progressive reveal -->
      <g class="island" opacity="0">
        <animate attributeName="opacity"
          values="0;0;0.12;0.42;0.78;0.98;1"
          keyTimes="0;0.18;0.3;0.5;0.72;0.92;1"
          dur="8s" fill="freeze"
          calcMode="spline"
          keySplines="0.42 0 0.58 1;0 0 0.2 1;0 0 0.2 1;0 0 0.2 1;0.42 0 0.58 1;0.42 0 0.58 1"/>

        <!-- Far ridge -->
        <path d="M 380,640 L 460,580 L 580,560 L 720,540 L 880,530 L 1040,535 L 1200,545 L 1340,560 L 1460,580 L 1540,605 L 1540,680 L 380,680 Z"
              fill="url(#s05_islandFar)" stroke="#3A335A" stroke-width="1.8" stroke-linejoin="round" opacity="0.85"/>

        <!-- Main mass -->
        <path d="M 520,650 L 600,560 L 680,540 L 760,500 L 840,460 L 920,430 L 1000,415 L 1100,420 L 1200,455 L 1280,490 L 1340,540 L 1390,610 L 1400,680 L 520,680 Z"
              fill="url(#s05_islandNear)" stroke="#2A2444" stroke-width="2" stroke-linejoin="round"/>

        <!-- Architectural rocks -->
        <polygon points="600,640 640,580 680,640" fill="#544A7C" stroke="#2A2444" stroke-width="1.5"/>
        <polygon points="700,600 740,540 780,600" fill="#574E84" stroke="#2A2444" stroke-width="1.5"/>
        <polygon points="1260,640 1300,580 1340,640" fill="#544A7C" stroke="#2A2444" stroke-width="1.5"/>

        <!-- Geometric palms -->
        <g transform="translate(820 460)">
          <line x1="0" y1="0" x2="0" y2="62" stroke="#2A2444" stroke-width="3"/>
          <path d="M 0,0 Q -28,-18 -52,4" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
          <path d="M 0,0 Q 28,-18 52,4" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
          <path d="M 0,5 Q -32,5 -46,32" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
          <path d="M 0,5 Q 32,5 46,32" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
        </g>
        <g transform="translate(1150 470)">
          <line x1="0" y1="0" x2="0" y2="58" stroke="#2A2444" stroke-width="3"/>
          <path d="M 0,0 Q -28,-18 -52,4" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
          <path d="M 0,0 Q 28,-18 52,4" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
          <path d="M 0,5 Q -32,5 -46,32" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
          <path d="M 0,5 Q 32,5 46,32" fill="none" stroke="#574E84" stroke-width="3" stroke-linecap="round"/>
        </g>

        <!-- CRYSTALLINE TOWER -->
        <g>
          <polygon points="960,180 1006,250 996,640 924,640 914,250"
                   fill="url(#s05_tower)" stroke="#2A2444" stroke-width="2"/>
          <polygon points="960,180 1006,250 914,250" fill="#C0B5DF" stroke="#2A2444" stroke-width="2"/>
          <line x1="960" y1="200" x2="960" y2="635" stroke="#3D365E" stroke-width="1" opacity="0.75"/>
          <line x1="948" y1="260" x2="948" y2="635" stroke="#3D365E" stroke-width="0.8" opacity="0.55"/>
          <line x1="972" y1="260" x2="972" y2="635" stroke="#3D365E" stroke-width="0.8" opacity="0.55"/>
          <polygon points="960,180 988,232 932,232" fill="#E0D5F5" opacity="0.88">
            <animate attributeName="opacity"
              values="0.65;0.95;0.7;0.92;0.75"
              keyTimes="0;0.3;0.55;0.78;1"
              dur="8s" fill="freeze"/>
          </polygon>
        </g>
      </g>

      <!-- FOG bank, 3-phase -->
      <g opacity="1">
        <animate attributeName="opacity"
          values="1;0.96;0.78;0.5;0.22;0.06;0"
          keyTimes="0;0.15;0.32;0.5;0.7;0.88;1"
          dur="8s" fill="freeze"/>
        <rect x="-100" y="430" width="2120" height="250" fill="url(#s05_fog)"/>
        <ellipse cx="500" cy="540" rx="450" ry="80" fill="#E8EAEC" opacity="0.9"/>
        <ellipse cx="1300" cy="520" rx="500" ry="90" fill="#E0E3E7" opacity="0.85"/>
        <ellipse cx="960" cy="610" rx="600" ry="58" fill="#D2D6DB" opacity="0.7"/>
        <g>
          <animateTransform attributeName="transform" type="translate"
            values="0 0; 70 -8; 140 -16"
            keyTimes="0;0.5;1" dur="8s" fill="freeze"/>
          <ellipse cx="200" cy="500" rx="280" ry="32" fill="#E8EAEC" opacity="0.55"/>
          <ellipse cx="1500" cy="555" rx="320" ry="28" fill="#E0E3E7" opacity="0.5"/>
        </g>
      </g>

      <g opacity="1">
        <animate attributeName="opacity"
          values="1;0.92;0.62;0.32;0.12;0.06"
          keyTimes="0;0.2;0.45;0.68;0.86;1"
          dur="8s" fill="freeze"/>
        <ellipse cx="700" cy="635" rx="420" ry="48" fill="#D8DBE0" opacity="0.7"/>
        <ellipse cx="1200" cy="640" rx="380" ry="44" fill="#D8DBE0" opacity="0.65"/>
      </g>

      <!-- OCEAN — 3 LAYER PARALLAX (slow) -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -22 0; -44 0"
          keyTimes="0;0.5;1" dur="8s" fill="freeze"/>
        <rect x="0" y="700" width="1920" height="80" fill="url(#s05_seaFar)"/>
        <use href="#s05_waveBack" x="-100" y="720" fill="#FFFFFF" opacity="0.42">
          <animate attributeName="x" values="-100;-260;-100" dur="20s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_waveBack" x="-200" y="745" fill="#FFFFFF" opacity="0.32">
          <animate attributeName="x" values="-200;-40;-200" dur="22s" repeatCount="indefinite"/>
        </use>

        <rect x="0" y="780" width="1920" height="120" fill="url(#s05_seaMid)"/>
        <use href="#s05_waveMid" x="-50" y="800" fill="#FFFFFF" opacity="0.55">
          <animate attributeName="x" values="-50;-280;-50" dur="16s" repeatCount="indefinite"/>
        </use>
        <use href="#s05_waveMid" x="-150" y="840" fill="#FFFFFF" opacity="0.42">
          <animate attributeName="x" values="-150;30;-150" dur="13s" repeatCount="indefinite"/>
        </use>

        <rect x="0" y="900" width="1920" height="180" fill="url(#s05_seaClose)"/>
        <use href="#s05_waveMid" x="0" y="920" fill="#E6EEF6" opacity="0.6" transform="scale(1.6 1)">
          <animate attributeName="x" values="0;-180;0" dur="11s" repeatCount="indefinite"/>
        </use>
      </g>

      <!-- DISTANT GULLS che virano -->
      <g>
        <use href="#s05_gull" x="600" y="280" width="24" height="16">
          <animateTransform attributeName="transform" type="translate"
            values="0 0;-22 -4;-44 4;-66 -6;-90 -3"
            keyTimes="0;0.25;0.5;0.75;1" dur="8s" fill="freeze"/>
        </use>
        <use href="#s05_gull" x="780" y="220" width="20" height="14">
          <animateTransform attributeName="transform" type="translate"
            values="0 0;-26 6;-52 -5;-78 4;-105 -4"
            keyTimes="0;0.25;0.5;0.75;1" dur="8s" fill="freeze"/>
        </use>
        <use href="#s05_gull" x="1240" y="260" width="22" height="14">
          <animateTransform attributeName="transform" type="translate"
            values="0 0;-20 4;-40 -5;-60 3;-85 -4"
            keyTimes="0;0.25;0.5;0.75;1" dur="8s" fill="freeze"/>
        </use>
        <use href="#s05_gull" x="1480" y="320" width="16" height="11">
          <animateTransform attributeName="transform" type="translate"
            values="0 0;-18 -3;-36 4;-54 -5;-75 -3"
            keyTimes="0;0.25;0.5;0.75;1" dur="8s" fill="freeze"/>
        </use>
      </g>

      <!-- LOOKOUT su crow's nest (foreground parallax) -->
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 26 2; 52 4"
          keyTimes="0;0.5;1" dur="8s" fill="freeze"/>

        <g transform="translate(180 740)">
          <!-- Mast -->
          <rect x="-4" y="0" width="8" height="280" fill="url(#s05_char)"/>
          <!-- Crow's nest barrel -->
          <path d="M -52,0 L 52,0 L 44,-28 L -44,-28 Z" fill="url(#s05_char)"/>
          <rect x="-50" y="-32" width="100" height="6" fill="#020306"/>
          <!-- Inner ribs -->
          <line x1="-32" y1="0" x2="-32" y2="-28" stroke="#1F1410" stroke-width="1.2" opacity="0.6"/>
          <line x1="0" y1="0" x2="0" y2="-28" stroke="#1F1410" stroke-width="1.2" opacity="0.6"/>
          <line x1="32" y1="0" x2="32" y2="-28" stroke="#1F1410" stroke-width="1.2" opacity="0.6"/>

          <!-- Lookout figure with body structure -->
          <g>
            <animateTransform attributeName="transform" type="rotate"
              values="0;0.8;-0.4;0.6;0"
              keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"
              additive="sum"/>

            <!-- Body / torso (back view) -->
            <path d="M -22,-32 L -28,-92 L 28,-92 L 22,-32 Z" fill="url(#s05_char)"/>
            <!-- Shoulders -->
            <path d="M -32,-92 L 32,-92 L 28,-100 L -28,-100 Z" fill="url(#s05_char)"/>
            <!-- Neck -->
            <rect x="-7" y="-110" width="14" height="10" fill="url(#s05_char)"/>
            <!-- Head -->
            <ellipse cx="0" cy="-122" rx="15" ry="17" fill="url(#s05_char)"/>
            <!-- Bandana (wraps head, knot on back) -->
            <path d="M -16,-130 L 16,-130 L 18,-122 L -18,-122 Z" fill="#3D365E"/>
            <path d="M 12,-126 L 22,-114 L 16,-112 L 8,-122 Z" fill="#3D365E"/>

            <!-- Right arm holding cannocchiale -->
            <g>
              <animateTransform attributeName="transform" type="rotate"
                values="-15 -8 -90; -10 -8 -90; -15 -8 -90"
                keyTimes="0;0.5;1" dur="6s" repeatCount="indefinite"/>
              <path d="M 22,-100 L 78,-118 L 84,-110 L 28,-92 Z" fill="url(#s05_char)"/>
              <!-- Cannocchiale (telescope) -->
              <rect x="74" y="-122" width="34" height="10" fill="#3A322B" stroke="#020306" stroke-width="1.2"/>
              <rect x="106" y="-124" width="10" height="14" fill="#5C4F44" stroke="#020306" stroke-width="1"/>
            </g>

            <!-- Rim light right side -->
            <path d="M 22,-92 L 28,-32 L 32,-32 L 26,-92 Z" fill="url(#s05_charRim)"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.04" filter="url(#s05_painterly)" pointer-events="none"/>

  <!-- Vignette -->
  <radialGradient id="s05_vig" cx="50%" cy="50%" r="80%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.42"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#s05_vig)" pointer-events="none"/>
</svg>
