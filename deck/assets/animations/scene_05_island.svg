<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 05 — Mysterious island appears">
  <title>Scene 05 — Isola appare (WOW 2)</title>
  <desc>Isola misteriosa emerge da banco di nebbia. Blue-violet light sull'isola, no orange. 8 secondi.</desc>

  <defs>
    <!-- Sky overcast -->
    <linearGradient id="skyOver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9CFD4"/>
      <stop offset="60%" stop-color="#B6BEC4"/>
      <stop offset="100%" stop-color="#9CA5AB"/>
    </linearGradient>

    <!-- Ocean overcast -->
    <linearGradient id="oceanOver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6A7F8E"/>
      <stop offset="100%" stop-color="#3F5564"/>
    </linearGradient>

    <!-- Fog bank gradient (animated opacity in groups) -->
    <linearGradient id="fogGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EAEC" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#E0E3E7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D2D6DB" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Island silhouette — blue-violet otherworldly -->
    <linearGradient id="islandViolet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B6FA8"/>
      <stop offset="55%" stop-color="#574E84"/>
      <stop offset="100%" stop-color="#3D365E"/>
    </linearGradient>

    <linearGradient id="towerViolet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9C8FC4"/>
      <stop offset="100%" stop-color="#574E84"/>
    </linearGradient>

    <!-- Soft cool glow around island -->
    <radialGradient id="islandAura" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#A89BC8" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#7B6FA8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#574E84" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle ocean waves -->
    <path id="wave5" d="M 0,40 Q 100,10 200,40 T 400,40 T 600,40 T 800,40 T 1000,40 T 1200,40 T 1400,40 T 1600,40 T 1800,40 T 2000,40 L 2000,90 L 0,90 Z"/>

    <!-- Painterly noise -->
    <filter id="painterly5" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.55  0 0 0 0 0.6  0 0 0 0.05 0"/>
    </filter>
  </defs>

  <!-- Slow zoom-in simulated via scale -->
  <g class="zoom-group" transform="translate(960 540)">
    <animateTransform attributeName="transform" type="translate"
      values="960 540; 960 540" keyTimes="0;1" dur="8s" fill="freeze"/>
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1; 1.04; 1.08; 1.12" keyTimes="0;0.4;0.7;1" dur="8s" fill="freeze"/>

      <!-- Center the content -->
      <g transform="translate(-960 -540)">
        <!-- Sky -->
        <rect x="0" y="0" width="1920" height="700" fill="url(#skyOver)"/>

        <!-- Cool soft aura behind island -->
        <ellipse cx="960" cy="540" rx="720" ry="280" fill="url(#islandAura)" opacity="0">
          <animate attributeName="opacity" values="0;0;0.3;0.7;0.9" keyTimes="0;0.15;0.5;0.8;1" dur="8s" fill="freeze"/>
        </ellipse>

        <!-- ============== ISLAND (revealed progressively) ============== -->
        <g class="island" opacity="0">
          <animate attributeName="opacity" values="0;0;0.15;0.55;0.85;1" keyTimes="0;0.15;0.3;0.55;0.8;1" dur="8s" fill="freeze"/>

          <!-- Main island mass (geometric-yet-organic) -->
          <path d="
            M 540,640
            L 600,560
            L 680,540
            L 760,500
            L 840,460
            L 920,430
            L 1000,415
            L 1100,420
            L 1200,455
            L 1280,490
            L 1340,540
            L 1380,610
            L 1380,680
            L 540,680 Z
          " fill="url(#islandViolet)" stroke="#2A2444" stroke-width="2" stroke-linejoin="round"/>

          <!-- Architectural symmetric rocks left -->
          <polygon points="600,640 640,580 680,640" fill="#4D456E" stroke="#2A2444" stroke-width="1.5"/>
          <polygon points="700,600 740,540 780,600" fill="#574E84" stroke="#2A2444" stroke-width="1.5"/>

          <!-- Palm-like too-symmetrical shapes -->
          <g transform="translate(820 460)">
            <line x1="0" y1="0" x2="0" y2="60" stroke="#2A2444" stroke-width="3"/>
            <!-- Symmetric "fronds" -->
            <path d="M 0,0 Q -25,-15 -45,5" fill="none" stroke="#574E84" stroke-width="3"/>
            <path d="M 0,0 Q 25,-15 45,5" fill="none" stroke="#574E84" stroke-width="3"/>
            <path d="M 0,5 Q -30,5 -40,30" fill="none" stroke="#574E84" stroke-width="3"/>
            <path d="M 0,5 Q 30,5 40,30" fill="none" stroke="#574E84" stroke-width="3"/>
          </g>
          <g transform="translate(1150 470)">
            <line x1="0" y1="0" x2="0" y2="55" stroke="#2A2444" stroke-width="3"/>
            <path d="M 0,0 Q -25,-15 -45,5" fill="none" stroke="#574E84" stroke-width="3"/>
            <path d="M 0,0 Q 25,-15 45,5" fill="none" stroke="#574E84" stroke-width="3"/>
            <path d="M 0,5 Q -30,5 -40,30" fill="none" stroke="#574E84" stroke-width="3"/>
            <path d="M 0,5 Q 30,5 40,30" fill="none" stroke="#574E84" stroke-width="3"/>
          </g>

          <!-- ============== TALL CRYSTALLINE TOWER (signature) ============== -->
          <g class="crystal-tower">
            <polygon points="960,200 1000,260 990,640 930,640 920,260" fill="url(#towerViolet)" stroke="#2A2444" stroke-width="2"/>
            <polygon points="960,200 1000,260 920,260" fill="#9C8FC4" stroke="#2A2444" stroke-width="2"/>
            <!-- Subtle inner facets -->
            <line x1="960" y1="220" x2="960" y2="630" stroke="#3D365E" stroke-width="1" opacity="0.7"/>
            <line x1="950" y1="270" x2="950" y2="635" stroke="#3D365E" stroke-width="0.8" opacity="0.5"/>
            <line x1="970" y1="270" x2="970" y2="635" stroke="#3D365E" stroke-width="0.8" opacity="0.5"/>
            <!-- Top apex highlight -->
            <polygon points="960,200 985,250 935,250" fill="#C6BDDD" opacity="0.85"/>
          </g>
        </g>

        <!-- ============== FOG BANK (dissipates) ============== -->
        <g class="fog-front" opacity="1">
          <animate attributeName="opacity" values="1;0.95;0.7;0.4;0.15;0" keyTimes="0;0.15;0.35;0.55;0.75;0.95" dur="8s" fill="freeze"/>
          <rect x="-100" y="430" width="2120" height="240" fill="url(#fogGrad)"/>
          <ellipse cx="500" cy="540" rx="450" ry="80" fill="#E8EAEC" opacity="0.9"/>
          <ellipse cx="1300" cy="520" rx="500" ry="90" fill="#E0E3E7" opacity="0.85"/>
          <ellipse cx="960" cy="600" rx="600" ry="60" fill="#D2D6DB" opacity="0.7"/>
        </g>

        <g class="fog-mid" opacity="1">
          <animate attributeName="opacity" values="1;0.9;0.6;0.3;0.1;0.05" keyTimes="0;0.2;0.45;0.65;0.85;1" dur="8s" fill="freeze"/>
          <ellipse cx="700" cy="630" rx="420" ry="50" fill="#D8DBE0" opacity="0.7"/>
          <ellipse cx="1200" cy="640" rx="380" ry="45" fill="#D8DBE0" opacity="0.65"/>
        </g>

        <!-- Ocean -->
        <rect x="0" y="700" width="1920" height="380" fill="url(#oceanOver)"/>

        <!-- Waves -->
        <g opacity="0.5">
          <use href="#wave5" x="-100" y="780" fill="#FFFFFF">
            <animate attributeName="x" values="-100;-250;-100" dur="15s" repeatCount="indefinite"/>
          </use>
          <use href="#wave5" x="-200" y="880" fill="#FFFFFF" opacity="0.7">
            <animate attributeName="x" values="-200;-50;-200" dur="12s" repeatCount="indefinite"/>
          </use>
        </g>

        <!-- Lookout silhouette in crow's nest (foreground left, pointing) -->
        <g class="lookout" transform="translate(180 700)">
          <!-- Mast -->
          <rect x="-3" y="0" width="6" height="280" fill="#1A1410"/>
          <!-- Crow's nest -->
          <path d="M -40,0 L 40,0 L 30,-20 L -30,-20 Z" fill="#15100B"/>
          <!-- Lookout figure (back view, silhouette) -->
          <circle cx="0" cy="-50" r="18" fill="#15100B"/>
          <path d="M -22,-32 L 22,-32 L 18,5 L -18,5 Z" fill="#15100B"/>
          <!-- Arm pointing forward (right) -->
          <line x1="14" y1="-25" x2="80" y2="-30" stroke="#15100B" stroke-width="8" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Subtle painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0" filter="url(#painterly5)" pointer-events="none"/>

  <!-- Vignette -->
  <radialGradient id="vig05" cx="50%" cy="50%" r="80%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vig05)" pointer-events="none"/>
</svg>
