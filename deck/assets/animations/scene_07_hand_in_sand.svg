<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 07 — Weathered hand digging in white sand">
  <title>Scene 07 — Mano nella sabbia, scopre qualcosa</title>
  <desc>Macro di mano weathered che scava nella sabbia bianca. Sabbia che cade tra le dita. No arancione.</desc>

  <defs>
    <radialGradient id="sandBg07" cx="50%" cy="55%" r="78%">
      <stop offset="0%" stop-color="#F2EADA"/>
      <stop offset="55%" stop-color="#E2D8C0"/>
      <stop offset="100%" stop-color="#A89878"/>
    </radialGradient>
    <linearGradient id="skin07" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B68B6E"/>
      <stop offset="100%" stop-color="#6E4F32"/>
    </linearGradient>
    <radialGradient id="hole07" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7A6948"/>
      <stop offset="60%" stop-color="#A89376"/>
      <stop offset="100%" stop-color="#D8C9A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="metalHint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9C8F78"/>
      <stop offset="100%" stop-color="#5A4F38"/>
    </radialGradient>
    <filter id="grain07">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.08  0 0 0 0.05 0"/>
    </filter>
    <radialGradient id="vig07" cx="50%" cy="50%" r="78%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
  </defs>

  <!-- Background sand -->
  <rect width="1920" height="1080" fill="url(#sandBg07)"/>
  <rect width="1920" height="1080" fill="#000" opacity="0.6" filter="url(#grain07)"/>

  <!-- Soft haze top -->
  <rect x="0" y="0" width="1920" height="300" fill="#F5EFE6" opacity="0.4"/>

  <!-- Subtle macro depth-of-field cues (ripples/shadows) -->
  <g opacity="0.18" stroke="#6E5F40" stroke-width="1" fill="none">
    <path d="M 0,820 Q 480,800 960,830 Q 1440,860 1920,820"/>
    <path d="M 0,900 Q 480,880 960,910 Q 1440,940 1920,900"/>
    <path d="M 0,980 Q 480,960 960,990 Q 1440,1020 1920,980"/>
  </g>

  <!-- Slow macro dolly-in -->
  <g transform="translate(960 540)">
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="0.96; 1.0; 1.05; 1.10" keyTimes="0;0.4;0.7;1" dur="8s" fill="freeze"/>

      <!-- ===== Excavation hole — grows over time ===== -->
      <ellipse cx="0" cy="120" rx="160" ry="50" fill="url(#hole07)" opacity="0">
        <animate attributeName="opacity" values="0;0.3;0.6;0.9;1" keyTimes="0;0.3;0.55;0.8;1" dur="8s" fill="freeze"/>
        <animate attributeName="rx" values="100;130;160;200;240" keyTimes="0;0.3;0.55;0.8;1" dur="8s" fill="freeze"/>
        <animate attributeName="ry" values="30;40;50;60;70" keyTimes="0;0.3;0.55;0.8;1" dur="8s" fill="freeze"/>
      </ellipse>

      <!-- Hint of buried metal disc (appears in last 25%) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.5;0.8" keyTimes="0;0.5;0.7;0.8;0.9;1" dur="8s" fill="freeze"/>
        <ellipse cx="-20" cy="140" rx="80" ry="22" fill="url(#metalHint)" stroke="#3A2F22" stroke-width="2"/>
        <path d="M -100,140 Q -20,128 60,140" stroke="#3A2F22" stroke-width="1.5" fill="none" opacity="0.6"/>
      </g>

      <!-- Sand mound piled up at edge of hole -->
      <path d="M -260,90 Q -200,60 -120,80 Q -80,90 -40,80 L -40,140 L -260,140 Z"
            fill="#D8C9A8" stroke="#7A6948" stroke-width="1.5" opacity="0.85"/>
      <path d="M 260,90 Q 200,60 120,80 Q 80,90 40,80 L 40,140 L 260,140 Z"
            fill="#D8C9A8" stroke="#7A6948" stroke-width="1.5" opacity="0.85"/>

      <!-- ===== Falling sand stream (between fingers) ===== -->
      <g fill="#A89376" opacity="0.75">
        <!-- Stream 1 -->
        <ellipse cx="-160" cy="-50" rx="6" ry="14">
          <animate attributeName="cy" values="-50;120;200" dur="1.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.6;0" dur="1.4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="-155" cy="-30" rx="4" ry="10">
          <animate attributeName="cy" values="-30;140;220" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.7;0.5;0" dur="1.2s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="-130" cy="-40" rx="5" ry="12">
          <animate attributeName="cy" values="-40;130;210" dur="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.5;0" dur="1.5s" repeatCount="indefinite"/>
        </ellipse>
        <!-- Stream 2 -->
        <ellipse cx="-80" cy="-50" rx="5" ry="12">
          <animate attributeName="cy" values="-50;120;200" dur="1.3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.5;0" dur="1.3s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="-50" cy="-30" rx="4" ry="10">
          <animate attributeName="cy" values="-30;140;220" dur="1.45s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;0.5;0" dur="1.45s" repeatCount="indefinite"/>
        </ellipse>
        <!-- Tiny grains -->
        <circle cx="-170" cy="40" r="2">
          <animate attributeName="cy" values="-20;80;180" dur="1.1s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.6;0" dur="1.1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-100" cy="20" r="2">
          <animate attributeName="cy" values="-30;70;180" dur="1s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.6;0" dur="1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="-60" cy="50" r="1.8">
          <animate attributeName="cy" values="-20;90;190" dur="1.3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.6;0" dur="1.3s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- ===== WEATHERED HAND (large, foreground, scooping motion) ===== -->
      <g transform="translate(-40 -60)">
        <!-- Sway: subtle scooping -->
        <animateTransform attributeName="transform" type="translate"
          values="-40 -60; -50 -40; -40 -60; -50 -45; -40 -60"
          keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>

        <!-- Palm / back of hand -->
        <path d="M -260,-160 Q -340,-40 -300,140 Q -240,220 -100,210 Q 80,200 160,80 Q 200,-20 140,-100 Q 60,-180 -100,-180 Q -200,-200 -260,-160 Z"
              fill="url(#skin07)" stroke="#2A1810" stroke-width="3" stroke-linejoin="round"/>

        <!-- Knuckles -->
        <ellipse cx="-100" cy="-80" rx="22" ry="16" fill="#8B6647" opacity="0.8"/>
        <ellipse cx="-20" cy="-100" rx="22" ry="16" fill="#8B6647" opacity="0.8"/>
        <ellipse cx="60" cy="-80" rx="22" ry="16" fill="#8B6647" opacity="0.8"/>
        <ellipse cx="120" cy="-40" rx="20" ry="14" fill="#8B6647" opacity="0.8"/>

        <!-- Veins / wrinkle lines -->
        <path d="M -240,-100 Q -180,-50 -100,-60" fill="none" stroke="#2A1810" stroke-width="2" opacity="0.5"/>
        <path d="M -240,-20 Q -160,30 -60,20" fill="none" stroke="#2A1810" stroke-width="2" opacity="0.5"/>
        <path d="M -220,60 Q -130,110 -20,100" fill="none" stroke="#2A1810" stroke-width="2" opacity="0.4"/>
        <path d="M -180,140 Q -100,170 0,160" fill="none" stroke="#2A1810" stroke-width="1.5" opacity="0.4"/>

        <!-- Fingers extended into sand (5 fingers, slight gaps between) -->
        <g fill="url(#skin07)" stroke="#2A1810" stroke-width="3" stroke-linejoin="round">
          <!-- Thumb (above) -->
          <path d="M 140,-100 Q 200,-160 250,-130 Q 280,-90 240,-60 Q 200,-40 160,-60 Z"/>
          <!-- Index -->
          <path d="M -100,210 Q -120,260 -100,290 Q -70,295 -60,260 Q -55,225 -70,210 Z"/>
          <!-- Middle -->
          <path d="M -30,215 Q -40,275 -10,300 Q 25,295 30,260 Q 30,225 10,210 Z"/>
          <!-- Ring -->
          <path d="M 50,205 Q 50,260 80,285 Q 110,280 110,245 Q 105,215 85,200 Z"/>
          <!-- Pinky -->
          <path d="M 130,180 Q 140,225 160,245 Q 185,240 185,210 Q 175,185 155,175 Z"/>
        </g>

        <!-- Nail hints -->
        <g fill="#2A1810" opacity="0.45">
          <ellipse cx="-80" cy="285" rx="9" ry="4"/>
          <ellipse cx="-5" cy="295" rx="9" ry="4"/>
          <ellipse cx="85" cy="280" rx="9" ry="4"/>
          <ellipse cx="165" cy="238" rx="7" ry="3.5"/>
        </g>
      </g>

      <!-- Shadow under hand (long, low sun) -->
      <ellipse cx="200" cy="180" rx="320" ry="40" fill="#1A1614" opacity="0.3"/>
    </g>
  </g>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vig07)" pointer-events="none"/>
</svg>
