<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 07 — Mano scava nella sabbia (Cartoon Saloon)">
  <title>Scene 07 — Macro mano weathered che scava nella sabbia, pre-WOW3</title>
  <desc>Cartoon Saloon: macro close-up mano weathered che scava nella sabbia bianca con grain texture (turbulence 0.65). Dita affondano e granelli cadono. Anello brass sul pollice (continuita con scene 08A). Sotto la sabbia si intravede un riflesso metallico cool-tone (NON ancora arancione). Atmosfera contemplativa, dust particles sospesi. Vignette. Zero arancione, zero volto, zero testo.</desc>

  <defs>
    <linearGradient id="s07_skyHaze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8DDC8"/>
      <stop offset="55%" stop-color="#E0CFA8"/>
      <stop offset="100%" stop-color="#C9B58E"/>
    </linearGradient>
    <linearGradient id="s07_sandFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2E8D6"/>
      <stop offset="100%" stop-color="#D5C39A"/>
    </linearGradient>
    <linearGradient id="s07_sandMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8DDC8"/>
      <stop offset="100%" stop-color="#A88B58"/>
    </linearGradient>
    <linearGradient id="s07_sandClose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D5C39A"/>
      <stop offset="55%" stop-color="#A88B58"/>
      <stop offset="100%" stop-color="#6E5C38"/>
    </linearGradient>
    <radialGradient id="s07_holeShadow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2A1A0E" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#5C4226" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A88B58" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s07_metalGleam" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#D2DEEA" stop-opacity="0.85"/>
      <stop offset="42%" stop-color="#8B9DAE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3F5A6E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s07_skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A88058"/>
      <stop offset="55%" stop-color="#6E4E2C"/>
      <stop offset="100%" stop-color="#3A2410"/>
    </linearGradient>
    <linearGradient id="s07_skinRim" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFE9C2" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFE9C2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s07_skinShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A2410" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3A2410" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="s07_brass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A35C"/>
      <stop offset="55%" stop-color="#8B6E3C"/>
      <stop offset="100%" stop-color="#3A2818"/>
    </linearGradient>
    <linearGradient id="s07_sleeve" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A1A0E"/>
      <stop offset="100%" stop-color="#0A0805"/>
    </linearGradient>
    <filter id="s07_sandGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.25  0 0 0 0.42 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="s07_sandFine" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="29"/>
      <feColorMatrix values="0 0 0 0 0.42  0 0 0 0 0.30  0 0 0 0 0.16  0 0 0 0.28 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="s07_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="47"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="s07_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="s07_metalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <radialGradient id="s07_vig" cx="50%" cy="50%" r="78%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <circle id="s07_dust" r="2" fill="#FFE9C2" filter="url(#s07_softGlow)"/>
    <circle id="s07_grain" r="2.5" fill="#A88B58"/>
  </defs>

  <!-- BACKGROUND SPIAGGIA -->
  <rect x="0" y="0" width="1920" height="380" fill="url(#s07_skyHaze)"/>

  <rect x="0" y="380" width="1920" height="180" fill="url(#s07_sandFar)"/>
  <rect x="0" y="380" width="1920" height="180" fill="url(#s07_sandFar)" filter="url(#s07_sandGrain)" opacity="0.35"/>

  <path d="M 0,540 Q 480,520 960,540 Q 1440,560 1920,540 L 1920,720 L 0,720 Z" fill="url(#s07_sandMid)"/>
  <path d="M 0,540 Q 480,520 960,540 Q 1440,560 1920,540 L 1920,720 L 0,720 Z" fill="url(#s07_sandMid)" filter="url(#s07_sandGrain)" opacity="0.5"/>

  <path d="M 0,700 Q 480,680 960,710 Q 1440,740 1920,700 L 1920,1080 L 0,1080 Z" fill="url(#s07_sandClose)"/>
  <path d="M 0,700 Q 480,680 960,710 Q 1440,740 1920,700 L 1920,1080 L 0,1080 Z" fill="url(#s07_sandClose)" filter="url(#s07_sandFine)" opacity="0.7"/>

  <g stroke="#8B6E3C" stroke-width="1.2" opacity="0.32" fill="none">
    <path d="M 0,820 Q 240,810 480,820 Q 720,830 960,820 Q 1200,810 1440,820 Q 1680,830 1920,820"/>
    <path d="M 0,880 Q 240,872 480,884 Q 720,894 960,884 Q 1200,872 1440,884 Q 1680,896 1920,884"/>
    <path d="M 0,940 Q 240,934 480,948 Q 720,958 960,948 Q 1200,934 1440,948 Q 1680,958 1920,946"/>
    <path d="M 0,1010 Q 240,1000 480,1014 Q 720,1024 960,1014 Q 1200,1000 1440,1014 Q 1680,1024 1920,1014"/>
  </g>

  <g>
    <ellipse cx="260" cy="900" rx="10" ry="6" fill="#6E5C38" stroke="#3A2818" stroke-width="0.8"/>
    <ellipse cx="320" cy="940" rx="6" ry="4" fill="#8B7050" stroke="#3A2818" stroke-width="0.6"/>
    <ellipse cx="1620" cy="880" rx="9" ry="5" fill="#6E5C38" stroke="#3A2818" stroke-width="0.8"/>
    <ellipse cx="1680" cy="920" rx="7" ry="4" fill="#8B7050" stroke="#3A2818" stroke-width="0.6"/>
    <ellipse cx="220" cy="1000" rx="12" ry="7" fill="#5C4226" stroke="#1A0F08" stroke-width="0.8"/>
    <ellipse cx="1700" cy="1020" rx="11" ry="6" fill="#6E5C38" stroke="#3A2818" stroke-width="0.8"/>
  </g>

  <!-- BUCO NELLA SABBIA + RIFLESSO METALLICO -->
  <g transform="translate(960 800)">
    <ellipse cx="0" cy="0" rx="200" ry="56" fill="#A88B58" stroke="#5C4226" stroke-width="1.5" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="200" ry="56" fill="url(#s07_holeShadow)"/>
    <g fill="#C9B58E" opacity="0.7">
      <ellipse cx="-180" cy="-10" rx="40" ry="8"/>
      <ellipse cx="-120" cy="-22" rx="34" ry="7"/>
      <ellipse cx="0" cy="-30" rx="48" ry="9"/>
      <ellipse cx="130" cy="-22" rx="38" ry="8"/>
      <ellipse cx="190" cy="-8" rx="36" ry="7"/>
    </g>

    <ellipse cx="0" cy="6" rx="140" ry="34" fill="#3A2410"/>
    <ellipse cx="0" cy="6" rx="140" ry="34" fill="url(#s07_holeShadow)" opacity="0.85"/>
    <ellipse cx="0" cy="10" rx="110" ry="22" fill="#1A0F08"/>

    <!-- RIFLESSO METALLICO cool-tone (NON arancione, pre-WOW3) -->
    <g opacity="0.92">
      <animate attributeName="opacity"
        values="0.5;0.9;0.6;0.95;0.55"
        keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="12" rx="60" ry="14" fill="url(#s07_metalGleam)" filter="url(#s07_metalGlow)"/>
      <ellipse cx="-10" cy="10" rx="30" ry="7" fill="#D2DEEA" opacity="0.7" filter="url(#s07_softGlow)"/>
      <path d="M -54,16 Q -32,6 0,4 Q 32,6 54,16" fill="none" stroke="#8B9DAE" stroke-width="2.2" opacity="0.85"/>
      <path d="M -38,18 Q -20,10 0,8 Q 20,10 38,18" fill="none" stroke="#D2DEEA" stroke-width="1.4" opacity="0.7"/>
    </g>
  </g>

  <!-- MANO WEATHERED -->
  <g transform="translate(960 700)">
    <animateTransform attributeName="transform" type="translate"
      values="960 700; 960 706; 960 700; 960 704; 960 700"
      keyTimes="0;0.25;0.5;0.75;1" dur="3.4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>

    <!-- AVAMBRACCIO con manica cappotto -->
    <path d="M -160,-260 L -140,-100 L 140,-100 L 160,-260 L 120,-280 L -120,-280 Z" fill="url(#s07_sleeve)" stroke="#020306" stroke-width="2"/>
    <path d="M -140,-100 L 140,-100 L 130,-80 L -130,-80 Z" fill="#0A0805" stroke="#020306" stroke-width="1.5"/>
    <g stroke="#000000" stroke-width="1.4" fill="none" opacity="0.55">
      <path d="M -90,-260 Q -88,-200 -94,-100"/>
      <path d="M 0,-260 Q 0,-200 0,-100"/>
      <path d="M 90,-260 Q 92,-200 94,-100"/>
    </g>

    <!-- POLSO -->
    <path d="M -130,-80 L 130,-80 L 120,-30 L -120,-30 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="1.8"/>
    <g stroke="#1A0F08" stroke-width="0.9" fill="none" opacity="0.5">
      <path d="M -80,-70 Q -60,-50 -40,-40"/>
      <path d="M 0,-70 Q 0,-50 0,-40"/>
      <path d="M 80,-70 Q 60,-50 40,-40"/>
    </g>

    <!-- PALMO -->
    <path d="M -120,-30 L 120,-30 L 140,40 L 100,120 L -100,120 L -140,40 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="2.2"/>

    <g stroke="#3A2410" stroke-width="1.2" fill="none" opacity="0.6">
      <path d="M -90,-10 Q -40,0 -20,20"/>
      <path d="M -80,30 Q -30,40 10,50"/>
      <path d="M -70,70 Q -20,80 30,82"/>
      <path d="M 60,10 Q 80,30 100,50"/>
      <path d="M 70,50 Q 90,70 100,90"/>
    </g>

    <!-- 5 DITA -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 4; 0 0; 0 3; 0 0"
        keyTimes="0;0.25;0.5;0.75;1" dur="2.6s" repeatCount="indefinite"/>
      <path d="M -100,110 L -126,170 L -98,180 L -76,118 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="1.8"/>
      <path d="M -106,166 Q -110,180 -98,194" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="1.8"/>
      <ellipse cx="-104" cy="172" rx="6" ry="3" fill="#3A2410" opacity="0.55"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 5; 0 0; 0 4; 0 0"
        keyTimes="0;0.25;0.5;0.75;1" dur="2.4s" repeatCount="indefinite" begin="0.15s"/>
      <path d="M -56,118 L -64,190 L -36,198 L -28,120 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="1.8"/>
      <ellipse cx="-50" cy="190" rx="6" ry="3" fill="#3A2410" opacity="0.55"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 6; 0 0; 0 5; 0 0"
        keyTimes="0;0.25;0.5;0.75;1" dur="2.2s" repeatCount="indefinite" begin="0.05s"/>
      <path d="M -16,120 L -16,206 L 14,206 L 18,120 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="1.8"/>
      <ellipse cx="-1" cy="200" rx="6" ry="3" fill="#3A2410" opacity="0.55"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 5; 0 0; 0 4; 0 0"
        keyTimes="0;0.25;0.5;0.75;1" dur="2.5s" repeatCount="indefinite" begin="0.25s"/>
      <path d="M 28,120 L 36,196 L 64,190 L 58,118 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="1.8"/>
      <ellipse cx="48" cy="190" rx="6" ry="3" fill="#3A2410" opacity="0.55"/>
    </g>
    <!-- Pollice con ANELLO BRASS -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 0 3; 0 0; 0 2; 0 0"
        keyTimes="0;0.25;0.5;0.75;1" dur="2.8s" repeatCount="indefinite"/>
      <path d="M 100,30 L 180,40 L 196,90 L 130,118 L 110,80 Z" fill="url(#s07_skin)" stroke="#1A0F08" stroke-width="2"/>
      <ellipse cx="158" cy="65" rx="20" ry="11" fill="url(#s07_brass)" stroke="#1A0F08" stroke-width="1.5" transform="rotate(20 158 65)"/>
      <ellipse cx="158" cy="65" rx="20" ry="11" fill="none" stroke="#C9A35C" stroke-width="1.2" opacity="0.8" transform="rotate(20 158 65)"/>
      <ellipse cx="158" cy="65" rx="14" ry="7" fill="none" stroke="#3A2818" stroke-width="0.8" opacity="0.6" transform="rotate(20 158 65)"/>
      <ellipse cx="180" cy="65" rx="8" ry="4" fill="#3A2410" opacity="0.55" transform="rotate(20 180 65)"/>
    </g>

    <ellipse cx="0" cy="200" rx="120" ry="14" fill="url(#s07_skinShadow)" opacity="0.7"/>

    <path d="M 120,-30 L 140,40 L 100,120 L 110,120 L 150,40 L 130,-30 Z" fill="url(#s07_skinRim)"/>
    <path d="M 160,-260 L 140,-100 L 150,-100 L 168,-260 Z" fill="url(#s07_skinRim)" opacity="0.5"/>
  </g>

  <!-- GRANELLI DI SABBIA CHE CADONO -->
  <g>
    <use href="#s07_grain" x="860" y="820">
      <animate attributeName="y" values="820;920;980" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="1.6s" repeatCount="indefinite"/>
    </use>
    <use href="#s07_grain" x="900" y="830">
      <animate attributeName="y" values="830;930;990" dur="1.4s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="1.4s" repeatCount="indefinite" begin="0.2s"/>
    </use>
    <use href="#s07_grain" x="940" y="820">
      <animate attributeName="y" values="820;920;980" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </use>
    <use href="#s07_grain" x="980" y="830">
      <animate attributeName="y" values="830;930;990" dur="1.7s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="1.7s" repeatCount="indefinite" begin="0.1s"/>
    </use>
    <use href="#s07_grain" x="1020" y="820">
      <animate attributeName="y" values="820;920;980" dur="1.6s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="1.6s" repeatCount="indefinite" begin="0.5s"/>
    </use>
    <use href="#s07_grain" x="1060" y="830">
      <animate attributeName="y" values="830;930;990" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </use>
    <use href="#s07_grain" x="1120" y="800" transform="scale(0.7)">
      <animate attributeName="y" values="1142;1280;1400" dur="1.4s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1.4s" repeatCount="indefinite" begin="0.6s"/>
    </use>
    <use href="#s07_grain" x="1140" y="810" transform="scale(0.7)">
      <animate attributeName="y" values="1158;1300;1420" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
    </use>
  </g>

  <!-- DUST PARTICLES sospesi -->
  <g>
    <use href="#s07_dust" x="380" y="200">
      <animate attributeName="y" values="200;520" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.5;0" dur="11s" repeatCount="indefinite"/>
    </use>
    <use href="#s07_dust" x="560" y="280">
      <animate attributeName="y" values="280;600" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="13s" repeatCount="indefinite"/>
    </use>
    <use href="#s07_dust" x="1400" y="180">
      <animate attributeName="y" values="180;540" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.5;0" dur="12s" repeatCount="indefinite"/>
    </use>
    <use href="#s07_dust" x="1580" y="260">
      <animate attributeName="y" values="260;600" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="14s" repeatCount="indefinite"/>
    </use>
    <use href="#s07_dust" x="240" y="140">
      <animate attributeName="y" values="140;480" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0.35;0" dur="15s" repeatCount="indefinite"/>
    </use>
    <use href="#s07_dust" x="1740" y="160">
      <animate attributeName="y" values="160;500" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="13s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.03" filter="url(#s07_painterly)" pointer-events="none"/>

  <!-- VIGNETTE -->
  <rect width="1920" height="1080" fill="url(#s07_vig)" pointer-events="none"/>
</svg>
