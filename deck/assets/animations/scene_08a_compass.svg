<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 08A — Compass lights up (WOW 3, Disney polish)">
  <title>Scene 08A — La bussola si accende (WOW 3)</title>
  <desc>Disney WOW 3: mano weathered con gradient mesh (3+ stop skin, ambient occlusion sotto le dita), bussola con stroke a peso variabile (6px outline + 3px raggi + 1.5px dettagli), arancione con gradient direzionale (centro caldo → esterno freddo), particelle magiche con anticipation 0.3s. Sabbia con grain. Arancione SOLO dentro alla bussola.</desc>

  <defs>
    <filter id="painterly08a" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="42"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="sandGrain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.44  0 0 0 0 0.30  0 0 0 0.4 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="contactBlur08a" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="softGlow08a" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Sand gradient (warm, single light top-right) -->
    <linearGradient id="sandGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2E0C0"/>
      <stop offset="40%" stop-color="#E8DDC8"/>
      <stop offset="100%" stop-color="#8B6E3C"/>
    </linearGradient>

    <!-- Hand skin (gradient mesh-like, 4 stops) -->
    <radialGradient id="handSkin" cx="30%" cy="20%" r="120%">
      <stop offset="0%" stop-color="#E8C8A0"/>
      <stop offset="35%" stop-color="#C89E70"/>
      <stop offset="70%" stop-color="#8B5C30"/>
      <stop offset="100%" stop-color="#3A2A1A"/>
    </radialGradient>
    <radialGradient id="handShadow" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3A2A1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3A2A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Compass brass case (form shading top-right light) -->
    <radialGradient id="brassCase" cx="32%" cy="22%" r="90%">
      <stop offset="0%" stop-color="#F0D49C"/>
      <stop offset="50%" stop-color="#A87C44"/>
      <stop offset="100%" stop-color="#3F2810"/>
    </radialGradient>

    <!-- Compass face cream -->
    <radialGradient id="faceCream" cx="32%" cy="28%" r="90%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#C8B89A"/>
    </radialGradient>

    <!-- Inner orange glow (centro caldo → esterno freddo) -->
    <radialGradient id="orangeCore" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFE0B0" stop-opacity="1"/>
      <stop offset="30%" stop-color="#FFB570" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#FF6B1A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9C3A0E" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Halo orange external -->
    <radialGradient id="haloOrange" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#FF6B1A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Needle orange (active half) -->
    <linearGradient id="needleOrange08a" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFB570"/>
      <stop offset="100%" stop-color="#9C3A0E"/>
    </linearGradient>
    <linearGradient id="needleDark08a" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3A2C1A"/>
      <stop offset="100%" stop-color="#0A0706"/>
    </linearGradient>

    <radialGradient id="vignette08a" cx="50%" cy="55%" r="65%">
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.36"/>
    </radialGradient>
  </defs>

  <!-- SAND BG -->
  <rect width="1920" height="1080" fill="url(#sandGrad)"/>
  <!-- painterly + sand grain combined -->
  <rect width="1920" height="1080" fill="#8B6E3C" opacity="0.06" filter="url(#painterly08a)"/>
  <rect width="1920" height="1080" fill="#8B6E3C" opacity="0.18" filter="url(#sandGrain)"/>

  <!-- DECORATIVE MANDALA (Cartoon Saloon, orange tinted around compass) -->
  <g transform="translate(960 600)" opacity="0.32" filter="url(#contactBlur08a)">
    <circle r="460" fill="none" stroke="#9C3A0E" stroke-width="1.1" stroke-dasharray="1,9"/>
    <circle r="400" fill="none" stroke="#9C3A0E" stroke-width="1.3" stroke-dasharray="3,7"/>
    <circle r="340" fill="none" stroke="#9C3A0E" stroke-width="1" stroke-dasharray="1,5"/>
    <circle r="280" fill="none" stroke="#9C3A0E" stroke-width="1.5" stroke-dasharray="4,10"/>
    <circle r="220" fill="none" stroke="#9C3A0E" stroke-width="1" stroke-dasharray="2,6"/>
    <g stroke="#9C3A0E" stroke-width="1.4" stroke-linecap="round">
      <line x1="0" y1="-440" x2="0" y2="-422"/>
      <line x1="220" y1="-380" x2="208" y2="-362"/>
      <line x1="380" y1="-220" x2="362" y2="-208"/>
      <line x1="440" y1="0" x2="422" y2="0"/>
      <line x1="380" y1="220" x2="362" y2="208"/>
      <line x1="220" y1="380" x2="208" y2="362"/>
      <line x1="0" y1="440" x2="0" y2="422"/>
      <line x1="-220" y1="380" x2="-208" y2="362"/>
      <line x1="-380" y1="220" x2="-362" y2="208"/>
      <line x1="-440" y1="0" x2="-422" y2="0"/>
      <line x1="-380" y1="-220" x2="-362" y2="-208"/>
      <line x1="-220" y1="-380" x2="-208" y2="-362"/>
    </g>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="100s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- HALO ORANGE (anticipation breathing) -->
  <circle cx="960" cy="540" r="380" fill="url(#haloOrange)" filter="url(#bigGlow)">
    <animate attributeName="r" values="280;420;280" dur="4.6s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4.6s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </circle>

  <!-- SAND IMPRINTS (Bezier curves around compass) -->
  <g stroke="#8B6E3C" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.45">
    <path d="M 460 720 Q 600 700 740 720"/>
    <path d="M 1180 720 Q 1320 700 1460 720"/>
    <path d="M 540 800 Q 700 780 860 800"/>
    <path d="M 1060 800 Q 1220 780 1380 800"/>
  </g>
  <g stroke="#5C3E22" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M 380 820 Q 540 800 700 820"/>
    <path d="M 1220 820 Q 1380 800 1540 820"/>
  </g>

  <!-- COMPASS BODY (centered at 960, 540) -->
  <g transform="translate(960 540)">
    <!-- Contact shadow under compass -->
    <ellipse cx="0" cy="172" rx="180" ry="22" fill="#1A0E04" opacity="0.5" filter="url(#contactBlur08a)"/>

    <!-- OUTER BRASS CASE (6px outline) -->
    <circle r="160" fill="url(#brassCase)" stroke="#1A0E04" stroke-width="6"/>
    <!-- intermediate ring (3px) -->
    <circle r="148" fill="none" stroke="#1A0E04" stroke-width="3" opacity="0.7"/>
    <!-- inner ring -->
    <circle r="132" fill="url(#faceCream)" stroke="#1A0E04" stroke-width="2.5"/>

    <!-- ORANGE CORE GLOW (inside, breathing) -->
    <circle r="120" fill="url(#orangeCore)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>

    <!-- Brass case rim light (cool cyan = complementary) -->
    <path d="M -130 -100 Q -90 -148 0 -160" fill="none"
          stroke="#FFE3C2" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <circle cx="-92" cy="-114" r="5" fill="#FFF" opacity="0.85"/>

    <!-- Cardinal marks (variable: 8 main 3px + 16 intermediate 1.5px) -->
    <g stroke="#1A0E04" stroke-linecap="round">
      <!-- 4 cardinal (3px) -->
      <line x1="0" y1="-130" x2="0" y2="-108" stroke-width="3"/>
      <line x1="130" y1="0" x2="108" y2="0" stroke-width="3"/>
      <line x1="0" y1="130" x2="0" y2="108" stroke-width="3"/>
      <line x1="-130" y1="0" x2="-108" y2="0" stroke-width="3"/>
      <!-- 4 intercardinal (2px) -->
      <line x1="92" y1="-92" x2="78" y2="-78" stroke-width="2"/>
      <line x1="92" y1="92" x2="78" y2="78" stroke-width="2"/>
      <line x1="-92" y1="92" x2="-78" y2="78" stroke-width="2"/>
      <line x1="-92" y1="-92" x2="-78" y2="-78" stroke-width="2"/>
      <!-- 8 intermediate (1.5px) -->
      <line x1="50" y1="-120" x2="44" y2="-104" stroke-width="1.5"/>
      <line x1="120" y1="-50" x2="104" y2="-44" stroke-width="1.5"/>
      <line x1="120" y1="50" x2="104" y2="44" stroke-width="1.5"/>
      <line x1="50" y1="120" x2="44" y2="104" stroke-width="1.5"/>
      <line x1="-50" y1="120" x2="-44" y2="104" stroke-width="1.5"/>
      <line x1="-120" y1="50" x2="-104" y2="44" stroke-width="1.5"/>
      <line x1="-120" y1="-50" x2="-104" y2="-44" stroke-width="1.5"/>
      <line x1="-50" y1="-120" x2="-44" y2="-104" stroke-width="1.5"/>
    </g>

    <!-- NEEDLE (orange + dark, anticipation oscillation) -->
    <g>
      <path d="M 0 -100 L 14 0 L 0 16 L -14 0 Z"
            fill="url(#needleOrange08a)" stroke="#1A0E04" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 0 16 L 14 0 L 0 100 L -14 0 Z"
            fill="url(#needleDark08a)" stroke="#1A0E04" stroke-width="2" stroke-linejoin="round"/>
      <animateTransform attributeName="transform" type="rotate"
                        values="-6;3;-2;5;-6" dur="3.6s" repeatCount="indefinite"
                        calcMode="spline" keyTimes="0;0.25;0.5;0.75;1"
                        keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </g>
    <!-- Pivot dot -->
    <circle r="8" fill="#1A0E04"/>
    <circle r="3" fill="#FFE0B0" opacity="0.9"/>

    <!-- Glass reflection (Disney sparkle, asymmetric) -->
    <path d="M -100 -80 Q -60 -120 0 -130" fill="none"
          stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

    <!-- PULSE RINGS (expanding outward) -->
    <circle r="160" fill="none" stroke="#FF6B1A" stroke-width="2" opacity="0">
      <animate attributeName="r" values="160;280;160" dur="3s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.25 0.1 0.25 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.3;1" keySplines="0.25 0.1 0.25 1;0.42 0 0.58 1"/>
    </circle>
    <circle r="160" fill="none" stroke="#FF6B1A" stroke-width="1.5" opacity="0">
      <animate attributeName="r" values="160;320;160" dur="3s" begin="0.5s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.25 0.1 0.25 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0;0.55;0" dur="3s" begin="0.5s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.3;1" keySplines="0.25 0.1 0.25 1;0.42 0 0.58 1"/>
    </circle>
  </g>

  <!-- MAGIC PARTICLES (anticipation: 0.3s charge then rise) -->
  <g fill="#FFB570">
    <circle cx="840" cy="540" r="2.5" opacity="0">
      <animate attributeName="cy" values="540;540;320" dur="3s" begin="0s" repeatCount="indefinite"
               keyTimes="0;0.1;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.25 0.1 0.25 1"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0s" repeatCount="indefinite"
               keyTimes="0;0.1;1"/>
      <animate attributeName="r" values="1;3;1.5" dur="3s" begin="0s" repeatCount="indefinite" keyTimes="0;0.1;1"/>
    </circle>
    <circle cx="1080" cy="540" r="2.5" opacity="0">
      <animate attributeName="cy" values="540;540;300" dur="3.2s" begin="0.3s" repeatCount="indefinite"
               keyTimes="0;0.1;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.25 0.1 0.25 1"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="0.3s" repeatCount="indefinite"
               keyTimes="0;0.1;1"/>
    </circle>
    <circle cx="920" cy="560" r="2" opacity="0">
      <animate attributeName="cy" values="560;560;340" dur="2.8s" begin="0.6s" repeatCount="indefinite"
               keyTimes="0;0.1;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.25 0.1 0.25 1"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.6s" repeatCount="indefinite"
               keyTimes="0;0.1;1"/>
    </circle>
    <circle cx="1000" cy="560" r="2" opacity="0">
      <animate attributeName="cy" values="560;560;320" dur="3.4s" begin="0.9s" repeatCount="indefinite"
               keyTimes="0;0.1;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.25 0.1 0.25 1"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="0.9s" repeatCount="indefinite"
               keyTimes="0;0.1;1"/>
    </circle>
    <circle cx="880" cy="560" r="2.2" opacity="0">
      <animate attributeName="cy" values="560;560;310" dur="3s" begin="1.2s" repeatCount="indefinite"
               keyTimes="0;0.1;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.25 0.1 0.25 1"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="1.2s" repeatCount="indefinite"
               keyTimes="0;0.1;1"/>
    </circle>
    <circle cx="1040" cy="560" r="2.4" opacity="0">
      <animate attributeName="cy" values="560;560;290" dur="3.2s" begin="1.5s" repeatCount="indefinite"
               keyTimes="0;0.1;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.25 0.1 0.25 1"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="1.5s" repeatCount="indefinite"
               keyTimes="0;0.1;1"/>
    </circle>
  </g>

  <!-- WEATHERED HAND (right side, fingers curling toward compass — line of action S) -->
  <g transform="translate(1340 580)">
    <!-- Ambient occlusion shadow under hand -->
    <ellipse cx="-40" cy="120" rx="180" ry="22" fill="#1A0E04" opacity="0.55" filter="url(#contactBlur08a)"/>

    <!-- Forearm (Bezier, organic taper) -->
    <path d="M 380 -40 C 320 -10 240 30 160 60
             C 100 80 40 90 -20 80 C -20 110 -10 130 30 140
             C 100 142 180 130 260 110 C 340 90 400 60 440 20
             C 440 -10 420 -30 380 -40 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="4" stroke-linejoin="round"/>

    <!-- PALM/back of hand (line of action S curve) -->
    <path d="M -20 80 C -80 70 -150 60 -220 40
             C -250 20 -260 -20 -240 -50
             C -200 -80 -140 -90 -80 -80
             C -50 -70 -30 -50 -20 -20 C -10 10 -20 50 -20 80 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="4.5" stroke-linejoin="round"/>

    <!-- THUMB (Bezier) -->
    <path d="M -180 -60 C -210 -90 -240 -100 -260 -90
             C -270 -70 -260 -50 -230 -40 C -210 -30 -200 -40 -180 -60 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- thumb ring (brass) -->
    <ellipse cx="-220" cy="-65" rx="14" ry="8" fill="none" stroke="#8B6E3C" stroke-width="3"/>
    <ellipse cx="-220" cy="-65" rx="14" ry="8" fill="none" stroke="#F0D49C" stroke-width="1.4" opacity="0.7"/>

    <!-- INDEX FINGER (curling toward compass) -->
    <path d="M -200 30 C -260 40 -320 30 -360 0
             C -380 -10 -390 0 -380 20 C -360 50 -300 70 -240 70
             C -220 70 -210 60 -200 50 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- MIDDLE FINGER -->
    <path d="M -100 90 C -160 110 -230 110 -290 90
             C -320 80 -340 100 -320 120 C -280 140 -200 150 -120 140
             C -100 130 -90 110 -100 90 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- RING FINGER -->
    <path d="M 20 100 C -40 130 -110 140 -180 130
             C -210 130 -230 150 -210 170 C -160 190 -80 195 -10 180
             C 20 165 30 130 20 100 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- LITTLE FINGER -->
    <path d="M 140 110 C 100 140 60 160 0 165
             C -20 175 -10 200 20 200 C 70 200 130 180 170 150
             C 180 130 170 115 140 110 Z"
          fill="url(#handSkin)" stroke="#3A2A1A" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- WRINKLES (weathered, variable weight Bezier) -->
    <g stroke="#3A2A1A" stroke-linecap="round" fill="none" opacity="0.55">
      <path d="M 100 0 C 40 10 -20 20 -80 10" stroke-width="1.8"/>
      <path d="M 120 30 C 60 40 0 50 -60 40" stroke-width="1.4"/>
      <path d="M 200 -20 C 140 -10 80 0 40 -10" stroke-width="1.2"/>
      <path d="M -80 60 C -120 50 -160 40 -200 30" stroke-width="1.4"/>
      <path d="M -40 -10 C -80 -30 -120 -40 -160 -30" stroke-width="1.6"/>
    </g>

    <!-- KNUCKLE shadows (ambient occlusion) -->
    <g fill="url(#handShadow)" opacity="0.7">
      <ellipse cx="-180" cy="20" rx="20" ry="8"/>
      <ellipse cx="-80" cy="80" rx="22" ry="9"/>
      <ellipse cx="40" cy="100" rx="20" ry="8"/>
    </g>

    <!-- RIM LIGHT cool (cyan complementary, from orange compass) -->
    <path d="M -260 -50 C -220 -80 -160 -90 -100 -80" fill="none"
          stroke="#8FE4F4" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
    <path d="M -360 0 C -340 -10 -320 -10 -300 -5" fill="none"
          stroke="#8FE4F4" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

    <!-- WARM rim light on palm (from orange compass) -->
    <path d="M -200 0 C -140 10 -80 20 -20 10" fill="none"
          stroke="#FFB570" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

    <!-- breathing micro-pulse -->
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; -3 0; 0 0" dur="4.6s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </g>

  <!-- VIGNETTE -->
  <rect width="1920" height="1080" fill="url(#vignette08a)" pointer-events="none"/>
</svg>
