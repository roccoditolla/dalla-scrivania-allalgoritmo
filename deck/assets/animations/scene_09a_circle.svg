<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 09A — Crew circle around glowing compass (top-down) — Cartoon Saloon">
  <title>Scene 09A — Cerchio di 5 figure attorno alla bussola arancione</title>
  <desc>Cartoon Saloon: top-down view dall'alto. 5 silhouette character (back-view dall'alto: vedi spalle/teste/cappelli/bandane) disposte in cerchio attorno alla bussola esagonale che brilla arancione al centro. Sabbia con grain. Spill arancione sui personaggi (luce dal basso). Ombre lunghe radiali (rivelazione collettiva). Dust particles arancio.</desc>

  <defs>
    <radialGradient id="s09a_sandBg" cx="50%" cy="50%" r="74%">
      <stop offset="0%" stop-color="#F2E8D6"/>
      <stop offset="55%" stop-color="#E8DDC8"/>
      <stop offset="100%" stop-color="#A89478"/>
    </radialGradient>
    <radialGradient id="s09a_orangePool" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FFCB8A" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#FF8A3A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="s09a_char" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0A06"/>
      <stop offset="100%" stop-color="#1F1812"/>
    </linearGradient>
    <linearGradient id="s09a_charRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFCB8A" stop-opacity="0.8"/>
    </linearGradient>

    <radialGradient id="s09a_metalBody" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#5C4F44"/>
      <stop offset="55%" stop-color="#3F362E"/>
      <stop offset="100%" stop-color="#15110E"/>
    </radialGradient>
    <radialGradient id="s09a_orangeCore" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FFE6B8"/>
      <stop offset="38%" stop-color="#FF9D52"/>
      <stop offset="100%" stop-color="#B33B00" stop-opacity="0.95"/>
    </radialGradient>

    <filter id="s09a_sandGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.20  0 0 0 0 0.16  0 0 0 0 0.10  0 0 0 0.14 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="s09a_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="22"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="s09a_bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s09a_bloomStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="32"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.4"/></feComponentTransfer>
    </filter>
    <filter id="s09a_dustGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <!-- Character from above: shoulders + head + hat. Designed for top-down view -->
    <symbol id="s09a_charA" overflow="visible">
      <!-- Coat-shoulder oval (broad) -->
      <ellipse cx="0" cy="14" rx="58" ry="38" fill="url(#s09a_char)" stroke="#020306" stroke-width="2"/>
      <!-- Belt across shoulders -->
      <path d="M -52,10 Q 0,18 52,10" fill="none" stroke="#3A2818" stroke-width="2.5" opacity="0.75"/>
      <!-- Head (smaller, atop shoulders) -->
      <ellipse cx="0" cy="-24" rx="22" ry="22" fill="url(#s09a_char)" stroke="#020306" stroke-width="2"/>
      <!-- Tricorne hat (3-point) -->
      <path d="M -28,-30 L 28,-30 L 22,-44 L -22,-44 Z" fill="#020306"/>
      <path d="M -32,-30 Q 0,-50 32,-30 L 28,-26 L -28,-26 Z" fill="#020306"/>
      <!-- Rim light from below (orange spill) -->
      <ellipse cx="0" cy="42" rx="50" ry="6" fill="url(#s09a_charRim)" opacity="0.85"/>
      <ellipse cx="0" cy="-8" rx="18" ry="3" fill="#FFCB8A" opacity="0.55"/>
    </symbol>

    <!-- Character B: bandana instead of tricorne -->
    <symbol id="s09a_charB" overflow="visible">
      <ellipse cx="0" cy="14" rx="52" ry="34" fill="url(#s09a_char)" stroke="#020306" stroke-width="2"/>
      <path d="M -48,10 Q 0,16 48,10" fill="none" stroke="#3A2818" stroke-width="2.2" opacity="0.7"/>
      <ellipse cx="0" cy="-22" rx="20" ry="20" fill="url(#s09a_char)" stroke="#020306" stroke-width="2"/>
      <!-- Bandana wrap -->
      <path d="M -22,-30 L 22,-30 L 24,-22 L -24,-22 Z" fill="#1F1812"/>
      <!-- Bandana knot tail -->
      <path d="M 18,-26 L 32,-18 L 22,-14 L 14,-22 Z" fill="#1F1812"/>
      <ellipse cx="0" cy="40" rx="46" ry="5.5" fill="url(#s09a_charRim)" opacity="0.85"/>
      <ellipse cx="0" cy="-8" rx="16" ry="3" fill="#FFCB8A" opacity="0.55"/>
    </symbol>

    <!-- Character C: skullcap + smaller (mozzo/cabin boy) -->
    <symbol id="s09a_charC" overflow="visible">
      <ellipse cx="0" cy="12" rx="46" ry="30" fill="url(#s09a_char)" stroke="#020306" stroke-width="2"/>
      <path d="M -42,8 Q 0,14 42,8" fill="none" stroke="#3A2818" stroke-width="2" opacity="0.7"/>
      <ellipse cx="0" cy="-20" rx="18" ry="18" fill="url(#s09a_char)" stroke="#020306" stroke-width="2"/>
      <!-- Skullcap rounded -->
      <path d="M -18,-26 Q 0,-38 18,-26 L 18,-20 L -18,-20 Z" fill="#0A0805"/>
      <ellipse cx="0" cy="36" rx="40" ry="5" fill="url(#s09a_charRim)" opacity="0.85"/>
      <ellipse cx="0" cy="-6" rx="14" ry="2.5" fill="#FFCB8A" opacity="0.55"/>
    </symbol>
  </defs>

  <!-- ============ BACKGROUND SAND ============ -->
  <rect width="1920" height="1080" fill="url(#s09a_sandBg)"/>
  <rect width="1920" height="1080" fill="url(#s09a_sandBg)" filter="url(#s09a_sandGrain)" opacity="0.65"/>

  <!-- Sand ridge contours (radial from compass) -->
  <g stroke="#A89478" stroke-width="0.7" opacity="0.28" fill="none">
    <circle cx="960" cy="540" r="280"/>
    <circle cx="960" cy="540" r="400"/>
    <circle cx="960" cy="540" r="540"/>
    <circle cx="960" cy="540" r="700"/>
    <circle cx="960" cy="540" r="860"/>
  </g>
  <g fill="#7B6244" opacity="0.4">
    <circle cx="240" cy="160" r="1.3"/><circle cx="380" cy="240" r="1"/>
    <circle cx="520" cy="120" r="1.4"/><circle cx="180" cy="800" r="1.2"/>
    <circle cx="1280" cy="200" r="1.3"/><circle cx="1450" cy="140" r="1"/>
    <circle cx="1620" cy="880" r="1.2"/><circle cx="1780" cy="320" r="1.1"/>
    <circle cx="160" cy="480" r="1.1"/><circle cx="1700" cy="640" r="1.3"/>
    <circle cx="240" cy="920" r="1.2"/><circle cx="1500" cy="980" r="1.1"/>
    <circle cx="900" cy="120" r="1"/><circle cx="1100" cy="980" r="1.2"/>
  </g>

  <!-- ============ ORANGE POOL on ground (collective revelation) ============ -->
  <ellipse cx="960" cy="540" rx="640" ry="380" fill="url(#s09a_orangePool)" filter="url(#s09a_bloomStrong)" opacity="0.85">
    <animate attributeName="opacity" values="0.78;0.95;0.78" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="620;680;620" dur="3.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ============ LONG RADIAL SHADOWS of characters ============ -->
  <g opacity="0.55" fill="#0A0805">
    <!-- Each character casts a long shadow OUTWARDS (light from center) -->
    <ellipse cx="540" cy="290" rx="120" ry="32" transform="rotate(-130 540 290)"/>
    <ellipse cx="1380" cy="290" rx="120" ry="32" transform="rotate(130 1380 290)"/>
    <ellipse cx="1500" cy="600" rx="130" ry="34" transform="rotate(165 1500 600)"/>
    <ellipse cx="1080" cy="900" rx="120" ry="32" transform="rotate(-105 1080 900)"/>
    <ellipse cx="420" cy="640" rx="130" ry="34" transform="rotate(15 420 640)"/>
  </g>

  <!-- ============ COMPASS at center (top-down view, glowing) ============ -->
  <g transform="translate(960 540)">
    <!-- Soft glow halo behind compass -->
    <circle r="260" fill="#FF6B1A" opacity="0.18" filter="url(#s09a_bloomStrong)">
      <animate attributeName="opacity" values="0.14;0.24;0.14" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="240;280;240" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Hex compass body -->
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75"
             fill="url(#s09a_metalBody)" stroke="#0A0806" stroke-width="2"/>
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75"
             fill="none" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>

    <!-- Brushed streaks -->
    <g stroke="#5C4F44" stroke-width="0.4" opacity="0.45">
      <line x1="-115" y1="-60" x2="115" y2="-60"/>
      <line x1="-125" y1="-30" x2="125" y2="-30"/>
      <line x1="-128" y1="0" x2="128" y2="0"/>
      <line x1="-125" y1="30" x2="125" y2="30"/>
      <line x1="-115" y1="60" x2="115" y2="60"/>
    </g>

    <!-- Vertex tabs -->
    <g fill="#5C4F44" stroke="#1A1614" stroke-width="1">
      <circle cx="0" cy="-150" r="5"/>
      <circle cx="130" cy="-75" r="5"/>
      <circle cx="130" cy="75" r="5"/>
      <circle cx="0" cy="150" r="5"/>
      <circle cx="-130" cy="75" r="5"/>
      <circle cx="-130" cy="-75" r="5"/>
    </g>

    <!-- Glass + orange interior -->
    <polygon points="0,-130 112,-65 112,65 0,130 -112,65 -112,-65" fill="url(#s09a_orangeCore)" filter="url(#s09a_bloom)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2.4s" repeatCount="indefinite"/>
    </polygon>

    <!-- Cardinal marks (geometric, no text) -->
    <polygon points="0,-118 -7,-100 0,-94 7,-100" fill="#FFE6B8"/>
    <polygon points="110,0 96,-7 100,0 96,7" fill="#FFE6B8"/>
    <polygon points="0,118 -7,100 0,94 7,100" fill="#FFE6B8"/>
    <polygon points="-110,0 -96,-7 -100,0 -96,7" fill="#FFE6B8"/>

    <!-- Needle (pointing slightly off-N) -->
    <g transform="rotate(-18)">
      <polygon points="0,-95 10,0 0,8 -10,0" fill="#FFFBEF" stroke="#1A1614" stroke-width="1.2"/>
      <polygon points="0,95 10,0 0,-8 -10,0" fill="#1A1614" opacity="0.85"/>
    </g>
    <!-- Pivot -->
    <circle r="8" fill="#1A1614"/>
    <circle r="3.5" fill="#FFCB8A">
      <animate attributeName="r" values="3;5;3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ 5 CHARACTERS arranged in circle (top-down) ============ -->
  <!-- Positions on a circle of r=400 around (960,540), evenly spaced (72°) -->
  <g>
    <!-- Pos 1: top (12 o'clock) — Captain (tricorne) -->
    <g transform="translate(960 200) scale(1.0)">
      <!-- breath -->
      <animateTransform attributeName="transform" type="translate"
        values="960 200;960 198;960 200;960 199;960 200" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite" additive="replace"/>
      <use href="#s09a_charA"/>
    </g>
    <!-- Pos 2: top-right (~4:48) — Bandana -->
    <g transform="translate(1280 350) rotate(72) scale(0.95)">
      <animateTransform attributeName="transform" type="translate"
        values="1280 350;1280 348;1280 350;1280 349;1280 350" keyTimes="0;0.3;0.5;0.7;1" dur="6s" repeatCount="indefinite" additive="replace"/>
      <use href="#s09a_charB"/>
    </g>
    <!-- Pos 3: bottom-right — Tricorne -->
    <g transform="translate(1180 800) rotate(144) scale(0.92)">
      <animateTransform attributeName="transform" type="translate"
        values="1180 800;1180 798;1180 800;1180 799;1180 800" keyTimes="0;0.3;0.5;0.7;1" dur="5.5s" repeatCount="indefinite" additive="replace"/>
      <use href="#s09a_charA"/>
    </g>
    <!-- Pos 4: bottom-left — Skullcap (mozzo) -->
    <g transform="translate(740 800) rotate(216) scale(0.85)">
      <animateTransform attributeName="transform" type="translate"
        values="740 800;740 798;740 800;740 799;740 800" keyTimes="0;0.3;0.5;0.7;1" dur="6.5s" repeatCount="indefinite" additive="replace"/>
      <use href="#s09a_charC"/>
    </g>
    <!-- Pos 5: top-left — Bandana -->
    <g transform="translate(640 350) rotate(288) scale(0.95)">
      <animateTransform attributeName="transform" type="translate"
        values="640 350;640 348;640 350;640 349;640 350" keyTimes="0;0.3;0.5;0.7;1" dur="5.8s" repeatCount="indefinite" additive="replace"/>
      <use href="#s09a_charB"/>
    </g>
  </g>

  <!-- ============ DUST PARTICLES arancio rising from compass ============ -->
  <g filter="url(#s09a_dustGlow)">
    <circle cx="940" cy="540" r="2.5" fill="#FFCB8A">
      <animate attributeName="cy" values="540;420;320" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.4;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="530" r="2.2" fill="#FF9D52">
      <animate attributeName="cy" values="530;400;290" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.5;0" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="560" r="2" fill="#FFCB8A">
      <animate attributeName="cy" values="560;440;330" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0.4;0" dur="6.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="550" r="2.4" fill="#FFCB8A">
      <animate attributeName="cy" values="550;430;310" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.45;0" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="510" r="2.6" fill="#FFE6B8">
      <animate attributeName="cy" values="510;380;260" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.5;0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="895" cy="560" r="1.8" fill="#FF9D52">
      <animate attributeName="cy" values="560;440;340" dur="6.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.4;0" dur="6.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="560" r="2" fill="#FFCB8A">
      <animate attributeName="cy" values="560;440;330" dur="7.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0.4;0" dur="7.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.04" filter="url(#s09a_painterly)" pointer-events="none"/>

  <!-- Vignette -->
  <radialGradient id="s09a_vig" cx="50%" cy="50%" r="78%">
    <stop offset="55%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#s09a_vig)" pointer-events="none"/>
</svg>
