<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 09B — Compass needle stops, points beyond">
  <title>Scene 09B — Ago si ferma, punta una direzione precisa</title>
  <desc>Close-up della bussola. Ago decelera e si ferma puntando verso destra-alto (verso il mare lontano). Arancione pieno.</desc>

  <defs>
    <radialGradient id="sandBg09b" cx="50%" cy="55%" r="78%">
      <stop offset="0%" stop-color="#F2E8D6"/>
      <stop offset="50%" stop-color="#E2D6BD"/>
      <stop offset="100%" stop-color="#8C7858"/>
    </radialGradient>
    <radialGradient id="orangeSpill09b" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFCFA0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FF6B1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orangeCore09b" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFCFA0"/>
      <stop offset="45%" stop-color="#FF6B1A"/>
      <stop offset="100%" stop-color="#A83B00" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="metalRim09b" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4A3F36"/>
      <stop offset="100%" stop-color="#1A1410"/>
    </radialGradient>
    <filter id="bloom09b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloomStrong09b" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="grain09b">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="13"/>
      <feColorMatrix values="0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.08  0 0 0 0.05 0"/>
    </filter>
    <radialGradient id="vig09b" cx="50%" cy="50%" r="78%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- Sand bed -->
  <rect width="1920" height="1080" fill="url(#sandBg09b)"/>
  <rect width="1920" height="1080" fill="#000" opacity="0.4" filter="url(#grain09b)"/>

  <!-- Big warm aura -->
  <circle cx="960" cy="540" r="720" fill="url(#orangeSpill09b)" filter="url(#bloomStrong09b)" opacity="0.85">
    <animate attributeName="opacity" values="0.75;0.95;0.85;1;0.9;0.95" keyTimes="0;0.25;0.5;0.7;0.85;1" dur="8s" fill="freeze"/>
  </circle>

  <!-- Compass — slightly bigger than 08b, settled, steady -->
  <g transform="translate(960 540)">
    <!-- Outer rim -->
    <polygon points="0,-400 346,-200 346,200 0,400 -346,200 -346,-200"
             fill="url(#metalRim09b)" stroke="#0A0805" stroke-width="6" stroke-linejoin="round"/>
    <!-- Bezel -->
    <polygon points="0,-340 294,-170 294,170 0,340 -294,170 -294,-170"
             fill="#2A2420" stroke="#0A0805" stroke-width="3" stroke-linejoin="round"/>
    <!-- Glass face: orange -->
    <polygon points="0,-300 260,-150 260,150 0,300 -260,150 -260,-150"
             fill="url(#orangeCore09b)" stroke="#5A1E00" stroke-width="2" stroke-linejoin="round"/>

    <!-- Dial rings -->
    <circle r="260" fill="none" stroke="#2A1408" stroke-width="2" opacity="0.55"/>
    <circle r="200" fill="none" stroke="#2A1408" stroke-width="1.5" opacity="0.4"/>
    <!-- Ticks -->
    <g stroke="#2A1408" stroke-width="2.5" opacity="0.65">
      <g>
        <line x1="0" y1="-290" x2="0" y2="-265"/>
        <line x1="0" y1="290" x2="0" y2="265"/>
        <line x1="290" y1="0" x2="265" y2="0"/>
        <line x1="-290" y1="0" x2="-265" y2="0"/>
      </g>
      <!-- 30deg ticks -->
      <g transform="rotate(30)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(150)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(210)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
      <g transform="rotate(330)"><line x1="0" y1="-285" x2="0" y2="-265"/></g>
    </g>
    <!-- Cardinal diamonds (no text) -->
    <g fill="#2A1408" opacity="0.85">
      <polygon points="0,-288 9,-272 0,-256 -9,-272"/>
      <polygon points="288,0 272,9 256,0 272,-9"/>
      <polygon points="0,288 9,272 0,256 -9,272"/>
      <polygon points="-288,0 -272,9 -256,0 -272,-9"/>
    </g>

    <!-- Inner bloom under needle -->
    <circle r="120" fill="#FFCFA0" opacity="0.6" filter="url(#bloomStrong09b)">
      <animate attributeName="opacity" values="0.55;0.8;0.65;0.85;0.7;0.8" keyTimes="0;0.25;0.5;0.7;0.85;1" dur="8s" fill="freeze"/>
    </circle>

    <!-- NEEDLE: starts spinning, decelerates, locks at +60deg (pointing up-right, "out to sea") -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="220;310;380;430;460;475;482;484;485;485"
        keyTimes="0;0.18;0.34;0.5;0.65;0.78;0.88;0.94;0.98;1"
        dur="8s" fill="freeze"/>

      <!-- North tip (orange) -->
      <polygon points="0,-250 22,0 0,14 -22,0" fill="#FF6B1A" stroke="#5A1E00" stroke-width="2" filter="url(#bloom09b)"/>
      <!-- Glow on tip -->
      <circle cx="0" cy="-240" r="22" fill="#FFCFA0" opacity="0.7" filter="url(#bloom09b)">
        <animate attributeName="opacity" values="0.4;0.5;0.6;0.8;0.95" keyTimes="0;0.4;0.7;0.9;1" dur="8s" fill="freeze"/>
      </circle>
      <!-- South tip (dark) -->
      <polygon points="0,250 22,0 0,-14 -22,0" fill="#1A1410" stroke="#0A0805" stroke-width="2"/>
      <!-- Center cap -->
      <circle r="22" fill="#3A2F22" stroke="#0A0805" stroke-width="2"/>
      <circle r="8" fill="#FFCFA0"/>
    </g>

    <!-- Glass reflection sheen -->
    <polygon points="-200,-200 -70,-240 -70,-100 -200,-60" fill="#FFFFFF" opacity="0.12"/>

    <!-- Subtle "out to sea" direction hint — soft beam in upper-right -->
    <g transform="rotate(-30)" opacity="0">
      <animate attributeName="opacity" values="0;0;0.2;0.5;0.7" keyTimes="0;0.6;0.8;0.95;1" dur="8s" fill="freeze"/>
      <path d="M 0,-280 L 80,-540 L -80,-540 Z" fill="#FFB066" filter="url(#bloomStrong09b)" opacity="0.55"/>
    </g>
  </g>

  <!-- Sand grains scattered -->
  <g fill="#8C7858" opacity="0.5">
    <circle cx="540" cy="540" r="1.5"/>
    <circle cx="600" cy="640" r="1.2"/>
    <circle cx="1380" cy="540" r="1.4"/>
    <circle cx="1320" cy="660" r="1.2"/>
    <circle cx="960" cy="220" r="1.4"/>
    <circle cx="960" cy="860" r="1.4"/>
  </g>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vig09b)" pointer-events="none"/>
</svg>
