<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 10 — Rowboat returning to ship">
  <title>Scene 10 — Ritorno alla nave grande con la bussola</title>
  <desc>Mirror della 06: scialuppa che torna alla nave. Una mano stringe la bussola arancione, luce filtra tra le dita. Slow tracking opposto.</desc>

  <defs>
    <linearGradient id="sky10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E2C0"/>
      <stop offset="50%" stop-color="#E2C088"/>
      <stop offset="100%" stop-color="#B88858"/>
    </linearGradient>
    <linearGradient id="water10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6E7E8C"/>
      <stop offset="100%" stop-color="#3A4A58"/>
    </linearGradient>
    <linearGradient id="hull10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="100%" stop-color="#15100B"/>
    </linearGradient>
    <linearGradient id="sail10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2D8B0"/>
      <stop offset="100%" stop-color="#C49868"/>
    </linearGradient>
    <radialGradient id="orangeFinger10" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFCFA0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FF6B1A" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom10" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="painterly10">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="20"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <radialGradient id="vig10" cx="50%" cy="50%" r="78%">
      <stop offset="55%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </radialGradient>
    <path id="wave10" d="M 0,30 Q 150,5 300,30 T 600,30 T 900,30 T 1200,30 T 1500,30 T 1800,30 T 2100,30 L 2100,80 L 0,80 Z"/>
  </defs>

  <!-- Slow tracking right-to-left (opposite of scene 06) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="60 0; 0 0; -60 0" keyTimes="0;0.5;1" dur="8s" fill="freeze"/>

    <!-- Warm sky (sunset/golden hour) -->
    <rect x="-100" y="0" width="2120" height="640" fill="url(#sky10)"/>
    <!-- Distant clouds streaked -->
    <g opacity="0.5">
      <ellipse cx="420" cy="200" rx="320" ry="22" fill="#FAE6C0"/>
      <ellipse cx="1280" cy="160" rx="380" ry="26" fill="#F0CC90"/>
      <ellipse cx="1700" cy="240" rx="260" ry="20" fill="#E2B070"/>
    </g>
    <!-- Sun bloom -->
    <circle cx="640" cy="320" r="140" fill="#F8D898" opacity="0.7" filter="url(#bloom10)"/>

    <!-- Ocean -->
    <rect x="-100" y="640" width="2120" height="440" fill="url(#water10)"/>
    <!-- Sun-glitter band on water -->
    <ellipse cx="640" cy="720" rx="320" ry="40" fill="#F8D898" opacity="0.45" filter="url(#bloom10)"/>

    <!-- BIG SHIP — distant, anchored, waiting -->
    <g transform="translate(1450 700) scale(0.7)">
      <!-- Hull -->
      <path d="M -200,0 Q -180,45 -110,60 L 110,60 Q 180,45 200,0 L 165,-20 L -165,-20 Z" fill="url(#hull10)" stroke="#0A0805" stroke-width="2"/>
      <line x1="-160" y1="-10" x2="160" y2="-10" stroke="#1F1810" stroke-width="1" opacity="0.6"/>
      <line x1="-150" y1="10" x2="150" y2="10" stroke="#1F1810" stroke-width="1" opacity="0.6"/>
      <!-- Masts -->
      <rect x="-3" y="-300" width="6" height="300" fill="#1F1810"/>
      <rect x="-100" y="-240" width="5" height="240" fill="#1F1810"/>
      <rect x="95" y="-220" width="5" height="220" fill="#1F1810"/>
      <!-- Sails (slack, warm light) -->
      <path d="M -3,-300 Q -100,-240 -100,-110 L -100,-30 L 0,-30 Z" fill="url(#sail10)" stroke="#A8807A" stroke-width="1"/>
      <path d="M 3,-300 Q 100,-240 100,-110 L 100,-30 L 0,-30 Z" fill="url(#sail10)" stroke="#A8807A" stroke-width="1" opacity="0.9"/>
      <path d="M -100,-240 Q -160,-180 -160,-90 L -160,-30 L -100,-30 Z" fill="url(#sail10)" stroke="#A8807A" stroke-width="1"/>
      <path d="M 95,-220 Q 155,-160 155,-90 L 155,-30 L 95,-30 Z" fill="url(#sail10)" stroke="#A8807A" stroke-width="1" opacity="0.9"/>
      <!-- Reflection -->
      <path d="M -200,60 L 200,60 L 165,100 L -165,100 Z" fill="#1A1614" opacity="0.35"/>
    </g>

    <!-- ROWBOAT — foreground, moving toward ship (right side) -->
    <g transform="translate(820 760)">
      <animateTransform attributeName="transform" type="translate"
        values="700 760; 780 758; 860 760" keyTimes="0;0.5;1" dur="8s" fill="freeze"/>
      <!-- Reflection -->
      <ellipse cx="0" cy="60" rx="220" ry="14" fill="#1A1614" opacity="0.3"/>

      <!-- Hull -->
      <path d="M -220,-20 Q -200,35 -130,55 L 130,55 Q 200,35 220,-20 L 185,-32 L -185,-32 Z" fill="url(#hull10)" stroke="#0A0805" stroke-width="2"/>
      <line x1="-185" y1="-12" x2="185" y2="-12" stroke="#1F1810" stroke-width="1" opacity="0.6"/>
      <line x1="-170" y1="10" x2="170" y2="10" stroke="#1F1810" stroke-width="1" opacity="0.6"/>
      <line x1="-160" y1="32" x2="160" y2="32" stroke="#1F1810" stroke-width="1" opacity="0.5"/>

      <!-- Three rowers (sitting upright, more determined) -->
      <g fill="#0A0805">
        <ellipse cx="-110" cy="-90" rx="24" ry="28"/>
        <path d="M -136,-66 L -84,-66 L -90,15 L -130,15 Z"/>
        <!-- Middle figure — holds compass, slight cradle pose -->
        <ellipse cx="0" cy="-100" rx="26" ry="30"/>
        <path d="M -32,-78 L 32,-78 L 25,15 L -25,15 Z"/>
        <ellipse cx="110" cy="-90" rx="24" ry="28"/>
        <path d="M 84,-66 L 136,-66 L 130,15 L 90,15 Z"/>
      </g>

      <!-- Orange glow filtering through middle figure's hands -->
      <g transform="translate(0 -50)">
        <!-- Glow halo behind hands -->
        <circle r="80" fill="url(#orangeFinger10)" filter="url(#bloom10)" opacity="0.9">
          <animate attributeName="opacity" values="0.7;1;0.85;1;0.8" keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <!-- Cupped hands silhouette -->
        <path d="M -40,-10 Q -50,15 -35,30 Q -10,40 0,38 Q 10,40 35,30 Q 50,15 40,-10 Q 20,-25 0,-22 Q -20,-25 -40,-10 Z"
              fill="#0A0805" stroke="#0A0805" stroke-width="1"/>
        <!-- Light spilling between fingers -->
        <g fill="#FFCFA0" opacity="0.85" filter="url(#bloom10)">
          <ellipse cx="-20" cy="-2" rx="3" ry="10"/>
          <ellipse cx="-5" cy="-5" rx="3" ry="12"/>
          <ellipse cx="10" cy="-3" rx="3" ry="10"/>
          <ellipse cx="22" cy="-1" rx="3" ry="9"/>
        </g>
        <!-- Bright dot at center of hands -->
        <circle r="6" fill="#FFE2C0" opacity="0.95" filter="url(#bloom10)"/>
      </g>

      <!-- Oars — synchronized strokes (more decisive) -->
      <g>
        <line x1="-130" y1="-50" x2="-340" y2="70" stroke="#1F1108" stroke-width="6" stroke-linecap="round">
          <animate attributeName="x2" values="-340;-300;-340;-300;-340" keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="y2" values="70;100;70;100;70" keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="130" y1="-50" x2="340" y2="70" stroke="#1F1108" stroke-width="6" stroke-linecap="round">
          <animate attributeName="x2" values="340;300;340;300;340" keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="y2" values="70;100;70;100;70" keyTimes="0;0.25;0.5;0.75;1" dur="3s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <!-- Waves -->
    <g opacity="0.5">
      <use href="#wave10" x="-100" y="800" fill="#E8DCBE">
        <animate attributeName="x" values="-100;-280;-100" dur="14s" repeatCount="indefinite"/>
      </use>
    </g>
    <g opacity="0.4">
      <use href="#wave10" x="-200" y="880" fill="#FAE6C0">
        <animate attributeName="x" values="-200;-60;-200" dur="11s" repeatCount="indefinite"/>
      </use>
    </g>
    <g opacity="0.3">
      <use href="#wave10" x="-100" y="980" fill="#FAF4E9" transform="scale(1.4 0.7)">
        <animate attributeName="x" values="-100;-260;-100" dur="13s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>

  <!-- Painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.04" filter="url(#painterly10)" pointer-events="none"/>
  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#vig10)" pointer-events="none"/>
</svg>
