<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 11B — Two compasses on ship's table (Act III) — Cartoon Saloon">
  <title>Scene 11B — Due bussole sul ponte: vecchia ottone + nuova arancione</title>
  <desc>Cartoon Saloon: macro top-down. Tavolo legno con wood grain. Due bussole side-by-side: a sinistra OTTONE (no glow, ago nord), a destra ARANCIONE (glow interno, ago -30°). Mano weathered tra le due (rilassata, "le due insieme"). Sunset late warm light (rays). Dust particles warm. Brass ring al pollice.</desc>

  <defs>
    <radialGradient id="s11b_woodBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#9A6E48"/>
      <stop offset="55%" stop-color="#6E4A2E"/>
      <stop offset="100%" stop-color="#3A2818"/>
    </radialGradient>

    <linearGradient id="s11b_hand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C49880"/>
      <stop offset="55%" stop-color="#A47B5F"/>
      <stop offset="100%" stop-color="#704A30"/>
    </linearGradient>
    <linearGradient id="s11b_handRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCB8A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFCB8A" stop-opacity="0.65"/>
    </linearGradient>

    <radialGradient id="s11b_brassBody" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#C8A45C"/>
      <stop offset="55%" stop-color="#8B6E3C"/>
      <stop offset="100%" stop-color="#3A2A12"/>
    </radialGradient>
    <linearGradient id="s11b_brassEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0BC78"/>
      <stop offset="55%" stop-color="#8B6E3C"/>
      <stop offset="100%" stop-color="#3A2A12"/>
    </linearGradient>
    <radialGradient id="s11b_brassGlass" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#5A4A30"/>
      <stop offset="100%" stop-color="#1F1410"/>
    </radialGradient>

    <radialGradient id="s11b_metalBody" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#5C4F44"/>
      <stop offset="55%" stop-color="#3F362E"/>
      <stop offset="100%" stop-color="#15110E"/>
    </radialGradient>
    <linearGradient id="s11b_metalEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8A7560"/>
      <stop offset="55%" stop-color="#5C4F44"/>
      <stop offset="100%" stop-color="#15110E"/>
    </linearGradient>
    <radialGradient id="s11b_orangeCore" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#FFCB8A"/>
      <stop offset="32%" stop-color="#FF9D52"/>
      <stop offset="68%" stop-color="#FF6B1A"/>
      <stop offset="100%" stop-color="#B33B00" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="s11b_innerSpill" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFE0B0" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#FF8A3A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="s11b_glassReflBrass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE6B8" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#FFE6B8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFE6B8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s11b_glassReflNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="s11b_sunsetRay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFE0B0" stop-opacity="0"/>
    </linearGradient>

    <filter id="s11b_woodGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.4" numOctaves="3" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.15  0 0 0 0 0.10  0 0 0 0 0.06  0 0 0 0.6 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="s11b_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="27"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="s11b_bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s11b_bloomStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="s11b_softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="s11b_rayBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <!-- Geometric cardinal marks -->
    <symbol id="s11b_cardNew_N" overflow="visible">
      <polygon points="0,-160 -9,-138 0,-130 9,-138" fill="#FF6B1A"/>
      <polygon points="0,-150 -5,-140 0,-134 5,-140" fill="#FFCB8A"/>
    </symbol>
    <symbol id="s11b_cardNew_E" overflow="visible">
      <polygon points="155,0 138,-8 142,0 138,8" fill="#FF6B1A"/>
    </symbol>
    <symbol id="s11b_cardNew_S" overflow="visible">
      <polygon points="0,160 -9,138 0,130 9,138" fill="#FF6B1A"/>
    </symbol>
    <symbol id="s11b_cardNew_W" overflow="visible">
      <polygon points="-155,0 -138,-8 -142,0 -138,8" fill="#FF6B1A"/>
    </symbol>
  </defs>

  <!-- ============ WOOD TABLE BACKGROUND ============ -->
  <rect width="1920" height="1080" fill="url(#s11b_woodBg)"/>
  <!-- wood grain via turbulence -->
  <rect width="1920" height="1080" fill="url(#s11b_woodBg)" filter="url(#s11b_woodGrain)" opacity="0.7"/>

  <!-- Wood plank dividing lines -->
  <g stroke="#1F1410" stroke-width="2" opacity="0.42">
    <line x1="0" y1="280" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="552"/>
    <line x1="0" y1="800" x2="1920" y2="790"/>
  </g>
  <g stroke="#5A3818" stroke-width="0.6" opacity="0.55">
    <line x1="0" y1="200" x2="1920" y2="195"/>
    <line x1="0" y1="380" x2="1920" y2="388"/>
    <line x1="0" y1="640" x2="1920" y2="648"/>
    <line x1="0" y1="880" x2="1920" y2="878"/>
  </g>

  <!-- Wood knot details -->
  <g opacity="0.55">
    <ellipse cx="160" cy="380" rx="14" ry="10" fill="#1F1410"/>
    <ellipse cx="160" cy="380" rx="9" ry="6" fill="#3A2818"/>
    <ellipse cx="1740" cy="650" rx="16" ry="12" fill="#1F1410"/>
    <ellipse cx="1740" cy="650" rx="11" ry="8" fill="#3A2818"/>
    <ellipse cx="1820" cy="220" rx="11" ry="8" fill="#1F1410"/>
    <ellipse cx="80" cy="900" rx="11" ry="8" fill="#1F1410"/>
  </g>

  <!-- Sunset rays warm (diagonal from upper-right) -->
  <g filter="url(#s11b_rayBlur)" opacity="0.5">
    <polygon points="1920,0 1820,0 200,1080 320,1080" fill="url(#s11b_sunsetRay)"/>
    <polygon points="1920,180 1820,80 100,1080 240,1080" fill="url(#s11b_sunsetRay)" opacity="0.55"/>
  </g>

  <!-- Soft warm wash on table center -->
  <radialGradient id="s11b_tableWash" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#FFCB8A" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#FFCB8A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#s11b_tableWash)"/>

  <!-- ============ OLD BRASS COMPASS (LEFT, top-down) ============ -->
  <g transform="translate(620 540)">
    <!-- Shadow on table -->
    <ellipse cx="0" cy="320" rx="280" ry="32" fill="#000" opacity="0.45"/>
    <!-- Round body (brass, classic round shape) -->
    <circle r="260" fill="url(#s11b_brassBody)" stroke="#1F1410" stroke-width="3"/>
    <circle r="258" fill="none" stroke="url(#s11b_brassEdge)" stroke-width="5" opacity="0.85"/>
    <circle r="252" fill="none" stroke="#3A2A12" stroke-width="1.5" opacity="0.7"/>
    <!-- Inner ring -->
    <circle r="230" fill="url(#s11b_brassGlass)" stroke="#1F1410" stroke-width="2"/>
    <!-- Brass scratches/patina -->
    <g stroke="#5A3A18" stroke-width="0.6" opacity="0.5">
      <circle r="245" fill="none"/>
      <circle r="235" fill="none"/>
      <circle r="225" fill="none"/>
    </g>
    <!-- Cardinal marks (geometric, no text) -->
    <g fill="#C8A45C">
      <polygon points="0,-205 -10,-190 0,-182 10,-190"/>
      <polygon points="0,205 -10,190 0,182 10,190"/>
      <polygon points="-205,0 -190,-10 -182,0 -190,10"/>
      <polygon points="205,0 190,-10 182,0 190,10"/>
      <!-- Diagonal small marks -->
      <circle cx="148" cy="-148" r="3"/>
      <circle cx="-148" cy="-148" r="3"/>
      <circle cx="148" cy="148" r="3"/>
      <circle cx="-148" cy="148" r="3"/>
    </g>
    <!-- Tick marks every 15° -->
    <g stroke="#8B6E3C" stroke-width="1.5">
      <line x1="0" y1="-220" x2="0" y2="-210"/>
      <line x1="115" y1="-198" x2="110" y2="-188"/>
      <line x1="198" y1="-115" x2="188" y2="-110"/>
      <line x1="220" y1="0" x2="210" y2="0"/>
      <line x1="198" y1="115" x2="188" y2="110"/>
      <line x1="115" y1="198" x2="110" y2="188"/>
      <line x1="0" y1="220" x2="0" y2="210"/>
      <line x1="-115" y1="198" x2="-110" y2="188"/>
      <line x1="-198" y1="115" x2="-188" y2="110"/>
      <line x1="-220" y1="0" x2="-210" y2="0"/>
      <line x1="-198" y1="-115" x2="-188" y2="-110"/>
      <line x1="-115" y1="-198" x2="-110" y2="-188"/>
    </g>
    <!-- Needle pointing NORTH (steady) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;1;-1;0.5;0" keyTimes="0;0.25;0.5;0.75;1" dur="6s" repeatCount="indefinite"/>
      <polygon points="0,-170 13,0 0,8 -13,0" fill="#E0BC78" stroke="#1F1410" stroke-width="1.5"/>
      <polygon points="0,170 13,0 0,-8 -13,0" fill="#3A2A12" stroke="#1F1410" stroke-width="1.5"/>
    </g>
    <!-- Center pivot -->
    <circle r="12" fill="#1F1410"/>
    <circle r="5" fill="#8B6E3C"/>
    <!-- Glass reflection (subtle, brass-tinted) -->
    <ellipse cx="-110" cy="-110" rx="80" ry="50" fill="url(#s11b_glassReflBrass)" opacity="0.85"/>
    <path d="M -180,-130 Q -100,-200 60,-200" fill="none" stroke="#FFE6B8" stroke-width="2.5" opacity="0.3"/>
  </g>

  <!-- ============ NEW ORANGE COMPASS (RIGHT, hex, glowing) ============ -->
  <g transform="translate(1300 540)">
    <!-- Soft glow halo on wood -->
    <circle r="340" fill="#FF6B1A" opacity="0.18" filter="url(#s11b_bloomStrong)">
      <animate attributeName="opacity" values="0.14;0.25;0.14" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="320;360;320" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Shadow on table -->
    <ellipse cx="0" cy="320" rx="280" ry="32" fill="#000" opacity="0.45"/>
    <!-- Hex body -->
    <polygon points="0,-260 226,-130 226,130 0,260 -226,130 -226,-130"
             fill="url(#s11b_metalBody)" stroke="#0A0806" stroke-width="2.5"/>
    <polygon points="0,-260 226,-130 226,130 0,260 -226,130 -226,-130"
             fill="none" stroke="url(#s11b_metalEdge)" stroke-width="6" stroke-linejoin="round" opacity="0.9"/>
    <polygon points="0,-260 226,-130 226,130 0,260 -226,130 -226,-130"
             fill="none" stroke="#1A1614" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- Brushed metal -->
    <g stroke="#5C4F44" stroke-width="0.4" opacity="0.45">
      <line x1="-200" y1="-100" x2="200" y2="-100"/>
      <line x1="-215" y1="-60" x2="215" y2="-60"/>
      <line x1="-225" y1="0" x2="225" y2="0"/>
      <line x1="-215" y1="60" x2="215" y2="60"/>
      <line x1="-200" y1="100" x2="200" y2="100"/>
    </g>
    <!-- Vertex tabs -->
    <g fill="#5C4F44" stroke="#1A1614" stroke-width="1.5">
      <circle cx="0" cy="-260" r="7"/>
      <circle cx="226" cy="-130" r="7"/>
      <circle cx="226" cy="130" r="7"/>
      <circle cx="0" cy="260" r="7"/>
      <circle cx="-226" cy="130" r="7"/>
      <circle cx="-226" cy="-130" r="7"/>
    </g>

    <!-- Inner orange glass -->
    <polygon points="0,-210 184,-105 184,105 0,210 -184,105 -184,-105" fill="url(#s11b_orangeCore)" filter="url(#s11b_bloom)">
      <animate attributeName="opacity" values="0.92;1;0.92" dur="2.6s" repeatCount="indefinite"/>
    </polygon>

    <!-- Inner spill breathing -->
    <circle r="170" fill="url(#s11b_innerSpill)" filter="url(#s11b_bloom)" opacity="0.7">
      <animate attributeName="opacity" values="0.65;0.82;0.65" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="160;180;160" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Cardinal marks -->
    <g filter="url(#s11b_bloom)">
      <use href="#s11b_cardNew_N"/>
      <use href="#s11b_cardNew_E"/>
      <use href="#s11b_cardNew_S"/>
      <use href="#s11b_cardNew_W"/>
      <g fill="#FF6B1A" opacity="0.85">
        <circle cx="108" cy="-108" r="3"/>
        <circle cx="-108" cy="-108" r="3"/>
        <circle cx="108" cy="108" r="3"/>
        <circle cx="-108" cy="108" r="3"/>
      </g>
    </g>

    <!-- Needle puntando -30° (alto-destra, direzione storia) -->
    <g transform="rotate(-30)">
      <polygon points="0,-175 13,0 0,8 -13,0" fill="#FFE6B8" stroke="#1A1614" stroke-width="1.5"/>
      <polygon points="0,175 13,0 0,-8 -13,0" fill="#1A1614" opacity="0.85"/>
    </g>
    <!-- Center pivot -->
    <circle r="12" fill="#1A1614" stroke="#FF6B1A" stroke-width="2"/>
    <circle r="5" fill="#FFCB8A">
      <animate attributeName="r" values="4;6.5;4" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Glass reflection -->
    <polygon points="-180,-130 -60,-220 -60,-100 -180,-30" fill="url(#s11b_glassReflNew)" opacity="0.85"/>
    <path d="M -180,-110 Q -100,-200 60,-200" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.3"/>

    <!-- Hex rim glow -->
    <polygon points="0,-260 226,-130 226,130 0,260 -226,130 -226,-130"
             fill="none" stroke="#FF6B1A" stroke-width="3.5" stroke-linejoin="round" opacity="0.92">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.6s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ============ WEATHERED HAND tra le due bussole (rilassata, dita tra entrambe) ============ -->
  <g opacity="0.96">
    <ellipse cx="960" cy="900" rx="280" ry="24" fill="#000" opacity="0.42"/>
    <g transform="translate(960 820)">
      <!-- Hand body coming up from bottom, between/behind the two compasses -->
      <path d="
        M -240,40
        C -220,90 -160,130 -80,140
        C 0,148 80,148 160,135
        C 230,120 270,80 280,30
        L 280,260
        L -240,260 Z
      " fill="url(#s11b_hand)" stroke="#1A1614" stroke-width="3.2" stroke-linejoin="round"/>
      <!-- Top edge shadow -->
      <path d="M -240,40 C -220,90 -160,130 -80,140 C 0,148 80,148 160,135 C 230,120 270,80 280,30"
            fill="none" stroke="#1A1614" stroke-width="2.5" opacity="0.55"/>
      <!-- Rim light (mixed warm from both sides) -->
      <path d="M -80,140 C 0,148 80,148 160,135 C 230,120 270,80 280,30"
            fill="none" stroke="url(#s11b_handRim)" stroke-width="12" opacity="0.7"/>

      <!-- Wrinkles -->
      <path d="M -200,80 C -120,100 -40,108 60,100" fill="none" stroke="#1A1614" stroke-width="2" opacity="0.45"/>
      <path d="M -160,120 C -60,138 60,138 180,124" fill="none" stroke="#1A1614" stroke-width="2" opacity="0.42"/>
      <path d="M -100,142 C -20,154 80,152 180,138" fill="none" stroke="#1A1614" stroke-width="1.6" opacity="0.38"/>

      <!-- Knuckles -->
      <ellipse cx="-50" cy="138" rx="28" ry="16" fill="none" stroke="#1A1614" stroke-width="1.6" opacity="0.4"/>
      <ellipse cx="40" cy="142" rx="28" ry="16" fill="none" stroke="#1A1614" stroke-width="1.6" opacity="0.4"/>
      <ellipse cx="130" cy="132" rx="26" ry="15" fill="none" stroke="#1A1614" stroke-width="1.4" opacity="0.38"/>

      <!-- Anello al pollice (brass) -->
      <ellipse cx="-180" cy="58" rx="24" ry="12" fill="none" stroke="#8A7550" stroke-width="3.2"/>
      <ellipse cx="-180" cy="58" rx="18" ry="8" fill="none" stroke="#15100B" stroke-width="1.4" opacity="0.7"/>
      <ellipse cx="-180" cy="54" rx="3" ry="2" fill="#D4B888" opacity="0.85"/>
    </g>
  </g>

  <!-- Dust particles warm sunset -->
  <g>
    <circle cx="1500" cy="200" r="2.4" fill="#FFD898" filter="url(#s11b_softGlow)">
      <animate attributeName="cy" values="200;620" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.65;0.4;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1320" cy="180" r="2" fill="#FFD898" filter="url(#s11b_softGlow)">
      <animate attributeName="cy" values="180;640" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1700" cy="280" r="2.2" fill="#FFCB8A" filter="url(#s11b_softGlow)">
      <animate attributeName="cy" values="280;680" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="340" r="2" fill="#FFD898" filter="url(#s11b_softGlow)">
      <animate attributeName="cy" values="340;700" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.55;0.4;0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="260" r="2.2" fill="#FFCB8A" filter="url(#s11b_softGlow)">
      <animate attributeName="cy" values="260;660" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.4;0" dur="13s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Painterly overlay -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.04" filter="url(#s11b_painterly)" pointer-events="none"/>

  <radialGradient id="s11b_vig" cx="50%" cy="50%" r="80%">
    <stop offset="55%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#s11b_vig)" pointer-events="none"/>
</svg>
