<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Scene 12 — Transition to realistic deck — Cartoon Saloon">
  <title>Scene 12 — Bussola arancione cresce esponenzialmente e bridge verso slide 13</title>
  <desc>Cartoon Saloon transition: bussola circolare-windrose (geometria 1:1 con slide_13_anno_zero) parte a scale 0.4 al centro e cresce a 2.6x in 8s (crescita esponenziale ease-out). 2 rect overlay (arancione + cream) fade-in negli ultimi 1.2s. Match cromatico/geometrico 1:1 con slide 13: cream #F5EFE6, orange #FF6B1A, ink #1A1614, 8-point windrose, tick marks 12-step.</desc>

  <defs>
    <radialGradient id="s12_creamBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#F5EFE6"/>
      <stop offset="100%" stop-color="#E8DEC8"/>
    </radialGradient>
    <radialGradient id="s12_pulse" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
    <filter id="s12_painterly" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="3" seed="42"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="s12_bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Cream background (match slide 13) -->
  <rect width="1920" height="1080" fill="url(#s12_creamBg)"/>

  <!-- Soft painterly grain -->
  <rect width="1920" height="1080" fill="#FFFFFF" opacity="0.04" filter="url(#s12_painterly)" pointer-events="none"/>

  <!-- ============ COMPASS CIRCULAR (1:1 match with slide_13_anno_zero) ============ -->
  <!-- Scales 0.4 → 2.6 exponentially over 8s, then orange overlay fades in last 1.2s -->
  <g transform="translate(960 540)">
    <!-- Growth animation (exponential ease-out) -->
    <animateTransform attributeName="transform" type="scale"
      values="0.4;0.5;0.7;1.0;1.4;1.9;2.4;2.6"
      keyTimes="0;0.15;0.32;0.5;0.65;0.78;0.9;1"
      dur="8s" fill="freeze" additive="sum"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>

    <!-- Pulsing halo (orange) — geometria identica a slide_13 -->
    <circle cx="0" cy="0" r="320" fill="#FF6B1A" opacity="0.06">
      <animate attributeName="r" values="300;360;300" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.04;0.10;0.04" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="240" fill="#FF6B1A" opacity="0.10">
      <animate attributeName="r" values="220;270;220" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.16;0.08" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Compass outer ring — identical to slide_13 -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#1A1614" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="190" fill="none" stroke="#1A1614" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Tick marks every 30° — identical to slide_13 -->
    <g stroke="#1A1614" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-200" x2="0" y2="-175"/>
      <line x1="100" y1="-173" x2="87" y2="-152"/>
      <line x1="173" y1="-100" x2="151" y2="-87"/>
      <line x1="200" y1="0" x2="175" y2="0"/>
      <line x1="173" y1="100" x2="151" y2="87"/>
      <line x1="100" y1="173" x2="87" y2="151"/>
      <line x1="0" y1="200" x2="0" y2="175"/>
      <line x1="-100" y1="173" x2="-87" y2="151"/>
      <line x1="-173" y1="100" x2="-151" y2="87"/>
      <line x1="-200" y1="0" x2="-175" y2="0"/>
      <line x1="-173" y1="-100" x2="-151" y2="-87"/>
      <line x1="-100" y1="-173" x2="-87" y2="-152"/>
    </g>

    <!-- Inner dial — identical to slide_13 -->
    <circle cx="0" cy="0" r="135" fill="none" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Windrose 8-point star — identical to slide_13 -->
    <g stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#F5EFE6">
      <polygon points="0,-130 18,0 0,130 -18,0"/>
      <polygon points="-130,0 0,-18 130,0 0,18"/>
      <polygon points="-90,-90 0,-12 90,90 0,12" opacity="0.35"/>
      <polygon points="90,-90 12,0 -90,90 -12,0" opacity="0.35"/>
    </g>

    <!-- Needle — identical to slide_13 (orange N pointer + cream S, ink pivot) -->
    <g>
      <polygon points="0,-115 14,0 0,8 -14,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="2" stroke-linejoin="round"/>
      <polygon points="0,115 14,0 0,-8 -14,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="0" cy="0" r="10" fill="#1A1614"/>
      <circle cx="0" cy="0" r="4" fill="#FF6B1A">
        <animate attributeName="r" values="3;6;3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ============ FINAL OVERLAY (orange + cream fade-in, last 1.2s of 8s = 85%→100%) ============ -->
  <!-- Orange wash fills screen near end -->
  <rect width="1920" height="1080" fill="#FF6B1A" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0.45;0.78"
      keyTimes="0;0.6;0.85;0.95;1"
      dur="8s" fill="freeze"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
  </rect>
  <!-- Cream warm overlay last frames -->
  <rect width="1920" height="1080" fill="#F5EFE6" opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;0.35"
      keyTimes="0;0.7;0.88;0.94;1"
      dur="8s" fill="freeze"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
  </rect>
</svg>
