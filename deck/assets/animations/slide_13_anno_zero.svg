<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 13 — Anno zero: pulsing orange compass">
  <title>Slide 13 — Anno zero</title>
  <desc>Bussola arancione centrale che pulsa lentamente. Hand-drawn isometric ink line art.</desc>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>

  <!-- Soft pulsing halo (the orange light) -->
  <g transform="translate(540 540)">
    <circle cx="0" cy="0" r="320" fill="#FF6B1A" opacity="0.06">
      <animate attributeName="r" values="300;360;300" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.04;0.10;0.04" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="240" fill="#FF6B1A" opacity="0.10">
      <animate attributeName="r" values="220;270;220" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.16;0.08" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Compass outer ring -->
    <circle cx="0" cy="0" r="200" fill="none" stroke="#1A1614" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="190" fill="none" stroke="#1A1614" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Tick marks every 30deg -->
    <g stroke="#1A1614" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-200" x2="0" y2="-175"/>
      <line x1="100" y1="-173" x2="87" y2="-152"/>
      <line x1="173" y1="-100" x2="151" y2="-87"/>
      <line x1="200" y1="0" x2="175" y2="0"/>
      <line x1="173" y1="100" x2="151" y2="87"/>
      <line x1="100" y1="173" x2="87" y2="151"/>
      <line x1="0" y1="200" x2="0" y2="175"/>
      <line x1="-100" y1="173" x2="-87" y2="151"/>
      <line x1="-173" y1="100" x2="-151" y2="87"/>
      <line x1="-200" y1="0" x2="-175" y2="0"/>
      <line x1="-173" y1="-100" x2="-151" y2="-87"/>
      <line x1="-100" y1="-173" x2="-87" y2="-152"/>
    </g>

    <!-- Inner dial -->
    <circle cx="0" cy="0" r="135" fill="none" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Windrose petals (8-point star) -->
    <g stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#F5EFE6">
      <polygon points="0,-130 18,0 0,130 -18,0"/>
      <polygon points="-130,0 0,-18 130,0 0,18"/>
      <polygon points="-90,-90 0,-12 90,90 0,12" opacity="0.35"/>
      <polygon points="90,-90 12,0 -90,90 -12,0" opacity="0.35"/>
    </g>

    <!-- Needle (orange, narrative element, pulses) -->
    <g>
      <polygon points="0,-115 14,0 0,8 -14,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="2" stroke-linejoin="round"/>
      <polygon points="0,115 14,0 0,-8 -14,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="2" stroke-linejoin="round"/>

      <!-- Center pivot -->
      <circle cx="0" cy="0" r="10" fill="#1A1614"/>
      <circle cx="0" cy="0" r="4" fill="#FF6B1A">
        <animate attributeName="r" values="3;6;3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
