<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 14 — Chi siamo: Conflavoro building silhouette with seven small orange compasses arranged in an asymmetric arc around it">
  <title>Slide 14 — Chi siamo (edificio + 7 bussole)</title>
  <desc>Edificio Conflavoro stilizzato Cartoon Saloon con form shading direzionale, finestre illuminate e insegna; sette piccole bussole arancioni disposte in arco asimmetrico, depth variata r=22/28/32/28/22/30/26.</desc>

  <defs>
    <filter id="painterly14" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="14"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="contactBlur14" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="hazeChi" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
    <filter id="softGlow14" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <linearGradient id="facadeChi" x1="20%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3F3328"/>
      <stop offset="55%" stop-color="#2A2018"/>
      <stop offset="100%" stop-color="#120D08"/>
    </linearGradient>
    <linearGradient id="facadeSideChi" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1209"/>
      <stop offset="100%" stop-color="#0A0604"/>
    </linearGradient>
    <linearGradient id="roofChi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3826"/>
      <stop offset="100%" stop-color="#1A0F08"/>
    </linearGradient>
    <radialGradient id="windowLit" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#FFE3C2"/>
      <stop offset="80%" stop-color="#E8A658"/>
      <stop offset="100%" stop-color="#9C5018"/>
    </radialGradient>
    <radialGradient id="compassCaseChi" cx="32%" cy="22%" r="85%">
      <stop offset="0%" stop-color="#FFC890"/>
      <stop offset="50%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#7A2A0A"/>
    </radialGradient>
    <radialGradient id="compassFaceChi" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#D9CCAE"/>
    </radialGradient>
    <linearGradient id="signChi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC890"/>
      <stop offset="100%" stop-color="#9C3A0E"/>
    </linearGradient>
    <radialGradient id="vignette14" cx="50%" cy="50%" r="70%">
      <stop offset="58%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.28"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="#F5EFE6"/>
  <rect width="1080" height="1080" fill="#D9B98A" opacity="0.04" filter="url(#painterly14)"/>

  <!-- Mandala -->
  <g transform="translate(540 580)" opacity="0.32" filter="url(#hazeChi)">
    <circle r="440" fill="none" stroke="#1A1614" stroke-width="1.1" stroke-dasharray="2,8"/>
    <circle r="394" fill="none" stroke="#1A1614" stroke-width="1.4" stroke-dasharray="4,9"/>
    <circle r="352" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,5"/>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="200s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <ellipse cx="540" cy="852" rx="260" ry="18" fill="#1A1614" opacity="0.25" filter="url(#contactBlur14)"/>

  <!-- Building -->
  <g transform="translate(540 540)">
    <!-- side facade (depth) -->
    <path d="M 140 -160 Q 220 -120 240 -80 L 240 280 Q 220 312 140 320 Z"
          fill="url(#facadeSideChi)" stroke="#0A0706" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- roof (Bezier) -->
    <path d="M -180 -190 Q 0 -226 180 -190 Q 210 -178 200 -158 Q 0 -188 -200 -158 Q -210 -178 -180 -190 Z"
          fill="url(#roofChi)" stroke="#0A0706" stroke-width="4" stroke-linejoin="round"/>

    <!-- front facade -->
    <path d="M -200 -160 Q -204 -156 -200 -150 L -200 300 Q -200 316 -184 320 L 184 320 Q 200 316 200 300 L 200 -150 Q 204 -156 200 -160 Z"
          fill="url(#facadeChi)" stroke="#0A0706" stroke-width="4.5" stroke-linejoin="round"/>

    <!-- brick rows -->
    <g stroke="#0A0706" stroke-width="1.2" opacity="0.4" fill="none">
      <path d="M -198 -110 Q 0 -116 198 -110"/>
      <path d="M -198 220 Q 0 226 198 220"/>
    </g>

    <!-- Windows row 1 -->
    <g>
      <rect x="-160" y="-92" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4"/>
      <path d="M -129 -92 L -129 -34 M -160 -63 L -98 -63" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <g>
      <rect x="-70" y="-92" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4" opacity="0.9"/>
      <path d="M -39 -92 L -39 -34 M -70 -63 L -8 -63" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <g>
      <rect x="20" y="-92" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4"/>
      <path d="M 51 -92 L 51 -34 M 20 -63 L 82 -63" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <g>
      <rect x="110" y="-92" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4" opacity="0.78"/>
      <path d="M 141 -92 L 141 -34 M 110 -63 L 172 -63" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <!-- row 2 -->
    <g>
      <rect x="-160" y="2" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4" opacity="0.85"/>
      <path d="M -129 2 L -129 60 M -160 31 L -98 31" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <g>
      <rect x="-70" y="2" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4"/>
      <path d="M -39 2 L -39 60 M -70 31 L -8 31" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <g>
      <rect x="20" y="2" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4" opacity="0.95"/>
      <path d="M 51 2 L 51 60 M 20 31 L 82 31" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>
    <g>
      <rect x="110" y="2" width="62" height="58" rx="4" fill="url(#windowLit)" stroke="#0A0706" stroke-width="2.4" opacity="0.7"/>
      <path d="M 141 2 L 141 60 M 110 31 L 172 31" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
    </g>

    <!-- Sign -->
    <g transform="translate(0 130)">
      <ellipse cx="0" cy="6" rx="92" ry="6" fill="#FF6B1A" opacity="0.18" filter="url(#softGlow14)"/>
      <path d="M -78 -14 Q -82 -22 -72 -22 L 72 -22 Q 82 -22 78 -14 L 78 6 Q 78 14 70 14 L -70 14 Q -78 14 -78 6 Z"
            fill="url(#signChi)" stroke="#0A0706" stroke-width="2.6" stroke-linejoin="round"/>
      <path d="M -10 -8 Q -22 -4 -22 4 Q -22 12 -10 12" fill="none" stroke="#0A0706" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Door -->
    <path d="M -50 180 Q -50 152 -20 152 L 20 152 Q 50 152 50 180 L 50 320 L -50 320 Z"
          fill="#0A0706" stroke="#0A0706" stroke-width="2.6" stroke-linejoin="round"/>
    <circle cx="32" cy="252" r="3" fill="url(#signChi)"/>

    <!-- Ambient occlusion under sign -->
    <path d="M -78 152 Q 0 158 78 152" fill="none" stroke="#000" stroke-width="2" opacity="0.4" filter="url(#contactBlur14)"/>
  </g>

  <!-- 7 compasses in asymmetric arc (r=22,28,32,28,22,30,26) -->
  <g>
    <g transform="translate(140 460)">
      <circle r="22" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.4"/>
      <circle r="16" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="1.6"/>
      <g>
        <path d="M 0 -14 L 3 0 L 0 3 L -3 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1"/>
        <path d="M 0 3 L 3 0 L 0 14 L -3 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="-6;0;-6" dur="3.8s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="2" fill="#0A0706"/>
      <circle cx="-9" cy="-9" r="1.4" fill="#FFF" opacity="0.85"/>
    </g>

    <g transform="translate(220 320)">
      <circle r="28" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.6"/>
      <circle r="21" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="1.8"/>
      <g transform="rotate(8)">
        <path d="M 0 -19 L 4 0 L 0 4 L -4 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1.1"/>
        <path d="M 0 4 L 4 0 L 0 19 L -4 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="6;12;6" dur="4.2s" begin="0.3s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="2.4" fill="#0A0706"/>
      <circle cx="-11" cy="-11" r="1.8" fill="#FFF" opacity="0.85"/>
    </g>

    <g transform="translate(310 200)">
      <circle r="32" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.8"/>
      <circle r="24" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="2"/>
      <g transform="rotate(-12)">
        <path d="M 0 -22 L 4 0 L 0 5 L -4 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1.2"/>
        <path d="M 0 5 L 4 0 L 0 22 L -4 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="-14;-10;-14" dur="3.6s" begin="0.6s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="3" fill="#0A0706"/>
      <circle cx="-13" cy="-13" r="2" fill="#FFF" opacity="0.85"/>
    </g>

    <g transform="translate(540 150)">
      <circle r="28" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.6"/>
      <circle r="21" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="1.8"/>
      <g transform="rotate(4)">
        <path d="M 0 -19 L 4 0 L 0 4 L -4 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1.1"/>
        <path d="M 0 4 L 4 0 L 0 19 L -4 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="2;6;2" dur="4s" begin="0.9s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="2.4" fill="#0A0706"/>
      <circle cx="-11" cy="-11" r="1.8" fill="#FFF" opacity="0.85"/>
    </g>

    <g transform="translate(760 210)">
      <circle r="22" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.4"/>
      <circle r="16" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="1.6"/>
      <g transform="rotate(-6)">
        <path d="M 0 -14 L 3 0 L 0 3 L -3 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1"/>
        <path d="M 0 3 L 3 0 L 0 14 L -3 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="-8;-4;-8" dur="4.4s" begin="1.2s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="2" fill="#0A0706"/>
      <circle cx="-9" cy="-9" r="1.4" fill="#FFF" opacity="0.85"/>
    </g>

    <g transform="translate(870 360)">
      <circle r="30" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.8"/>
      <circle r="22" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="2"/>
      <g transform="rotate(14)">
        <path d="M 0 -20 L 4 0 L 0 5 L -4 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1.2"/>
        <path d="M 0 5 L 4 0 L 0 20 L -4 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="12;18;12" dur="3.4s" begin="1.5s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="2.6" fill="#0A0706"/>
      <circle cx="-12" cy="-12" r="2" fill="#FFF" opacity="0.85"/>
    </g>

    <g transform="translate(930 510)">
      <circle r="26" fill="url(#compassCaseChi)" stroke="#0A0706" stroke-width="2.6"/>
      <circle r="19" fill="url(#compassFaceChi)" stroke="#0A0706" stroke-width="1.8"/>
      <g transform="rotate(-18)">
        <path d="M 0 -17 L 4 0 L 0 4 L -4 0 Z" fill="#FF6B1A" stroke="#0A0706" stroke-width="1.1"/>
        <path d="M 0 4 L 4 0 L 0 17 L -4 0 Z" fill="#0A0706"/>
        <animateTransform attributeName="transform" type="rotate" values="-20;-16;-20" dur="3.8s" begin="1.8s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
      <circle r="2.2" fill="#0A0706"/>
      <circle cx="-10" cy="-10" r="1.6" fill="#FFF" opacity="0.85"/>
    </g>
  </g>

  <rect width="1080" height="1080" fill="url(#vignette14)" pointer-events="none"/>
</svg>
