<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 17 — AppaltoAI: building site, gear, contract">
  <title>Slide 17 — AppaltoAI</title>
  <desc>Cantiere stilizzato, ingranaggio arancione, contratto. Documenti filtrati che escono ordinati.</desc>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>

  <!-- Floor shadow -->
  <ellipse cx="540" cy="940" rx="380" ry="32" fill="#B8B5AD" opacity="0.25"/>

  <!-- BUILDING SITE (left side) — crane + scaffold -->
  <g stroke="#1A1614" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Building outline (under construction) -->
    <polygon points="180,920 180,520 360,520 360,920" fill="#F5EFE6"/>
    <!-- Floors -->
    <line x1="180" y1="620" x2="360" y2="620"/>
    <line x1="180" y1="720" x2="360" y2="720"/>
    <line x1="180" y1="820" x2="360" y2="820"/>
    <!-- Window squares -->
    <rect x="210" y="540" width="40" height="50" opacity="0.5"/>
    <rect x="280" y="540" width="40" height="50" opacity="0.5"/>
    <rect x="210" y="640" width="40" height="50" opacity="0.5"/>
    <rect x="280" y="640" width="40" height="50" opacity="0.5"/>
    <rect x="210" y="740" width="40" height="50" opacity="0.5"/>
    <rect x="280" y="740" width="40" height="50" opacity="0.5"/>
    <rect x="210" y="840" width="40" height="50" opacity="0.5"/>
    <rect x="280" y="840" width="40" height="50" opacity="0.5"/>

    <!-- Crane -->
    <line x1="120" y1="920" x2="120" y2="280" stroke-width="4"/>
    <line x1="120" y1="280" x2="380" y2="280" stroke-width="4"/>
    <line x1="120" y1="280" x2="60" y2="320"/>
    <!-- Crane support brace -->
    <line x1="120" y1="380" x2="200" y2="280"/>
    <!-- Hanging cable + hook -->
    <line x1="320" y1="280" x2="320" y2="400" stroke-dasharray="3,4"/>
    <polygon points="310,400 330,400 325,420 315,420" fill="#1A1614"/>
  </g>

  <!-- GEAR (center, orange — the narrative element) -->
  <g transform="translate(560 480)">
    <!-- Gear teeth (12 teeth, simplified) -->
    <g fill="#FF6B1A" stroke="#1A1614" stroke-width="3" stroke-linejoin="round">
      <g>
        <rect x="-12" y="-130" width="24" height="32" rx="3"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(30)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(60)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(90)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(120)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(150)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(180)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(210)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(240)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(270)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(300)"/>
        <rect x="-12" y="-130" width="24" height="32" rx="3" transform="rotate(330)"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="100" fill="#FF6B1A" stroke="#1A1614" stroke-width="3"/>
    <circle cx="0" cy="0" r="32" fill="#F5EFE6" stroke="#1A1614" stroke-width="3"/>
  </g>

  <!-- CONTRACT (right side) — folded document with a few lines and a signature swirl -->
  <g transform="translate(820 580)">
    <!-- Paper -->
    <polygon points="-90,-120 90,-120 110,-100 110,140 -90,140" fill="#F5EFE6" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>
    <!-- Folded corner -->
    <polyline points="90,-120 90,-100 110,-100" fill="none" stroke="#1A1614" stroke-width="2.5"/>
    <!-- Lines of text (just lines) -->
    <line x1="-65" y1="-80" x2="60" y2="-80" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-65" y1="-55" x2="70" y2="-55" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-65" y1="-30" x2="55" y2="-30" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-65" y1="-5" x2="70" y2="-5" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-65" y1="20" x2="40" y2="20" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="-65" y1="45" x2="60" y2="45" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Signature swirl -->
    <path d="M -50,95 C -30,80 -10,110 10,90 C 30,72 50,105 70,88" fill="none" stroke="#1A1614" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Small documents floating in from top (the input flow) -->
  <g stroke="#1A1614" stroke-width="2" stroke-linejoin="round" fill="#F5EFE6" opacity="0.6">
    <rect x="430" y="160" width="50" height="64" rx="2">
      <animate attributeName="y" values="100;160;100" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="520" y="120" width="50" height="64" rx="2">
      <animate attributeName="y" values="80;120;80" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="610" y="170" width="50" height="64" rx="2">
      <animate attributeName="y" values="110;170;110" dur="5.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Lines on those papers -->
  <g stroke="#1A1614" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
    <line x1="438" y1="178" x2="472" y2="178"/>
    <line x1="438" y1="190" x2="472" y2="190"/>
    <line x1="438" y1="202" x2="465" y2="202"/>
    <line x1="528" y1="138" x2="562" y2="138"/>
    <line x1="528" y1="150" x2="562" y2="150"/>
    <line x1="528" y1="162" x2="555" y2="162"/>
    <line x1="618" y1="188" x2="652" y2="188"/>
    <line x1="618" y1="200" x2="652" y2="200"/>
    <line x1="618" y1="212" x2="645" y2="212"/>
  </g>
</svg>
