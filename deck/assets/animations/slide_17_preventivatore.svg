<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 17 — Preventivatore: a quote sheet writing itself, lines auto-fill with Bezier curves, final element is an orange client signature with a send arrow">
  <title>Slide 17 — Preventivatore (firma cliente)</title>
  <desc>Foglio listino/preventivo che si forma da solo, righe che si compilano come una mano invisibile scrive, ultimo elemento = firma cliente arancione + freccia di send verso destra. Curve Bezier sulle righe (no L L L).</desc>

  <defs>
    <filter id="painterly17" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="17"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="contactBlur17" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="hazePrev" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
    <filter id="softGlow17" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Sheet -->
    <linearGradient id="sheet17" x1="20%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#E0D6C0"/>
    </linearGradient>
    <!-- Sheet shadow -->
    <linearGradient id="sheetShadow17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D9CCAE"/>
      <stop offset="100%" stop-color="#9A8A6C"/>
    </linearGradient>
    <!-- Header bar -->
    <linearGradient id="header17" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3F3328"/>
      <stop offset="100%" stop-color="#1A1209"/>
    </linearGradient>
    <!-- Send arrow -->
    <linearGradient id="sendArrow17" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#FFC890"/>
      <stop offset="100%" stop-color="#9C3A0E"/>
    </linearGradient>

    <radialGradient id="haloOrange17" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#FF6B1A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette17" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.28"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="#F5EFE6"/>
  <rect width="1080" height="1080" fill="#D9B98A" opacity="0.045" filter="url(#painterly17)"/>

  <!-- Mandala -->
  <g transform="translate(540 540)" opacity="0.34" filter="url(#hazePrev)">
    <circle r="460" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,9"/>
    <circle r="408" fill="none" stroke="#1A1614" stroke-width="1.3" stroke-dasharray="3,8"/>
    <circle r="356" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,5"/>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="200s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- Shadow behind sheet -->
  <g transform="translate(540 540)">
    <path d="M -270 -322 Q -284 -338 -266 -342 L 282 -340 Q 298 -340 286 -322 L 304 320 Q 304 340 286 342 L -270 340 Q -286 340 -286 320 Z"
          fill="url(#sheetShadow17)" opacity="0.5" transform="translate(18 22)" filter="url(#contactBlur17)"/>
  </g>

  <!-- =========================================================
       SHEET (isometric-tilt, Bezier corners)
       ========================================================= -->
  <g transform="translate(540 540)">

    <!-- Subtle orange halo behind right-bottom (suggests "signed area glows") -->
    <ellipse cx="120" cy="220" rx="200" ry="120" fill="url(#haloOrange17)"/>

    <!-- Sheet body -->
    <path d="M -270 -322 Q -284 -338 -266 -342 L 282 -340 Q 298 -340 286 -322 L 304 320 Q 304 340 286 342 L -270 340 Q -286 340 -286 320 Z"
          fill="url(#sheet17)" stroke="#0A0706" stroke-width="4" stroke-linejoin="round"/>

    <!-- Header bar -->
    <path d="M -270 -322 Q -284 -338 -266 -342 L 282 -340 Q 298 -340 286 -322 L 290 -260 Q 290 -252 282 -252 L -278 -252 Q -286 -252 -286 -260 Z"
          fill="url(#header17)" stroke="#0A0706" stroke-width="3" stroke-linejoin="round"/>

    <!-- Header marks (3 dots, no text) -->
    <g fill="#FAF5EC" opacity="0.7">
      <circle cx="-244" cy="-292" r="5"/>
      <circle cx="-220" cy="-292" r="5"/>
      <circle cx="-196" cy="-292" r="5"/>
    </g>
    <!-- Header title bar (decorative) -->
    <path d="M -156 -296 Q -60 -302 80 -298" fill="none"
          stroke="#FAF5EC" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
    <path d="M -156 -286 Q -40 -290 20 -288" fill="none"
          stroke="#FAF5EC" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

    <!-- Vertical column separator (Bezier) -->
    <path d="M 140 -250 Q 142 0 144 320" fill="none"
          stroke="#1A1614" stroke-width="1.6" stroke-dasharray="3,6" opacity="0.45"/>

    <!-- =========================================================
         AUTO-FILLING ROWS — 7 rows of (label-curve) + (value-curve)
         Each row appears with a stagger animate
         All curves are Q Bezier (no L L L on form-organic content)
         ========================================================= -->
    <g stroke="#1A1614" stroke-linecap="round" fill="none">
      <!-- Row 1 -->
      <g opacity="0">
        <path d="M -240 -190 Q -160 -194 -60 -190" stroke-width="3"/>
        <path d="M 174 -190 Q 220 -192 264 -190" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.05;1" repeatCount="indefinite"/>
      </g>
      <!-- Row 2 -->
      <g opacity="0">
        <path d="M -240 -148 Q -130 -152 -10 -148" stroke-width="3"/>
        <path d="M 174 -148 Q 230 -150 264 -148" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.15;1" repeatCount="indefinite"/>
      </g>
      <!-- Row 3 -->
      <g opacity="0">
        <path d="M -240 -106 Q -120 -110 -34 -106" stroke-width="3"/>
        <path d="M 174 -106 Q 226 -108 264 -106" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.25;1" repeatCount="indefinite"/>
      </g>
      <!-- Row 4 -->
      <g opacity="0">
        <path d="M -240 -64 Q -140 -68 -50 -64" stroke-width="3"/>
        <path d="M 174 -64 Q 220 -66 264 -64" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.35;1" repeatCount="indefinite"/>
      </g>
      <!-- Row 5 -->
      <g opacity="0">
        <path d="M -240 -22 Q -160 -26 -76 -22" stroke-width="3"/>
        <path d="M 174 -22 Q 232 -24 264 -22" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.45;1" repeatCount="indefinite"/>
      </g>
      <!-- Row 6 -->
      <g opacity="0">
        <path d="M -240 20 Q -100 16 -2 20" stroke-width="3"/>
        <path d="M 174 20 Q 222 18 264 20" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.55;1" repeatCount="indefinite"/>
      </g>
      <!-- Row 7 -->
      <g opacity="0">
        <path d="M -240 62 Q -140 58 -40 62" stroke-width="3"/>
        <path d="M 174 62 Q 230 60 264 62" stroke-width="3"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.65;1" repeatCount="indefinite"/>
      </g>

      <!-- Subtotal divider (bolder) -->
      <g opacity="0">
        <path d="M -240 110 Q 0 106 264 110" stroke-width="2" opacity="0.55"/>
        <animate attributeName="opacity" values="0;0.55;0.55" dur="6s" keyTimes="0;0.72;1" repeatCount="indefinite"/>
      </g>

      <!-- TOTALE row (heavier) -->
      <g opacity="0">
        <path d="M -240 144 Q -140 140 -60 144" stroke-width="5"/>
        <path d="M 160 144 Q 210 140 268 144" stroke-width="5"/>
        <animate attributeName="opacity" values="0;1;1" dur="6s" keyTimes="0;0.8;1" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- =========================================================
         ORANGE CLIENT SIGNATURE — bottom area, hero element
         A flowing Bezier signature that appears last
         ========================================================= -->
    <g transform="translate(-80 240)">
      <g opacity="0">
        <!-- Signature line (cream guide) -->
        <path d="M -150 32 Q 0 28 200 32" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.45" stroke-dasharray="3,5"/>
        <!-- The signature (Bezier flowing — orange) -->
        <path d="M -140 14 C -120 -10 -100 -4 -88 12 C -80 22 -76 14 -68 -2 C -56 -24 -38 -16 -28 4 C -18 22 -8 16 4 -4 C 18 -28 32 -22 40 -2 C 48 16 64 14 80 -6 C 92 -22 110 -16 122 8 C 132 26 152 24 168 0"
              fill="none" stroke="#FF6B1A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Tail flourish -->
        <path d="M 168 0 Q 184 -10 196 4 Q 200 14 188 18" fill="none"
              stroke="#FF6B1A" stroke-width="4" stroke-linecap="round"/>
        <animate attributeName="opacity" values="0;0;1;1" dur="6s" keyTimes="0;0.86;0.92;1" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- =========================================================
       SEND ARROW (right-pointing Bezier curve, orange, gradient)
       Outside sheet → emphasizing "preventivo va al cliente"
       ========================================================= -->
  <g transform="translate(880 720)">
    <g opacity="0">
      <!-- Arrow body (Bezier swoosh) -->
      <path d="M -80 0 Q -20 -24 60 -8" fill="none"
            stroke="url(#sendArrow17)" stroke-width="9" stroke-linecap="round"/>
      <!-- Arrowhead -->
      <path d="M 50 -22 Q 64 -10 70 -8 Q 60 4 48 8 Q 56 -2 50 -22 Z"
            fill="#FF6B1A" stroke="#0A0706" stroke-width="2"/>
      <!-- subtle motion trail -->
      <path d="M -110 6 Q -88 -14 -72 -8" fill="none"
            stroke="#FF6B1A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
      <path d="M -120 14 Q -98 -2 -84 0" fill="none"
            stroke="#FF6B1A" stroke-width="1.4" stroke-linecap="round" opacity="0.35"/>

      <animate attributeName="opacity" values="0;0;1;1" dur="6s" keyTimes="0;0.92;0.96;1" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0;14 -4;0 0" dur="6s" keyTimes="0;0.96;1" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Soft glow behind signature -->
  <circle cx="540" cy="800" r="140" fill="#FF6B1A" opacity="0.08" filter="url(#softGlow17)"/>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette17)" pointer-events="none"/>
</svg>
