<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 19 — Project Manager AI: 360 hub with central figure and eight radiating process icons">
  <title>Slide 19 — Project Manager AI (hub 360°)</title>
  <desc>Hub centrale con persona stilizzata e otto raggi che si irradiano verso icone di processo: kanban, calendario, persone, email, file, chat, alert, grafico.</desc>

  <defs>
    <filter id="painterly19" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="contactBlur19" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="hazePM" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>

    <!-- Central hub disk gradient (top-right light) -->
    <radialGradient id="hubDisk" cx="35%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#FFE3C2"/>
      <stop offset="50%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#005C5A"/>
    </radialGradient>

    <!-- Cream node card -->
    <radialGradient id="nodeCard19" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#E0D6C0"/>
    </radialGradient>

    <!-- Figure (central person) body -->
    <linearGradient id="figureBody" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#2A1F18"/>
      <stop offset="100%" stop-color="#0E0907"/>
    </linearGradient>

    <radialGradient id="haloPM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AAA6" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#00AAA6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00AAA6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette19" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.26"/>
    </radialGradient>
  </defs>

  <!-- BG cream + painterly grain -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>
  <rect width="1080" height="1080" fill="#D9B98A" opacity="0.04" filter="url(#painterly19)"/>

  <!-- BG LAYER 1 (far) — Cartoon Saloon concentric mandala -->
  <g transform="translate(540 540)" opacity="0.35" filter="url(#hazePM)">
    <circle r="430" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,8"/>
    <circle r="388" fill="none" stroke="#1A1614" stroke-width="1.2" stroke-dasharray="3,9"/>
    <circle r="346" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,5"/>
    <!-- Mandala counter-rotation -->
    <animateTransform attributeName="transform" type="rotate"
                      values="360 0 0;0 0 0" dur="140s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- Soft orange halo behind hub -->
  <circle cx="540" cy="540" r="260" fill="url(#haloPM)">
    <animate attributeName="r" values="230;280;230" dur="5.2s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </circle>

  <!-- =========================================================
       ROTATING SYSTEM — wheel of 8 spokes + nodes
       The spokes group rotates slowly clockwise.
       Node icons inside counter-rotate so they stay upright.
       ========================================================= -->
  <g transform="translate(540 540)">

    <!-- Main slow rotation for spokes + ring -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="0;360" dur="90s" repeatCount="indefinite"/>

      <!-- Inner ring -->
      <circle r="200" fill="none" stroke="#1A1614" stroke-width="2" stroke-dasharray="4,8" opacity="0.45"/>
      <!-- Outer ring -->
      <circle r="370" fill="none" stroke="#1A1614" stroke-width="1.8" stroke-dasharray="2,10" opacity="0.4"/>

      <!-- 8 SPOKES (curves, not straight lines — Disney organic) -->
      <!-- Each spoke: starts at r~110, ends at r~360. We draw 8 at 45° steps. -->
      <g stroke="#1A1614" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.7">
        <!-- 0° right -->
        <path d="M 110 0 Q 230 -8 360 0"/>
        <!-- 45° -->
        <path d="M 78 78 Q 168 168 254 254"/>
        <!-- 90° -->
        <path d="M 0 110 Q 8 230 0 360"/>
        <!-- 135° -->
        <path d="M -78 78 Q -168 168 -254 254"/>
        <!-- 180° -->
        <path d="M -110 0 Q -230 8 -360 0"/>
        <!-- 225° -->
        <path d="M -78 -78 Q -168 -168 -254 -254"/>
        <!-- 270° -->
        <path d="M 0 -110 Q -8 -230 0 -360"/>
        <!-- 315° -->
        <path d="M 78 -78 Q 168 -168 254 -254"/>
      </g>

      <!-- Variable-weight accents on every other spoke (Disney peso variabile) -->
      <g stroke="#1A1614" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55">
        <path d="M 200 0 Q 260 -4 320 0"/>
        <path d="M 0 200 Q -4 260 0 320"/>
        <path d="M -200 0 Q -260 4 -320 0"/>
        <path d="M 0 -200 Q 4 -260 0 -320"/>
      </g>

      <!-- Orange traveling pulses along the rings (energy flow) -->
      <circle r="6" fill="#00AAA6" opacity="0.85">
        <animateMotion path="M 200 0 A 200 200 0 1 1 199.9 0 Z" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle r="4" fill="#00AAA6" opacity="0.7">
        <animateMotion path="M 370 0 A 370 370 0 1 0 369.9 0 Z" dur="14s" repeatCount="indefinite"/>
      </circle>

      <!-- 8 NODE positions — at radius 380, every 45° -->
      <!-- Each node is a small card; inside we counter-rotate to keep it upright -->

      <!-- NODE 1 (right) — KANBAN -->
      <g transform="translate(380 0)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <!-- kanban columns inside -->
          <g stroke="#1A1614" stroke-width="2" stroke-linecap="round" fill="none">
            <path d="M -22 -16 L -22 16"/>
            <path d="M -2 -16 L -2 16"/>
            <path d="M 18 -16 L 18 16"/>
          </g>
          <rect x="-19" y="-12" width="14" height="8" rx="1.5" fill="#1A1614" opacity="0.55"/>
          <rect x="1" y="-12" width="14" height="8" rx="1.5" fill="#00AAA6"/>
          <rect x="21" y="-12" width="14" height="8" rx="1.5" fill="#1A1614" opacity="0.4"/>
          <rect x="-19" y="-2" width="14" height="6" rx="1.5" fill="#1A1614" opacity="0.4"/>
          <rect x="1" y="2" width="14" height="6" rx="1.5" fill="#1A1614" opacity="0.4"/>
        </g>
      </g>

      <!-- NODE 2 (45°) — CALENDAR -->
      <g transform="translate(268.7 268.7)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <path d="M -22 -18 L 22 -18 L 22 -10 L -22 -10 Z" fill="#1A1614"/>
          <path d="M -16 -22 Q -14 -26 -12 -22 L -12 -14 Q -14 -10 -16 -14 Z" fill="#1A1614"/>
          <path d="M 16 -22 Q 14 -26 12 -22 L 12 -14 Q 14 -10 16 -14 Z" fill="#1A1614"/>
          <g stroke="#1A1614" stroke-width="1.2" fill="none" opacity="0.5">
            <path d="M -22 0 L 22 0"/>
            <path d="M -22 8 L 22 8"/>
            <path d="M -8 -10 L -8 18"/>
            <path d="M 8 -10 L 8 18"/>
          </g>
          <rect x="-6" y="2" width="12" height="6" fill="#00AAA6"/>
        </g>
      </g>

      <!-- NODE 3 (90° bottom) — PEOPLE -->
      <g transform="translate(0 380)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <!-- 3 silhouette dots: classic group icon, asymmetric -->
          <circle cx="-14" cy="-6" r="6" fill="#1A1614"/>
          <path d="M -22 12 C -22 4 -14 0 -6 0 L -6 14 Z" fill="#1A1614"/>
          <circle cx="0" cy="-10" r="7" fill="#1A1614"/>
          <path d="M -10 18 C -10 8 -2 4 0 4 C 2 4 10 8 10 18 Z" fill="#1A1614"/>
          <circle cx="14" cy="-6" r="6" fill="#1A1614"/>
          <path d="M 6 12 C 6 4 14 0 22 0 L 22 14 Z" fill="#1A1614"/>
        </g>
      </g>

      <!-- NODE 4 (135°) — EMAIL -->
      <g transform="translate(-268.7 268.7)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <path d="M -22 -10 Q -22 -16 -16 -16 L 16 -16 Q 22 -16 22 -10 L 22 12 Q 22 18 16 18 L -16 18 Q -22 18 -22 12 Z"
                fill="#F5EFE6" stroke="#1A1614" stroke-width="2.2"/>
          <path d="M -22 -10 Q 0 8 22 -10" fill="none" stroke="#1A1614" stroke-width="2.2"/>
          <circle cx="16" cy="-10" r="3.5" fill="#00AAA6" stroke="#1A1614" stroke-width="1.2"/>
        </g>
      </g>

      <!-- NODE 5 (180° left) — FILE -->
      <g transform="translate(-380 0)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <path d="M -14 -20 L 8 -20 Q 20 -8 20 -8 L 20 18 L -14 18 Z"
                fill="#F5EFE6" stroke="#1A1614" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M 8 -20 L 8 -8 L 20 -8" fill="none" stroke="#1A1614" stroke-width="2"/>
          <g stroke="#1A1614" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
            <path d="M -8 -2 Q 0 -4 14 -2"/>
            <path d="M -8 6 Q 4 8 14 6"/>
            <path d="M -8 14 Q -2 12 8 14"/>
          </g>
        </g>
      </g>

      <!-- NODE 6 (225°) — CHAT -->
      <g transform="translate(-268.7 -268.7)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <!-- bubble 1 (big) -->
          <path d="M -22 -12 Q -22 -22 -12 -22 L 16 -22 Q 26 -22 26 -12 L 26 0 Q 26 8 18 8 L -4 8 L -10 14 L -10 8 Q -22 8 -22 0 Z"
                fill="#F5EFE6" stroke="#1A1614" stroke-width="2.2" stroke-linejoin="round"/>
          <!-- bubble 2 (small) -->
          <path d="M -8 6 Q -8 -2 0 -2 L 18 -2 Q 26 -2 26 6 L 26 14 Q 26 22 18 22 L 10 22 L 6 26 L 6 22 Q -8 22 -8 14 Z"
                fill="#00AAA6" stroke="#1A1614" stroke-width="2.2" stroke-linejoin="round" opacity="0.95"/>
        </g>
      </g>

      <!-- NODE 7 (270° top) — ALERT -->
      <g transform="translate(0 -380)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <!-- bell (curved, Disney) -->
          <path d="M -18 8 Q -22 -2 -18 -10 Q -10 -22 0 -22 Q 10 -22 18 -10 Q 22 -2 18 8 Z"
                fill="#00AAA6" stroke="#1A1614" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M -22 8 L 22 8" stroke="#1A1614" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M -4 12 Q 0 16 4 12" fill="#1A1614"/>
          <circle cx="0" cy="-24" r="3" fill="#1A1614"/>
        </g>
      </g>

      <!-- NODE 8 (315°) — CHART (KPI) -->
      <g transform="translate(268.7 -268.7)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="90s" repeatCount="indefinite"/>
          <circle r="40" fill="url(#nodeCard19)" stroke="#1A1614" stroke-width="3"/>
          <!-- 3 ascending bars -->
          <rect x="-22" y="0" width="10" height="16" rx="1.5" fill="#1A1614" opacity="0.7"/>
          <rect x="-6" y="-8" width="10" height="24" rx="1.5" fill="#1A1614" opacity="0.85"/>
          <rect x="10" y="-18" width="10" height="34" rx="1.5" fill="#00AAA6"/>
          <!-- baseline -->
          <path d="M -24 18 L 22 18" stroke="#1A1614" stroke-width="2" stroke-linecap="round"/>
        </g>
      </g>

    </g>
  </g>

  <!-- =========================================================
       CENTRAL HUB DISK + PERSON (back view, dignity)
       NOT rotating — stays anchored
       ========================================================= -->
  <g transform="translate(540 540)">
    <!-- Outer hub ring -->
    <circle r="118" fill="url(#hubDisk)" stroke="#1A1614" stroke-width="4"/>
    <!-- Inner cream disk where person sits -->
    <circle r="92" fill="#F5EFE6" stroke="#1A1614" stroke-width="2.4"/>
    <!-- Decorative inner ring (Cartoon Saloon detail) -->
    <circle r="78" fill="none" stroke="#1A1614" stroke-width="1.2" stroke-dasharray="2,5" opacity="0.55"/>

    <!-- Person silhouette (back view, slight contrapposto — line of action S) -->
    <g>
      <!-- Head (slightly tilted right, asymmetric ellipse) -->
      <ellipse cx="4" cy="-32" rx="22" ry="26" fill="url(#figureBody)" stroke="#0A0706" stroke-width="2.5"/>
      <!-- Subtle rim light on head (top-right) -->
      <path d="M 14 -52 C 22 -50 26 -42 26 -36" fill="none"
            stroke="#D9B98A" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
      <!-- Shoulders / torso (asymmetric: left shoulder higher = contrapposto) -->
      <path d="M -38 -4 C -42 14 -48 38 -44 62
               C -28 70 0 72 30 70
               C 50 64 52 38 48 12
               C 44 -6 30 -14 8 -16
               C -14 -16 -32 -14 -38 -4 Z"
            fill="url(#figureBody)" stroke="#0A0706" stroke-width="3.5" stroke-linejoin="round"/>
      <!-- Subtle hair / nape line -->
      <path d="M -10 -42 Q 4 -56 22 -46" fill="none"
            stroke="#0A0706" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
      <!-- Ambient occlusion under head -->
      <path d="M -16 -16 Q 4 -10 24 -16" fill="none"
            stroke="#000" stroke-width="2.2" opacity="0.45" filter="url(#contactBlur19)"/>
    </g>

    <!-- "360°" implied — small orange ring marker that orbits the figure -->
    <circle cx="0" cy="0" r="106" fill="none" stroke="#00AAA6" stroke-width="3" stroke-dasharray="80,360" stroke-linecap="round" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate"
                        values="0;360" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette19)" pointer-events="none"/>
</svg>
