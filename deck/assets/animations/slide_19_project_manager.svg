<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 19 — Project Manager AI: kanban board with one orange task">
  <title>Slide 19 — Project Manager AI</title>
  <desc>Kanban a 3 colonne in vista isometrica, una task arancione in progress.</desc>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>

  <!-- Floor shadow under board -->
  <ellipse cx="540" cy="900" rx="380" ry="34" fill="#B8B5AD" opacity="0.22"/>

  <!-- BOARD baseplate (slight isometric tilt) -->
  <g stroke="#1A1614" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Board background -->
    <polygon points="180,260 900,220 940,820 220,860" fill="#F5EFE6"/>
    <!-- Board side (depth) -->
    <polygon points="180,260 220,860 220,880 180,280" fill="#B8B5AD" opacity="0.35"/>
    <polygon points="900,220 940,820 940,840 900,240" fill="#B8B5AD" opacity="0.35"/>
  </g>

  <!-- 3 columns (separators) -->
  <g stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="420" y1="245" x2="450" y2="845"/>
    <line x1="660" y1="225" x2="690" y2="825"/>
  </g>

  <!-- Column headers (just thin underlines, no text) -->
  <g stroke="#1A1614" stroke-width="3" stroke-linecap="round">
    <line x1="220" y1="320" x2="420" y2="308"/>
    <line x1="455" y1="306" x2="660" y2="294"/>
    <line x1="690" y1="293" x2="900" y2="280"/>
  </g>

  <!-- COLUMN 1 (TODO) — 3 cards, all black/cream outlined -->
  <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" fill="#F5EFE6">
    <rect x="240" y="360" width="160" height="80" rx="6"/>
    <rect x="245" y="470" width="160" height="80" rx="6"/>
    <rect x="250" y="580" width="160" height="80" rx="6"/>
  </g>
  <!-- card content lines (no text, just bars) -->
  <g stroke="#1A1614" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="258" y1="384" x2="350" y2="384"/>
    <line x1="258" y1="404" x2="380" y2="404"/>
    <line x1="258" y1="422" x2="330" y2="422"/>

    <line x1="263" y1="494" x2="355" y2="494"/>
    <line x1="263" y1="514" x2="385" y2="514"/>
    <line x1="263" y1="532" x2="335" y2="532"/>

    <line x1="268" y1="604" x2="360" y2="604"/>
    <line x1="268" y1="624" x2="390" y2="624"/>
    <line x1="268" y1="642" x2="340" y2="642"/>
  </g>

  <!-- COLUMN 2 (IN PROGRESS) — 2 cards, the TOP one is ORANGE (narrative) -->
  <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round">
    <!-- THE ORANGE TASK (in progress) -->
    <rect x="468" y="355" width="170" height="84" rx="6" fill="#FF6B1A"/>
    <rect x="468" y="355" width="170" height="84" rx="6" fill="none" stroke="#1A1614"/>
    <!-- Pulsing glow halo -->
    <rect x="458" y="345" width="190" height="104" rx="10" fill="#FF6B1A" opacity="0">
      <animate attributeName="opacity" values="0;0.18;0" dur="2.6s" repeatCount="indefinite"/>
    </rect>

    <!-- Second card (normal) -->
    <rect x="472" y="470" width="170" height="80" rx="6" fill="#F5EFE6"/>
  </g>
  <g stroke="#F5EFE6" stroke-width="2.5" stroke-linecap="round" opacity="0.95">
    <line x1="486" y1="382" x2="585" y2="382"/>
    <line x1="486" y1="404" x2="615" y2="404"/>
    <line x1="486" y1="424" x2="555" y2="424"/>
  </g>
  <g stroke="#1A1614" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="490" y1="494" x2="585" y2="494"/>
    <line x1="490" y1="514" x2="615" y2="514"/>
    <line x1="490" y1="532" x2="555" y2="532"/>
  </g>

  <!-- COLUMN 3 (DONE) — 2 cards -->
  <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" fill="#F5EFE6">
    <rect x="705" y="345" width="160" height="80" rx="6"/>
    <rect x="710" y="455" width="160" height="80" rx="6"/>
  </g>
  <g stroke="#1A1614" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="723" y1="369" x2="815" y2="369"/>
    <line x1="723" y1="389" x2="845" y2="389"/>
    <line x1="723" y1="407" x2="795" y2="407"/>

    <line x1="728" y1="479" x2="820" y2="479"/>
    <line x1="728" y1="499" x2="850" y2="499"/>
    <line x1="728" y1="517" x2="800" y2="517"/>
  </g>
  <!-- Small checkmark on done cards -->
  <g stroke="#1A1614" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="845,355 852,365 868,348"/>
    <polyline points="850,465 857,475 873,458"/>
  </g>

  <!-- Two silhouette figures flanking the board, back view -->
  <g fill="#1A1614">
    <!-- Left figure -->
    <g transform="translate(120 760)">
      <ellipse cx="0" cy="-90" rx="24" ry="28" fill="#1A1614"/>
      <path d="M -38,-55 C -40,-25 -46,30 -42,70 L 42,70 C 46,30 40,-25 38,-55 C 35,-72 22,-78 0,-78 C -22,-78 -35,-72 -38,-55 Z" fill="#1A1614"/>
    </g>
    <!-- Right figure -->
    <g transform="translate(990 740)">
      <ellipse cx="0" cy="-90" rx="24" ry="28" fill="#1A1614"/>
      <path d="M -38,-55 C -40,-25 -46,30 -42,70 L 42,70 C 46,30 40,-25 38,-55 C 35,-72 22,-78 0,-78 C -22,-78 -35,-72 -38,-55 Z" fill="#1A1614"/>
    </g>
  </g>
</svg>
