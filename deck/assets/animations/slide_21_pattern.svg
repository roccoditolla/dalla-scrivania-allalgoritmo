<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 21 — Pattern: five orange compasses arranged in a circle">
  <title>Slide 21 — Il pattern</title>
  <desc>Cinque bussole arancioni piccole disposte in pentagono attorno al centro.</desc>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>

  <!-- Soft central halo -->
  <g transform="translate(540 540)">
    <circle cx="0" cy="0" r="80" fill="#FF6B1A" opacity="0.06">
      <animate attributeName="opacity" values="0.04;0.12;0.04" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection lines between compasses (forming a pentagonal star pattern) -->
  <g stroke="#1A1614" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,6" opacity="0.45">
    <!-- Pentagon perimeter (connecting adjacent compasses) -->
    <!-- Compasses at: top(540,200), upper-right(840,420), lower-right(720,800), lower-left(360,800), upper-left(240,420) -->
    <line x1="540" y1="200" x2="840" y2="420"/>
    <line x1="840" y1="420" x2="720" y2="800"/>
    <line x1="720" y1="800" x2="360" y2="800"/>
    <line x1="360" y1="800" x2="240" y2="420"/>
    <line x1="240" y1="420" x2="540" y2="200"/>
    <!-- Star (skipping one) — gives the "pentagram" feel -->
    <line x1="540" y1="200" x2="720" y2="800" opacity="0.5"/>
    <line x1="540" y1="200" x2="360" y2="800" opacity="0.5"/>
    <line x1="240" y1="420" x2="720" y2="800" opacity="0.5"/>
    <line x1="840" y1="420" x2="360" y2="800" opacity="0.5"/>
    <line x1="240" y1="420" x2="840" y2="420" opacity="0.5"/>
  </g>

  <!-- Five small compasses at the pentagon vertices -->
  <g>
    <!-- Compass TOP (540,200) -->
    <g transform="translate(540 200)">
      <circle cx="0" cy="0" r="58" fill="#F5EFE6" stroke="#1A1614" stroke-width="3"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.4"/>
      <g stroke="#1A1614" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-50"/>
        <line x1="58" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="58" x2="0" y2="50"/>
        <line x1="-58" y1="0" x2="-50" y2="0"/>
      </g>
      <polygon points="0,-36 8,0 0,4 -8,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="1.5"/>
      <polygon points="0,36 8,0 0,-4 -8,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="5" fill="#1A1614"/>
      <circle cx="0" cy="0" r="2" fill="#FF6B1A">
        <animate attributeName="r" values="1.5;3.5;1.5" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Compass UPPER-RIGHT (840,420) -->
    <g transform="translate(840 420)">
      <circle cx="0" cy="0" r="58" fill="#F5EFE6" stroke="#1A1614" stroke-width="3"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.4"/>
      <g stroke="#1A1614" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-50"/>
        <line x1="58" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="58" x2="0" y2="50"/>
        <line x1="-58" y1="0" x2="-50" y2="0"/>
      </g>
      <polygon points="0,-36 8,0 0,4 -8,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="1.5" transform="rotate(72)"/>
      <polygon points="0,36 8,0 0,-4 -8,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="1.5" transform="rotate(72)"/>
      <circle cx="0" cy="0" r="5" fill="#1A1614"/>
      <circle cx="0" cy="0" r="2" fill="#FF6B1A">
        <animate attributeName="r" values="1.5;3.5;1.5" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Compass LOWER-RIGHT (720,800) -->
    <g transform="translate(720 800)">
      <circle cx="0" cy="0" r="58" fill="#F5EFE6" stroke="#1A1614" stroke-width="3"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.4"/>
      <g stroke="#1A1614" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-50"/>
        <line x1="58" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="58" x2="0" y2="50"/>
        <line x1="-58" y1="0" x2="-50" y2="0"/>
      </g>
      <polygon points="0,-36 8,0 0,4 -8,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="1.5" transform="rotate(144)"/>
      <polygon points="0,36 8,0 0,-4 -8,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="1.5" transform="rotate(144)"/>
      <circle cx="0" cy="0" r="5" fill="#1A1614"/>
      <circle cx="0" cy="0" r="2" fill="#FF6B1A">
        <animate attributeName="r" values="1.5;3.5;1.5" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Compass LOWER-LEFT (360,800) -->
    <g transform="translate(360 800)">
      <circle cx="0" cy="0" r="58" fill="#F5EFE6" stroke="#1A1614" stroke-width="3"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.4"/>
      <g stroke="#1A1614" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-50"/>
        <line x1="58" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="58" x2="0" y2="50"/>
        <line x1="-58" y1="0" x2="-50" y2="0"/>
      </g>
      <polygon points="0,-36 8,0 0,4 -8,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="1.5" transform="rotate(216)"/>
      <polygon points="0,36 8,0 0,-4 -8,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="1.5" transform="rotate(216)"/>
      <circle cx="0" cy="0" r="5" fill="#1A1614"/>
      <circle cx="0" cy="0" r="2" fill="#FF6B1A">
        <animate attributeName="r" values="1.5;3.5;1.5" dur="2.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Compass UPPER-LEFT (240,420) -->
    <g transform="translate(240 420)">
      <circle cx="0" cy="0" r="58" fill="#F5EFE6" stroke="#1A1614" stroke-width="3"/>
      <circle cx="0" cy="0" r="52" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.4"/>
      <g stroke="#1A1614" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-58" x2="0" y2="-50"/>
        <line x1="58" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="58" x2="0" y2="50"/>
        <line x1="-58" y1="0" x2="-50" y2="0"/>
      </g>
      <polygon points="0,-36 8,0 0,4 -8,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="1.5" transform="rotate(288)"/>
      <polygon points="0,36 8,0 0,-4 -8,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="1.5" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="5" fill="#1A1614"/>
      <circle cx="0" cy="0" r="2" fill="#FF6B1A">
        <animate attributeName="r" values="1.5;3.5;1.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Center small dot (the convergence point) -->
  <g transform="translate(540 540)">
    <circle cx="0" cy="0" r="14" fill="#FF6B1A" stroke="#1A1614" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#FF6B1A" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="18;32;18" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
