<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 22. Videoconferenze ed eLearning: minimal 3-quarter room with employee from back at a screen with 4 participants and an open book below">
  <title>Slide 22. Videoconferenze + eLearning</title>
  <desc>Stanza minimal in 3/4 prospettiva. Un dipendente di spalle davanti a uno schermo che mostra quattro partecipanti silhouette. Sotto lo schermo un libro aperto con righe (e-Learning). Luce calda da finestra a destra.</desc>

  <defs>
    <filter id="painterly22" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="22"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="contactBlur22" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="softGlow22" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="hazeVC" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>

    <!-- Back wall (warm cream, vertical gradient) -->
    <linearGradient id="backWall" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F2E8D2"/>
      <stop offset="100%" stop-color="#D9CAA8"/>
    </linearGradient>

    <!-- Floor (cool warm fade, perspective receding) -->
    <linearGradient id="floor22" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C6B58E"/>
      <stop offset="100%" stop-color="#8C7758"/>
    </linearGradient>

    <!-- Right wall (in shadow, cooler) -->
    <linearGradient id="rightWall" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#D6C9A8"/>
      <stop offset="100%" stop-color="#7A6A4E"/>
    </linearGradient>

    <!-- Window warm light flood -->
    <linearGradient id="windowLight" x1="100%" y1="20%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE3A8" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#B8E8E7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B8E8E7" stop-opacity="0"/>
    </linearGradient>

    <!-- Screen panel gradient (cool blue, contrasts warm room) -->
    <linearGradient id="screenGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#3E5F7A"/>
      <stop offset="100%" stop-color="#1E2F40"/>
    </linearGradient>

    <!-- Screen bezel -->
    <linearGradient id="screenBezel" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2C2218"/>
      <stop offset="100%" stop-color="#0D0907"/>
    </linearGradient>

    <!-- Participant silhouette (warm cream, looks like a video tile) -->
    <linearGradient id="participantTile" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6F8AA8"/>
      <stop offset="100%" stop-color="#3E5673"/>
    </linearGradient>

    <!-- Participant silhouette body (very dark blue) -->
    <linearGradient id="silhouetteBody" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1A2738"/>
      <stop offset="100%" stop-color="#0A1019"/>
    </linearGradient>

    <!-- Employee silhouette body (warm dark) -->
    <linearGradient id="employeeBody22" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#2A1F18"/>
      <stop offset="100%" stop-color="#0A0706"/>
    </linearGradient>

    <!-- Desk -->
    <linearGradient id="deskGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#B8966A"/>
      <stop offset="100%" stop-color="#6E5736"/>
    </linearGradient>

    <!-- Book pages -->
    <linearGradient id="bookPage" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#D9CCAE"/>
    </linearGradient>

    <radialGradient id="vignette22" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.32"/>
    </radialGradient>
  </defs>

  <!-- BG cream -->
  <rect width="1080" height="1080" fill="#FFFFFF"/>

  <!-- =========================================================
       ROOM. 3/4 perspective
       Back wall (a slightly trapezoid panel), right wall (recedes),
       floor (large trapezoid in front)
       ========================================================= -->

  <!-- Back wall (slightly off-square to suggest perspective) -->
  <path d="M 130 160 Q 132 152 142 152 L 700 168 Q 712 168 714 178 L 712 720 Q 712 730 700 730 L 142 724 Q 132 724 130 712 Z"
        fill="url(#backWall)" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>

  <!-- Right wall (recedes to the right) -->
  <path d="M 712 178 L 712 720 L 980 820 L 980 100 Z"
        fill="url(#rightWall)" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>

  <!-- Floor (trapezoid receding into back wall) -->
  <path d="M 130 712 L 712 720 L 980 820 L 980 980 L 60 980 Z"
        fill="url(#floor22)" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>

  <!-- Floor lines (perspective converging) -->
  <g stroke="#1A1614" stroke-width="1.2" fill="none" opacity="0.3">
    <path d="M 60 980 Q 280 880 700 760"/>
    <path d="M 300 980 Q 460 880 712 760"/>
    <path d="M 540 980 Q 640 880 712 720"/>
    <path d="M 780 980 Q 820 880 880 760"/>
  </g>

  <!-- =========================================================
       WINDOW (right wall). source of warm light
       ========================================================= -->
  <g>
    <!-- Window frame (parallelogram on the right wall) -->
    <path d="M 760 260 L 920 220 L 920 480 L 760 500 Z"
          fill="#FFE9B8" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>
    <!-- Window mullion -->
    <path d="M 838 240 L 838 490" stroke="#1A1614" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 760 380 L 920 350" stroke="#1A1614" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Sill (small ledge) -->
    <path d="M 758 502 L 920 480 L 924 492 L 760 514 Z" fill="url(#rightWall)" stroke="#1A1614" stroke-width="2"/>
    <!-- Outside glow (sky / soft warm glow) -->
    <rect x="762" y="222" width="160" height="280" fill="#B8E8E7" opacity="0.3" filter="url(#softGlow22)"/>
  </g>

  <!-- Warm light flood across the room (from window) -->
  <rect width="1080" height="1080" fill="url(#windowLight)" pointer-events="none"/>

  <!-- Light parallelogram cast on floor (warm rectangle of sun) -->
  <path d="M 600 760 L 880 700 L 920 820 L 640 880 Z"
        fill="#B8E8E7" opacity="0.18" filter="url(#hazeVC)"/>

  <!-- Decorative concentric circles on back wall (Cartoon Saloon detail. wall art) -->
  <g transform="translate(280 320)" opacity="0.4">
    <circle r="68" fill="none" stroke="#1A1614" stroke-width="1.6"/>
    <circle r="52" fill="none" stroke="#1A1614" stroke-width="1.2" stroke-dasharray="3,5"/>
    <circle r="36" fill="none" stroke="#00AAA6" stroke-width="1.4" opacity="0.55"/>
    <circle r="20" fill="none" stroke="#1A1614" stroke-width="1"/>
  </g>

  <!-- Painterly noise overlay -->
  <rect width="1080" height="1080" fill="#8C7758" opacity="0.04" filter="url(#painterly22)"/>

  <!-- =========================================================
       DESK + MONITOR + screen content
       ========================================================= -->

  <!-- Desk (small isometric slab) -->
  <g transform="translate(420 760)">
    <!-- top surface -->
    <path d="M -240 0 L 240 -16 L 280 24 L -220 40 Z"
          fill="url(#deskGrad)" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>
    <!-- front edge -->
    <path d="M -220 40 L 280 24 L 280 56 L -220 72 Z"
          fill="#5A4628" stroke="#1A1614" stroke-width="2.5"/>
    <!-- grain lines on top -->
    <g stroke="#1A1614" stroke-width="0.8" opacity="0.3" fill="none">
      <path d="M -200 8 Q 0 0 240 -10"/>
      <path d="M -200 22 Q 20 14 240 4"/>
    </g>
  </g>

  <!-- Monitor (sits on desk) -->
  <g transform="translate(420 600)">
    <!-- stand -->
    <path d="M -20 100 L 22 100 L 32 160 L -30 160 Z"
          fill="url(#screenBezel)" stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- back of stand on desk -->
    <path d="M -30 160 L 32 160 L 40 168 L -38 168 Z"
          fill="#0A0706" stroke="#1A1614" stroke-width="2"/>
    <!-- Bezel (frame around screen). slight isometric tilt -->
    <path d="M -220 -160 Q -222 -170 -210 -172 L 196 -180 Q 208 -180 210 -170 L 220 92 Q 220 104 208 104 L -208 100 Q -220 100 -220 90 Z"
          fill="url(#screenBezel)" stroke="#1A1614" stroke-width="3" stroke-linejoin="round"/>

    <!-- Inner screen (cool blue gradient) -->
    <path d="M -198 -148 Q -200 -156 -190 -158 L 184 -166 Q 194 -166 196 -158 L 204 78 Q 204 88 194 88 L -192 84 Q -200 84 -200 76 Z"
          fill="url(#screenGrad)" stroke="#0A0706" stroke-width="2" stroke-linejoin="round"/>

    <!-- LIVE dot top-right -->
    <circle cx="178" cy="-140" r="6" fill="#00AAA6">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    <circle cx="178" cy="-140" r="10" fill="none" stroke="#00AAA6" stroke-width="1.6" opacity="0.6">
      <animate attributeName="r" values="6;16;6" dur="2.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.25 0.1 0.25 1;0.42 0 0.58 1"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.25 0.1 0.25 1;0.42 0 0.58 1"/>
    </circle>

    <!-- =====================================================
         4 PARTICIPANT TILES. 2x2 grid inside the screen
         Each tile has a silhouette bust
         ===================================================== -->

    <!-- TILE 1 (top-left) -->
    <g transform="translate(-120 -80)">
      <path d="M -64 -52 Q -66 -60 -58 -60 L 60 -64 Q 68 -62 68 -54 L 72 46 Q 72 54 64 54 L -56 56 Q -64 54 -64 46 Z"
            fill="url(#participantTile)" stroke="#0A0706" stroke-width="2.2" stroke-linejoin="round"/>
      <!-- silhouette (head + shoulders, slight asymmetry) -->
      <g>
        <ellipse cx="2" cy="-18" rx="14" ry="16" fill="url(#silhouetteBody)"/>
        <path d="M -28 30 C -28 10 -12 0 4 0 C 20 0 36 10 38 30 Z" fill="url(#silhouetteBody)"/>
      </g>
      <!-- breathing -->
      <animate attributeName="opacity" values="1;0.85;1" dur="3.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </g>

    <!-- TILE 2 (top-right). active speaker (orange ring) -->
    <g transform="translate(78 -80)">
      <path d="M -64 -52 Q -66 -60 -58 -60 L 60 -64 Q 68 -62 68 -54 L 72 46 Q 72 54 64 54 L -56 56 Q -64 54 -64 46 Z"
            fill="url(#participantTile)" stroke="#0A0706" stroke-width="2.2" stroke-linejoin="round"/>
      <g>
        <ellipse cx="0" cy="-20" rx="15" ry="17" fill="url(#silhouetteBody)"/>
        <path d="M -30 32 C -30 12 -14 0 0 0 C 16 0 32 12 34 32 Z" fill="url(#silhouetteBody)"/>
      </g>
      <!-- active speaker ring -->
      <path d="M -64 -52 Q -66 -60 -58 -60 L 60 -64 Q 68 -62 68 -54 L 72 46 Q 72 54 64 54 L -56 56 Q -64 54 -64 46 Z"
            fill="none" stroke="#00AAA6" stroke-width="3">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"
                 calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </path>
      <animate attributeName="opacity" values="1;0.92;1" dur="3s" begin="0.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </g>

    <!-- TILE 3 (bottom-left) -->
    <g transform="translate(-120 30)">
      <path d="M -64 -52 Q -66 -60 -58 -60 L 60 -64 Q 68 -62 68 -54 L 72 46 Q 72 54 64 54 L -56 56 Q -64 54 -64 46 Z"
            fill="url(#participantTile)" stroke="#0A0706" stroke-width="2.2" stroke-linejoin="round"/>
      <g>
        <ellipse cx="-2" cy="-19" rx="13" ry="15" fill="url(#silhouetteBody)"/>
        <path d="M -26 28 C -26 8 -12 0 -2 0 C 14 0 30 10 32 30 Z" fill="url(#silhouetteBody)"/>
      </g>
      <animate attributeName="opacity" values="1;0.88;1" dur="3.6s" begin="0.8s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </g>

    <!-- TILE 4 (bottom-right) -->
    <g transform="translate(78 30)">
      <path d="M -64 -52 Q -66 -60 -58 -60 L 60 -64 Q 68 -62 68 -54 L 72 46 Q 72 54 64 54 L -56 56 Q -64 54 -64 46 Z"
            fill="url(#participantTile)" stroke="#0A0706" stroke-width="2.2" stroke-linejoin="round"/>
      <g>
        <ellipse cx="2" cy="-18" rx="14" ry="16" fill="url(#silhouetteBody)"/>
        <path d="M -28 30 C -28 10 -12 0 4 0 C 20 0 36 10 38 30 Z" fill="url(#silhouetteBody)"/>
      </g>
      <animate attributeName="opacity" values="1;0.9;1" dur="3.2s" begin="1.2s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </g>

    <!-- Screen glow on monitor (warm subtle) -->
    <path d="M -198 -148 Q -200 -156 -190 -158 L 184 -166 Q 194 -166 196 -158 L 204 78 Q 204 88 194 88 L -192 84 Q -200 84 -200 76 Z"
          fill="#6F8AA8" opacity="0" filter="url(#softGlow22)" pointer-events="none">
      <animate attributeName="opacity" values="0;0.18;0" dur="3.8s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </path>
  </g>

  <!-- =========================================================
       OPEN BOOK on the desk (eLearning), under the monitor
       ========================================================= -->
  <g transform="translate(420 838)">
    <!-- book shadow on desk -->
    <ellipse cx="0" cy="40" rx="160" ry="8" fill="#1A1614" opacity="0.28" filter="url(#contactBlur22)"/>

    <!-- left page -->
    <path d="M -140 -30 Q -142 -36 -136 -38 L -6 -32 L -6 38 L -136 30 Q -142 26 -142 18 Z"
          fill="url(#bookPage)" stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- right page -->
    <path d="M 6 -32 L 136 -38 Q 142 -36 142 -30 L 142 18 Q 142 26 136 30 L 6 38 Z"
          fill="url(#bookPage)" stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- spine -->
    <path d="M -6 -32 L 6 -32 L 6 38 L -6 38 Z" fill="#9C7A52" stroke="#1A1614" stroke-width="2"/>
    <!-- center crease -->
    <path d="M 0 -32 L 0 38" stroke="#1A1614" stroke-width="1.2" opacity="0.4"/>

    <!-- Lines of text on left page (4 lines, slight handdrawn curve) -->
    <g stroke="#1A1614" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.55">
      <path d="M -126 -16 Q -70 -18 -16 -16"/>
      <path d="M -126 -4 Q -64 -6 -16 -4"/>
      <path d="M -126 8 Q -74 6 -20 8"/>
      <path d="M -126 20 Q -80 18 -30 20"/>
    </g>

    <!-- Lines of text on right page (3 lines + small diagram circle) -->
    <g stroke="#1A1614" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.55">
      <path d="M 16 -16 Q 70 -18 126 -16"/>
      <path d="M 16 -4 Q 64 -6 126 -4"/>
      <path d="M 16 8 Q 76 6 110 10"/>
    </g>
    <!-- Small diagram on right page (orange dot. eLearning point of interest) -->
    <circle cx="100" cy="22" r="8" fill="#00AAA6" stroke="#1A1614" stroke-width="1.5"/>
    <path d="M 60 22 Q 80 22 92 22" stroke="#1A1614" stroke-width="1.4" stroke-linecap="round" opacity="0.6" fill="none"/>
  </g>

  <!-- =========================================================
       EMPLOYEE. back view, seated/standing at the desk
       Line of action: gentle S, head slightly tilted forward
       ========================================================= -->
  <g transform="translate(420 920)">

    <!-- Subtle floor shadow -->
    <ellipse cx="0" cy="80" rx="110" ry="14" fill="#1A1614" opacity="0.28" filter="url(#contactBlur22)"/>

    <!-- Body (back view) -->
    <g>
      <!-- Torso (shoulders wider than hips, line of action) -->
      <path d="M -76 -30 C -84 0 -86 50 -76 110
               C -48 124 -16 128 16 126
               C 50 124 78 110 86 70
               C 90 30 88 -8 80 -36
               C 60 -56 26 -62 0 -62
               C -26 -62 -60 -54 -76 -30 Z"
            fill="url(#employeeBody22)" stroke="#0A0706" stroke-width="3.5" stroke-linejoin="round"/>

      <!-- Subtle shirt collar suggestion (back) -->
      <path d="M -38 -52 Q 0 -42 36 -52" fill="none"
            stroke="#1A1614" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

      <!-- Arm right (resting on desk surface, going toward keyboard) -->
      <path d="M 78 -16 C 96 -12 112 -2 116 14 C 110 22 96 22 84 14
               C 76 4 72 -8 78 -16 Z"
            fill="url(#employeeBody22)" stroke="#0A0706" stroke-width="3" stroke-linejoin="round"/>

      <!-- Arm left -->
      <path d="M -78 -16 C -96 -12 -112 -2 -116 14 C -110 22 -96 22 -84 14
               C -76 4 -72 -8 -78 -16 Z"
            fill="url(#employeeBody22)" stroke="#0A0706" stroke-width="3" stroke-linejoin="round"/>

      <!-- Head (back view, slight right tilt. looking at screen) -->
      <path d="M -32 -130 C -34 -100 -28 -78 -8 -68
               C 16 -64 36 -76 42 -100 C 46 -120 38 -140 16 -150
               C -8 -154 -28 -148 -32 -130 Z"
            fill="url(#employeeBody22)" stroke="#0A0706" stroke-width="3.5" stroke-linejoin="round"/>

      <!-- Hair line (top of head) -->
      <path d="M -28 -136 Q 6 -158 38 -134" fill="none"
            stroke="#0A0706" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>

      <!-- Rim light on head (warm from window on right) -->
      <path d="M 24 -150 C 36 -144 42 -130 42 -116" fill="none"
            stroke="#B8E8E7" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
      <!-- Rim light on right shoulder -->
      <path d="M 64 -50 C 80 -36 86 -16 84 6" fill="none"
            stroke="#B8E8E7" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>

      <!-- Neck shadow (ambient occlusion) -->
      <path d="M -16 -76 Q 6 -64 32 -76" fill="none"
            stroke="#000" stroke-width="2.4" opacity="0.45" filter="url(#contactBlur22)"/>
    </g>

    <!-- subtle breathing -->
    <animateTransform attributeName="transform" type="translate"
                      values="420 920; 420 916; 420 920" dur="6s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </g>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette22)" pointer-events="none"/>
</svg>
