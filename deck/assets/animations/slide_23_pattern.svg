<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 23 — Pattern: seven orange compasses in a hexagon-star arrangement with rotation and counter-rotation, each slightly different">
  <title>Slide 23 — Il pattern (7 bussole)</title>
  <desc>Sette bussole arancioni stilizzate disposte a stella esagonale: una centrale e sei ai vertici. Sistema in rotation lenta con counter-rotation interna che mantiene ogni bussola verticale. Ogni bussola è leggermente diversa nell'orientamento dell'ago e nello stile del bordo.</desc>

  <defs>
    <filter id="painterly23" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="33"/>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>
    <filter id="contactBlur23" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="hazePattern" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
    <filter id="softGlow23" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Compass case (brass-orange, top-right light) -->
    <radialGradient id="compassCase" cx="32%" cy="22%" r="85%">
      <stop offset="0%" stop-color="#FFB570"/>
      <stop offset="50%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#7A2A0A"/>
    </radialGradient>

    <!-- Compass face (cream) -->
    <radialGradient id="compassFace" cx="32%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#FAF5EC"/>
      <stop offset="100%" stop-color="#D9CCAE"/>
    </radialGradient>

    <!-- Needle orange (active half) -->
    <linearGradient id="needleOrange" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFB570"/>
      <stop offset="100%" stop-color="#9C3A0E"/>
    </linearGradient>

    <!-- Needle dark (passive half) -->
    <linearGradient id="needleDark" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3A2C1A"/>
      <stop offset="100%" stop-color="#0A0706"/>
    </linearGradient>

    <!-- Halo gradient -->
    <radialGradient id="haloPattern" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FF6B1A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette23" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.3"/>
    </radialGradient>

    <!-- =========================================================
         COMPASS SYMBOLS — 3 slight variants (border style)
         All shared via <symbol> but instances will be rotated
         and have their needle angles set differently.
         The "needle" itself is parameterized by per-instance group.
         ========================================================= -->

    <!-- VARIANT A — round bezel with 8 micro-ticks (cardinal + intercardinal) -->
    <symbol id="compassA" viewBox="-80 -80 160 160" overflow="visible">
      <!-- outer rim -->
      <circle r="74" fill="url(#compassCase)" stroke="#0A0706" stroke-width="3.5"/>
      <circle r="68" fill="none" stroke="#0A0706" stroke-width="1.4" opacity="0.55"/>
      <!-- inner face -->
      <circle r="60" fill="url(#compassFace)" stroke="#0A0706" stroke-width="2.4"/>
      <!-- 8 micro-ticks around the dial -->
      <g stroke="#0A0706" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-60" x2="0" y2="-50"/>
        <line x1="42" y1="-42" x2="36" y2="-36"/>
        <line x1="60" y1="0" x2="50" y2="0"/>
        <line x1="42" y1="42" x2="36" y2="36"/>
        <line x1="0" y1="60" x2="0" y2="50"/>
        <line x1="-42" y1="42" x2="-36" y2="36"/>
        <line x1="-60" y1="0" x2="-50" y2="0"/>
        <line x1="-42" y1="-42" x2="-36" y2="-36"/>
      </g>
      <!-- inner pivot circle -->
      <circle r="5" fill="#0A0706"/>
      <!-- rim highlight (Disney sparkle) -->
      <path d="M -54 -38 Q -36 -64 0 -68" fill="none"
            stroke="#FFE3C2" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
      <circle cx="-42" cy="-46" r="3" fill="#FFF" opacity="0.85"/>
    </symbol>

    <!-- VARIANT B — round bezel with 12 micro-ticks (more detail) -->
    <symbol id="compassB" viewBox="-80 -80 160 160" overflow="visible">
      <circle r="74" fill="url(#compassCase)" stroke="#0A0706" stroke-width="3.5"/>
      <circle r="68" fill="none" stroke="#0A0706" stroke-width="1.2" stroke-dasharray="2,4" opacity="0.55"/>
      <circle r="60" fill="url(#compassFace)" stroke="#0A0706" stroke-width="2.4"/>
      <!-- 12 micro-ticks -->
      <g stroke="#0A0706" stroke-width="1.8" stroke-linecap="round">
        <line x1="0" y1="-60" x2="0" y2="-50"/>
        <line x1="30" y1="-52" x2="26" y2="-44"/>
        <line x1="52" y1="-30" x2="44" y2="-26"/>
        <line x1="60" y1="0" x2="50" y2="0"/>
        <line x1="52" y1="30" x2="44" y2="26"/>
        <line x1="30" y1="52" x2="26" y2="44"/>
        <line x1="0" y1="60" x2="0" y2="50"/>
        <line x1="-30" y1="52" x2="-26" y2="44"/>
        <line x1="-52" y1="30" x2="-44" y2="26"/>
        <line x1="-60" y1="0" x2="-50" y2="0"/>
        <line x1="-52" y1="-30" x2="-44" y2="-26"/>
        <line x1="-30" y1="-52" x2="-26" y2="-44"/>
      </g>
      <circle r="5" fill="#0A0706"/>
      <path d="M -52 -42 Q -32 -66 8 -68" fill="none"
            stroke="#FFE3C2" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
      <circle cx="-38" cy="-48" r="3" fill="#FFF" opacity="0.85"/>
    </symbol>

    <!-- VARIANT C — bezel with notched rim (slight irregularity) -->
    <symbol id="compassC" viewBox="-80 -80 160 160" overflow="visible">
      <!-- outer rim with 4 small notches (asymmetric) -->
      <path d="M 70 0 Q 76 -28 56 -52 Q 28 -76 0 -74 Q -28 -76 -56 -52 Q -76 -28 -70 0
               Q -76 28 -56 52 Q -28 76 0 74 Q 28 76 56 52 Q 76 28 70 0 Z"
            fill="url(#compassCase)" stroke="#0A0706" stroke-width="3.5" stroke-linejoin="round"/>
      <circle r="60" fill="url(#compassFace)" stroke="#0A0706" stroke-width="2.4"/>
      <g stroke="#0A0706" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-60" x2="0" y2="-50"/>
        <line x1="60" y1="0" x2="50" y2="0"/>
        <line x1="0" y1="60" x2="0" y2="50"/>
        <line x1="-60" y1="0" x2="-50" y2="0"/>
        <!-- intercardinal: shorter -->
        <line x1="42" y1="-42" x2="38" y2="-38"/>
        <line x1="42" y1="42" x2="38" y2="38"/>
        <line x1="-42" y1="42" x2="-38" y2="38"/>
        <line x1="-42" y1="-42" x2="-38" y2="-38"/>
      </g>
      <circle r="5" fill="#0A0706"/>
      <path d="M -50 -44 Q -34 -64 4 -68" fill="none"
            stroke="#FFE3C2" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
      <circle cx="-40" cy="-50" r="3" fill="#FFF" opacity="0.85"/>
    </symbol>
  </defs>

  <!-- BG cream + grain -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>
  <rect width="1080" height="1080" fill="#D9B98A" opacity="0.04" filter="url(#painterly23)"/>

  <!-- =========================================================
       BG mandala — Cartoon Saloon concentric layer
       ========================================================= -->
  <g transform="translate(540 540)" opacity="0.4" filter="url(#hazePattern)">
    <circle r="470" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,9"/>
    <circle r="428" fill="none" stroke="#1A1614" stroke-width="1.3" stroke-dasharray="3,7"/>
    <circle r="386" fill="none" stroke="#1A1614" stroke-width="1" stroke-dasharray="1,5"/>
    <circle r="344" fill="none" stroke="#1A1614" stroke-width="1.4" stroke-dasharray="4,10"/>
    <!-- 24 tiny radial ticks at r=460 (Celtic detail) -->
    <g stroke="#1A1614" stroke-width="1.3" stroke-linecap="round">
      <line x1="0" y1="-460" x2="0" y2="-444"/>
      <line x1="119" y1="-444" x2="115" y2="-429"/>
      <line x1="230" y1="-398" x2="222" y2="-385"/>
      <line x1="325" y1="-325" x2="314" y2="-314"/>
      <line x1="398" y1="-230" x2="385" y2="-222"/>
      <line x1="444" y1="-119" x2="429" y2="-115"/>
      <line x1="460" y1="0" x2="444" y2="0"/>
      <line x1="444" y1="119" x2="429" y2="115"/>
      <line x1="398" y1="230" x2="385" y2="222"/>
      <line x1="325" y1="325" x2="314" y2="314"/>
      <line x1="230" y1="398" x2="222" y2="385"/>
      <line x1="119" y1="444" x2="115" y2="429"/>
      <line x1="0" y1="460" x2="0" y2="444"/>
      <line x1="-119" y1="444" x2="-115" y2="429"/>
      <line x1="-230" y1="398" x2="-222" y2="385"/>
      <line x1="-325" y1="325" x2="-314" y2="314"/>
      <line x1="-398" y1="230" x2="-385" y2="222"/>
      <line x1="-444" y1="119" x2="-429" y2="115"/>
      <line x1="-460" y1="0" x2="-444" y2="0"/>
      <line x1="-444" y1="-119" x2="-429" y2="-115"/>
      <line x1="-398" y1="-230" x2="-385" y2="-222"/>
      <line x1="-325" y1="-325" x2="-314" y2="-314"/>
      <line x1="-230" y1="-398" x2="-222" y2="-385"/>
      <line x1="-119" y1="-444" x2="-115" y2="-429"/>
    </g>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 0 0;360 0 0" dur="180s" repeatCount="indefinite"
                      additive="sum"/>
  </g>

  <!-- =========================================================
       CENTRAL HALO behind the cluster (anticipation breathing)
       ========================================================= -->
  <g transform="translate(540 540)">
    <circle r="280" fill="url(#haloPattern)">
      <animate attributeName="r" values="250;310;250" dur="5.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
    <circle r="160" fill="#FF6B1A" opacity="0.1" filter="url(#softGlow23)">
      <animate attributeName="opacity" values="0.06;0.16;0.06" dur="5.4s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    </circle>
  </g>

  <!-- =========================================================
       CONNECTING LINES — star pattern center→6 vertices, plus hex perimeter
       ========================================================= -->
  <g stroke="#1A1614" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3,7" opacity="0.45" fill="none">
    <!-- center to each vertex -->
    <path d="M 540 540 Q 600 410 690 280"/>
    <path d="M 540 540 Q 700 540 840 540"/>
    <path d="M 540 540 Q 600 670 690 800"/>
    <path d="M 540 540 Q 480 670 390 800"/>
    <path d="M 540 540 Q 380 540 240 540"/>
    <path d="M 540 540 Q 480 410 390 280"/>
    <!-- hex perimeter (curved, not straight — Disney) -->
    <path d="M 690 280 Q 786 410 840 540"/>
    <path d="M 840 540 Q 786 670 690 800"/>
    <path d="M 690 800 Q 540 836 390 800"/>
    <path d="M 390 800 Q 294 670 240 540"/>
    <path d="M 240 540 Q 294 410 390 280"/>
    <path d="M 390 280 Q 540 244 690 280"/>
  </g>

  <!-- =========================================================
       7 COMPASSES — main rotating group
       Each compass: outer group rotates (system spin), inner group
       counter-rotates so the compass stays upright. The needle
       inside has its own slight oscillation.
       Sizes vary slightly for asymmetry.
       ========================================================= -->

  <g transform="translate(540 540)">

    <!-- Main system slow rotation -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="0;360" dur="80s" repeatCount="indefinite"/>

      <!-- ==================== Compass 1 — top-right vertex ==================== -->
      <g transform="translate(150 -260)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="80s" repeatCount="indefinite"/>
          <!-- slight individual size -->
          <g transform="scale(0.95) rotate(2)">
            <use href="#compassA"/>
            <!-- Needle (slight orientation: tilted 12°) -->
            <g transform="rotate(12)">
              <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <!-- tiny needle wobble -->
              <animateTransform attributeName="transform" type="rotate"
                                values="10;14;10" dur="3.6s" repeatCount="indefinite"
                                calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ==================== Compass 2 — right vertex ==================== -->
      <g transform="translate(300 0)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="80s" repeatCount="indefinite"/>
          <g transform="scale(1) rotate(-4)">
            <use href="#compassB"/>
            <g transform="rotate(-8)">
              <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <animateTransform attributeName="transform" type="rotate"
                                values="-10;-6;-10" dur="3.2s" begin="0.4s" repeatCount="indefinite"
                                calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ==================== Compass 3 — bottom-right vertex ==================== -->
      <g transform="translate(150 260)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="80s" repeatCount="indefinite"/>
          <g transform="scale(0.92) rotate(6)">
            <use href="#compassC"/>
            <g transform="rotate(-22)">
              <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <animateTransform attributeName="transform" type="rotate"
                                values="-24;-18;-24" dur="3.8s" begin="0.8s" repeatCount="indefinite"
                                calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ==================== Compass 4 — bottom-left vertex ==================== -->
      <g transform="translate(-150 260)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="80s" repeatCount="indefinite"/>
          <g transform="scale(0.97) rotate(-3)">
            <use href="#compassA"/>
            <g transform="rotate(30)">
              <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <animateTransform attributeName="transform" type="rotate"
                                values="28;32;28" dur="3.4s" begin="1.2s" repeatCount="indefinite"
                                calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ==================== Compass 5 — left vertex ==================== -->
      <g transform="translate(-300 0)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="80s" repeatCount="indefinite"/>
          <g transform="scale(1.02) rotate(5)">
            <use href="#compassB"/>
            <g transform="rotate(-46)">
              <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <animateTransform attributeName="transform" type="rotate"
                                values="-48;-44;-48" dur="3s" begin="1.6s" repeatCount="indefinite"
                                calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
            </g>
          </g>
        </g>
      </g>

      <!-- ==================== Compass 6 — top-left vertex ==================== -->
      <g transform="translate(-150 -260)">
        <g>
          <animateTransform attributeName="transform" type="rotate"
                            values="0;-360" dur="80s" repeatCount="indefinite"/>
          <g transform="scale(0.94) rotate(-6)">
            <use href="#compassC"/>
            <g transform="rotate(56)">
              <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
              <animateTransform attributeName="transform" type="rotate"
                                values="54;58;54" dur="3.6s" begin="2s" repeatCount="indefinite"
                                calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
            </g>
          </g>
        </g>
      </g>

    </g>

    <!-- ==================== Compass 7 — CENTRAL (HERO) ====================
         Does NOT rotate with the system. Slightly larger, "stable
         center" of the constellation. Needle points north consistently.
         ==================================================== -->
    <g>
      <!-- subtle pulse on the center compass -->
      <g>
        <g transform="scale(1.18)">
          <use href="#compassA"/>
          <!-- Hero needle: nearly vertical, micro-oscillation -->
          <g>
            <path d="M 0 -52 L 7 0 L 0 8 L -7 0 Z" fill="url(#needleOrange)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M 0 8 L 7 0 L 0 52 L -7 0 Z" fill="url(#needleDark)" stroke="#0A0706" stroke-width="1.6" stroke-linejoin="round"/>
            <animateTransform attributeName="transform" type="rotate"
                              values="-2;2;-2" dur="4.6s" repeatCount="indefinite"
                              calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
          </g>
        </g>
        <!-- breathing pulse on the central compass -->
        <animateTransform attributeName="transform" type="scale"
                          values="1 1;1.03 1.03;1 1" dur="5.4s" repeatCount="indefinite"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
      </g>
    </g>
  </g>

  <!-- Vignette -->
  <rect width="1080" height="1080" fill="url(#vignette23)" pointer-events="none"/>
</svg>
