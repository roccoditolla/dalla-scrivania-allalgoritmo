<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Slide 23 — Chiusura: central orange compass with 5 orbiting tool icons">
  <title>Slide 23 — Chiusura</title>
  <desc>Bussola arancione centrale con 5 piccole icone tool che orbitano lentamente.</desc>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="#F5EFE6"/>

  <!-- Soft pulsing halo (stronger than slide 13 — culmination) -->
  <g transform="translate(540 540)">
    <circle cx="0" cy="0" r="340" fill="#FF6B1A" opacity="0.06">
      <animate attributeName="r" values="320;380;320" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.14;0.06" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="260" fill="#FF6B1A" opacity="0.12">
      <animate attributeName="r" values="240;290;240" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.10;0.22;0.10" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="180" fill="#FF6B1A" opacity="0.15">
      <animate attributeName="opacity" values="0.12;0.25;0.12" dur="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Orbit ring (almost invisible thin black circle) -->
  <circle cx="540" cy="540" r="380" fill="none" stroke="#1A1614" stroke-width="1.2" stroke-dasharray="2,8" opacity="0.35"/>

  <!-- CENTRAL COMPASS (same identity as slide 13, slightly larger glow) -->
  <g transform="translate(540 540)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="180" fill="#F5EFE6" stroke="#1A1614" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#1A1614" stroke-width="1.5" opacity="0.5"/>

    <!-- Ticks -->
    <g stroke="#1A1614" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-180" x2="0" y2="-158"/>
      <line x1="90" y1="-156" x2="78" y2="-136"/>
      <line x1="156" y1="-90" x2="136" y2="-78"/>
      <line x1="180" y1="0" x2="158" y2="0"/>
      <line x1="156" y1="90" x2="136" y2="78"/>
      <line x1="90" y1="156" x2="78" y2="136"/>
      <line x1="0" y1="180" x2="0" y2="158"/>
      <line x1="-90" y1="156" x2="-78" y2="136"/>
      <line x1="-156" y1="90" x2="-136" y2="78"/>
      <line x1="-180" y1="0" x2="-158" y2="0"/>
      <line x1="-156" y1="-90" x2="-136" y2="-78"/>
      <line x1="-90" y1="-156" x2="-78" y2="-136"/>
    </g>

    <!-- Inner dial -->
    <circle cx="0" cy="0" r="122" fill="none" stroke="#1A1614" stroke-width="2.5"/>

    <!-- Windrose petals -->
    <g stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="#F5EFE6">
      <polygon points="0,-118 16,0 0,118 -16,0"/>
      <polygon points="-118,0 0,-16 118,0 0,16"/>
      <polygon points="-82,-82 0,-11 82,82 0,11" opacity="0.35"/>
      <polygon points="82,-82 11,0 -82,82 -11,0" opacity="0.35"/>
    </g>

    <!-- Needle (orange, narrative — slow rotation suggesting "arrived" gentle drift) -->
    <g>
      <g>
        <polygon points="0,-104 12,0 0,7 -12,0" fill="#FF6B1A" stroke="#1A1614" stroke-width="2" stroke-linejoin="round"/>
        <polygon points="0,104 12,0 0,-7 -12,0" fill="#F5EFE6" stroke="#1A1614" stroke-width="2" stroke-linejoin="round"/>
        <animateTransform attributeName="transform" type="rotate" values="-4;4;-4" dur="6s" repeatCount="indefinite"/>
      </g>
      <circle cx="0" cy="0" r="10" fill="#1A1614"/>
      <circle cx="0" cy="0" r="5" fill="#FF6B1A">
        <animate attributeName="r" values="3;7;3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- 5 ORBITING TOOL ICONS (each at a vertex of a pentagon, all in black ink) -->
  <!-- Wrapped in a group with rotation animation -->
  <g transform="translate(540 540)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>

      <!-- Icon 1: TOP — Stack of papers (DVR Validator) -->
      <g transform="translate(0 -380)">
        <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#F5EFE6">
          <rect x="-22" y="-22" width="40" height="50" rx="3"/>
          <rect x="-18" y="-16" width="40" height="50" rx="3"/>
          <rect x="-14" y="-10" width="40" height="50" rx="3"/>
        </g>
        <!-- Tiny checkmark on top sheet -->
        <polyline points="-2,12 4,18 14,4" fill="none" stroke="#1A1614" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Counter-rotate so icon stays upright -->
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite" additive="sum"/>
      </g>

      <!-- Icon 2: UPPER-RIGHT — Funnel (AppaltoAI) -->
      <g transform="translate(361 -117)">
        <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#F5EFE6">
          <polygon points="-28,-22 28,-22 12,8 12,28 -12,28 -12,8"/>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite" additive="sum"/>
      </g>

      <!-- Icon 3: LOWER-RIGHT — Map pin (LeadHunter) -->
      <g transform="translate(223 307)">
        <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#F5EFE6">
          <path d="M 0,-25 C 14,-25 22,-14 22,0 C 22,16 0,32 0,32 C 0,32 -22,16 -22,0 C -22,-14 -14,-25 0,-25 Z"/>
          <circle cx="0" cy="-3" r="6" fill="#1A1614"/>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite" additive="sum"/>
      </g>

      <!-- Icon 4: LOWER-LEFT — Kanban card (Project Manager) -->
      <g transform="translate(-223 307)">
        <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#F5EFE6">
          <rect x="-25" y="-18" width="50" height="36" rx="4"/>
          <line x1="-15" y1="-6" x2="15" y2="-6" stroke-width="2" opacity="0.7"/>
          <line x1="-15" y1="2" x2="10" y2="2" stroke-width="2" opacity="0.7"/>
          <line x1="-15" y1="10" x2="12" y2="10" stroke-width="2" opacity="0.7"/>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite" additive="sum"/>
      </g>

      <!-- Icon 5: UPPER-LEFT — Heart (Welfare) -->
      <g transform="translate(-361 -117)">
        <g stroke="#1A1614" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="#F5EFE6">
          <path d="
            M 0,22
            C -12,12 -28,0 -28,-12
            C -28,-22 -18,-28 -10,-25
            C -4,-23 0,-18 0,-13
            C 0,-18 4,-23 10,-25
            C 18,-28 28,-22 28,-12
            C 28,0 12,12 0,22 Z
          "/>
        </g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="40s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
  </g>
</svg>
