<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Eleven Digital - Compass Logo Placeholder -->
  <defs>
    <radialGradient id="compassGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B1A" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFA463" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#FF6B1A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Outer glow halo -->
  <circle cx="100" cy="100" r="90" fill="url(#compassGlow)" opacity="0.4"/>
  
  <!-- Compass outer ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#FF6B1A" stroke-width="3"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#FF6B1A" stroke-width="1.5" opacity="0.6"/>
  
  <!-- N-S needle -->
  <polygon points="100,40 95,100 100,105 105,100" fill="#FF6B1A"/>
  <polygon points="100,160 95,100 100,95 105,100" fill="#1A1614"/>
  
  <!-- E-W marks -->
  <line x1="40" y1="100" x2="50" y2="100" stroke="#1A1614" stroke-width="2"/>
  <line x1="160" y1="100" x2="150" y2="100" stroke="#1A1614" stroke-width="2"/>
  
  <!-- Center pin -->
  <circle cx="100" cy="100" r="4" fill="#1A1614"/>
  <circle cx="100" cy="100" r="2" fill="#FF6B1A"/>
  
  <!-- Wordmark below (optional, can be removed) -->
  <text x="100" y="195" text-anchor="middle" 
        font-family="Inter, system-ui, sans-serif" 
        font-size="10" font-weight="700" 
        fill="#1A1614" letter-spacing="0.15em">
    ELEVEN DIGITAL
  </text>
</svg>
